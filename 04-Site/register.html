<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>注册｜观澜AI｜WaveSight AI</title>
    <link rel="stylesheet" href="./css/styles.css" />
    <link rel="icon" href="./assets/logo.svg" type="image/svg+xml" />
  </head>
  <body data-page="register">
    <header class="topbar">
      <a class="brand" href="./index.html"><img class="brand-logo" src="./assets/logo.svg" alt="" /><span><strong>观澜AI｜WaveSight AI</strong><small>观AI之澜，识商业之势</small></span></a>
      <nav class="nav" aria-label="主导航">
        <a href="./index.html" class="nav-link">首页</a>
        <a href="./daily.html" class="nav-link">Daily Brief</a>
        <a href="./signals.html" class="nav-link">Signals</a>
        <a href="./the-point.html" class="nav-link">The Point</a>
        <a href="./opportunities.html" class="nav-link">Opportunities</a>
        <a href="./trends.html" class="nav-link">Trends</a>
      </nav>
      <div class="toolbar"></div>
    </header>
    <main>
      <section class="page-title">
        <p class="eyebrow">Create Account</p>
        <h1>注册观澜AI</h1>
        <p>把 AI 热点压缩成可验证的商业信号、趋势判断和机会卡，帮助你更早看见值得跟踪的变化。</p>
      </section>
      <section class="auth-layout">
        <form id="registerForm" class="auth-form">
          <div class="auth-form-head">
            <p class="eyebrow">Register</p>
            <h2>创建账号</h2>
          </div>
          <label class="field"><span>姓名</span><input name="name" required /></label>
          <label class="field"><span>邮箱</span><input name="contact" type="email" autocomplete="email" required /></label>
          <label class="field"><span>设置密码</span><input name="password" type="password" autocomplete="new-password" minlength="6" required /></label>
          <label class="field"><span>确认密码</span><input name="confirmPassword" type="password" autocomplete="new-password" minlength="6" required /></label>
          <label class="field"><span>公司/机构</span><input name="company" /></label>
          <label class="field"><span>身份</span><input name="roleTitle" placeholder="创始人、投资人、业务负责人等" /></label>
          <button class="primary-btn" type="submit">注册</button>
          <div id="authStatus" class="sync-status"></div>
        </form>
        <aside class="auth-side">
          <p class="eyebrow">What You Get</p>
          <h2>每天少读一点噪音，多看一点信号。</h2>
          <p>注册后可查看 Daily Brief、Signals、Trends 与 Opportunities，把分散热点整理成能开会讨论的判断材料。</p>
          <a class="ghost-btn as-link" href="./login.html">已有账号，去登录</a>
        </aside>
      </section>
    </main>
    <script src="./data/radar-data.js"></script>
    <script src="./js/app.js"></script>
  </body>
</html>
