<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>观澜日报</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;600;700&family=Noto+Serif+SC:wght@600&family=IBM+Plex+Mono:wght@500;600&display=swap');
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html {
    background: #fffdf8;
    background-image:
      linear-gradient(rgba(200,167,102,.035) 1px, transparent 1px),
      linear-gradient(90deg, rgba(200,167,102,.03) 1px, transparent 1px);
    background-size: 24px 24px, 24px 24px;
  }
  body {
    width: 100%; max-width: 860px; margin: 0 auto;
    background: transparent;
    font-family: 'Noto Sans SC', -apple-system, sans-serif;
    padding: 20px; color: #071827;
  }
  .container { padding: 32px 28px; }
  .header {
    display: flex; justify-content: space-between; align-items: end;
    padding-bottom: 14px; border-bottom: 2px solid rgba(200,167,102,.35); margin-bottom: 20px;
  }
  .brand { font-family: 'Noto Serif SC', serif; font-size: 22px; font-weight: 600; color: #0d355c; letter-spacing: .03em; }
  .brand small { display: block; font-size: 9px; letter-spacing: .28em; color: #c8a766; font-weight: 600; }
  .date { font-family: 'IBM Plex Mono', monospace; font-size: 14px; color: rgba(7,24,39,.52); font-weight: 500; }
  .section { margin-top: 22px; }
  .section-head {
    display: flex; align-items: center; gap: 10px;
    font-family: 'Noto Serif SC', serif; font-size: 17px; font-weight: 600; color: #0d355c;
    padding-bottom: 10px; border-bottom: 1px solid rgba(200,167,102,.2); margin-bottom: 14px;
  }
  .section-head .badge {
    display: inline-flex; align-items: center; justify-content: center;
    width: 26px; height: 26px; border-radius: 8px; font-size: 13px;
    background: #c8a766; color: #fffdf8;
  }
  .event { margin-bottom: 10px; }
  .event-row {
    display: flex; gap: 12px; align-items: flex-start;
    padding: 11px 14px; border-radius: 10px;
    background: rgba(255,255,255,.78);
    border: 1px solid rgba(7,24,39,.08);
  }
  .event-rank {
    flex: 0 0 28px; font-family: 'IBM Plex Mono', monospace;
    font-weight: 700; font-size: 15px; line-height: 22px; text-align: center;
  }
  .event-rank.s { color: #9a4832; }
  .event-rank.a { color: #e48322; }
  .event-rank.b { color: #c8a766; }
  .event-body { flex: 1; min-width: 0; }
  .event-title { font-size: 14.5px; font-weight: 600; line-height: 1.5; color: #071827; }
  .event-title .score {
    font-family: 'IBM Plex Mono', monospace; font-size: 11px; font-weight: 600;
    color: #fffdf8; background: #0d355c; padding: 1px 6px; border-radius: 5px;
    margin-left: 5px; vertical-align: middle;
  }
  .event-title .score.top { background: #9a4832; }
  .event-core { margin-top: 4px; font-size: 12px; line-height: 1.6; color: rgba(7,24,39,.62); }
  .event-url { margin-top: 3px; font-size: 11px; }
  .event-url a { color: #0d355c; text-decoration: none; border-bottom: 1px solid rgba(13,53,92,.2); }
  .event-url a:hover { border-bottom-color: #0d355c; }
  .people-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; }
  .person-card {
    padding: 14px; border-radius: 10px;
    background: linear-gradient(180deg, rgba(200,167,102,.12), rgba(255,253,248,.68));
    border: 1px solid rgba(200,167,102,.25);
  }
  .person-name { font-weight: 700; font-size: 14px; color: #0d355c; }
  .person-engagement {
    display: inline-block; margin-top: 4px; padding: 1px 7px; border-radius: 999px;
    background: rgba(200,167,102,.2); font-size: 10px; font-weight: 600; color: #876a2e;
  }
  .person-quote { margin-top: 7px; font-size: 12px; line-height: 1.6; color: rgba(7,24,39,.72); }
  .person-quote::before { content: "\201C"; color: #c8a766; font-size: 16px; }
  .person-quote::after { content: "\201D"; color: #c8a766; font-size: 16px; }
  .signals { margin-top: 14px; }
  .signal-row {
    display: flex; gap: 10px; align-items: flex-start;
    padding: 8px 0; border-top: 1px solid rgba(7,24,39,.06);
  }
  .signal-row:first-child { border-top: 0; }
  .signal-tag {
    flex: 0 0 100px; padding: 3px 8px; border-radius: 5px;
    font-size: 11px; font-weight: 600; text-align: center;
  }
  .signal-tag.platform { background: rgba(13,53,92,.1); color: #0d355c; }
  .signal-tag.adoption { background: rgba(228,131,34,.1); color: #e48322; }
  .signal-tag.sentiment { background: rgba(23,115,76,.08); color: #17734c; }
  .signal-text { font-size: 12px; line-height: 1.6; color: rgba(7,24,39,.72); }
  .footer {
    margin-top: 22px; padding-top: 14px;
    border-top: 1px solid rgba(200,167,102,.2);
    font-size: 11px; color: rgba(7,24,39,.38); text-align: center;
  }
  @media (max-width: 640px) {
    body { padding: 0; }
    .container { padding: 20px 14px; }
    .people-grid { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>
<div class="container">
<!-- CONTENT_INJECTED_HERE -->
</div>
</body>
</html>
