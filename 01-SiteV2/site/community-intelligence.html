<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="wavesight-version" content="SITE-V3.3.8.3">
  <title>社群情报｜观澜 AI</title>
  <link rel="stylesheet" href="assets/wavesight-nav.css">
  <link rel="stylesheet" href="assets/community-intelligence.css?v=20260609-date-labels">
</head>
<body class="community-page">
  <header class="wavesight-topbar" aria-label="观澜 AI 导航">
    <a class="wavesight-brand" href="v3-data-observation.html" aria-label="观澜 AI 首页">
      <img class="wavesight-logo" src="assets/brand/logo-wavesight-reference-horizontal.svg" alt="观澜 AI Wavesight AI">
    </a>
    <nav class="wavesight-nav" aria-label="主导航">
      <a href="v3-data-observation.html">商业信号<span>Business Signals</span></a>
      <a href="intelligence-map.html">情报地图<span>Intelligence Map</span></a>
      <a href="follow-builders.html">一线观点<span>Builders</span></a>
      <a href="community-intelligence.html" aria-current="page">社群情报<span>Community Intel</span></a>
    </nav>
  </header>

  <main class="community-shell">
    <section class="community-workbench" aria-labelledby="community-title">
      <div class="community-title-block">
        <p class="community-kicker">Community Intelligence</p>
        <h1 id="community-title">社群情报 <span data-generated-at>读取中</span></h1>
      </div>
      <div class="community-controls" aria-label="社群情报筛选">
        <label>
          <span>关键词</span>
          <input type="search" data-search placeholder="搜索场景、案例、工具或链接">
        </label>
        <label>
          <span>日期</span>
          <select data-date-filter></select>
        </label>
        <label>
          <span>来源</span>
          <select data-source-filter></select>
        </label>
        <label>
          <span>场景</span>
          <select data-scene-filter></select>
        </label>
      </div>
    </section>

    <section class="insight-tabs" data-view-tabs aria-label="社群情报视图"></section>

    <section class="community-layout">
      <aside class="scene-rail" aria-labelledby="scene-title">
        <div class="section-head">
          <div>
            <p class="community-kicker">Dimensions</p>
            <h2 id="scene-title" data-rail-title>商业场景</h2>
          </div>
          <span data-scene-count></span>
        </div>
        <div class="scene-list" data-scene-list></div>
      </aside>

      <section class="case-stage" aria-labelledby="case-title">
        <div class="section-head">
          <div>
            <p class="community-kicker">Cases</p>
            <h2 id="case-title" data-stage-title>应用案例</h2>
          </div>
          <span class="result-count" data-result-count></span>
        </div>
        <div class="case-grid" data-case-grid></div>
      </section>
    </section>
  </main>

  <dialog class="case-dialog" data-dialog>
    <div class="dialog-panel">
      <button class="dialog-close" type="button" data-dialog-close aria-label="关闭">×</button>
      <div data-dialog-content></div>
    </div>
  </dialog>

  <script src="assets/community-intelligence.js?v=20260612-dedupe-merge" defer></script>
</body>
</html>
