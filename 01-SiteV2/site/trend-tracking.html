<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>趋势追踪｜观澜AI</title>
  <link rel="stylesheet" href="assets/styles.css">
</head>
<body class="page-trend-tracking">
  <header class="site-header" data-header></header>
  <main class="main-shell trend-report-product">
    <section class="trend-report-featured-report" data-trend-report-card></section>

    <section class="trend-report-watchlist-section">
      <div class="trend-report-section-head">
        <div>
          <span class="trend-report-section-kicker">TREND WATCHLIST</span>
          <h2>观察中方向</h2>
        </div>
        <p>进入观察池，但还没有成为强结论的方向，只展示判断、缺口和后续观察。</p>
      </div>
      <div class="trend-report-watch-list" data-trend-report-watch></div>
    </section>

    <section class="trend-report-framework-section" data-trend-report-framework></section>

    <section class="trend-report-archive-links">
      <div class="trend-report-archive-panel">
        <span class="trend-report-section-kicker">ARCHIVE</span>
        <h2>历史趋势报告</h2>
        <div class="trend-report-history-list" data-trend-report-index></div>
      </div>
      <aside class="trend-report-link-panel">
        <span class="trend-report-section-kicker">BRIEF LINKS</span>
        <h2>内参关联</h2>
        <div class="trend-report-brief-links" data-trend-report-relations></div>
      </aside>
    </section>
  </main>
  <footer data-footer></footer>
  <script src="data/site-content.js"></script>
  <script src="assets/app.js"></script>
</body>
</html>
