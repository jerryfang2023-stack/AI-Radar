<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>登录｜观澜AI</title>
  <link rel="stylesheet" href="assets/styles.css">
</head>
<body class="page-login">
  <header class="site-header" data-header></header>
  <main class="auth-page auth-login-page">
    <section class="auth-hero">
      <div class="auth-hero-copy">
        <span class="auth-kicker">ACCOUNT</span>
        <h1>继续追踪 AI 商业信号</h1>
        <p>把零散变化压缩成可讨论的商业判断。</p>
        <div class="auth-hero-links">
          <a href="pricing.html">了解会员方案</a>
          <a href="brief.html">返回商业内参</a>
        </div>
      </div>
    </section>

    <section class="auth-shell">
      <form class="auth-form-v2" data-auth-form data-success="已记录登录演示状态。你可以继续查看账户访问状态。">
        <div class="auth-form-head">
          <span class="auth-kicker">SIGN IN</span>
          <h2>登录账号</h2>
          <p>登录后进入今日观察；权限到期时可在账户页续订。</p>
        </div>
        <label class="auth-field">
          <span>邮箱</span>
          <input name="contact" type="email" autocomplete="email" required>
        </label>
        <label class="auth-field">
          <span>密码</span>
          <input name="password" type="password" autocomplete="current-password" required>
        </label>
        <div class="auth-actions">
          <button class="button primary" type="submit">登录并继续阅读</button>
          <a class="button secondary" href="register.html">申请访问</a>
        </div>
        <p class="auth-boundary">内容用于观察 AI 商业变化，不构成经营、投资或合作建议。</p>
        <div class="auth-status" role="status" aria-live="polite"></div>
      </form>

      <aside class="auth-side-note">
        <span>READING ACCESS</span>
        <ol>
          <li><strong>今日主线</strong><p>先看最值得关注的变化。</p></li>
          <li><strong>来源边界</strong><p>区分事实、观点和反证。</p></li>
          <li><strong>机会判断</strong><p>判断哪些方向值得跟踪。</p></li>
        </ol>
      </aside>
    </section>
  </main>
  <footer data-footer></footer>
  <script src="data/site-content.js"></script>
  <script src="assets/app.js"></script>
</body>
</html>
