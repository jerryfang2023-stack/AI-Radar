<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>商业内参｜观澜AI</title>
  <link rel="stylesheet" href="assets/styles.css">
</head>
<body class="page-brief">
  <header class="site-header" data-header></header>
  <main class="main-shell brief-product">
    <section class="brief-featured-issue" id="featured-issue">
      <div class="brief-report-cover" data-brief-cover></div>
      <aside class="brief-executive-card" data-brief-executive></aside>
    </section>

    <section class="brief-member-preview" id="member-preview">
      <div class="brief-access-panel">
        <div class="brief-section-kicker">MEMBER PREVIEW</div>
        <h2>预览与会员阅读</h2>
        <div class="member-state-controls" data-member-controls aria-label="商业内参阅读状态"></div>
        <div data-brief-member></div>
      </div>
      <aside class="brief-toc-card" data-brief-toc></aside>
    </section>

    <section class="brief-body-preview">
      <div class="brief-section-head">
        <div>
          <span class="brief-section-kicker">INSIGHT BODY PREVIEW</span>
          <h2>先读本期主判断</h2>
        </div>
        <p>先看它可能影响什么，再看证据够不够。</p>
      </div>
      <div class="brief-body-grid">
        <div class="brief-judgment-list" data-brief-core></div>
        <div class="brief-source-ledger" data-brief-sources></div>
      </div>
      <div class="brief-reference-list" data-brief-references></div>
    </section>

    <section class="brief-intelligence-map">
      <div class="brief-section-head">
        <div>
          <span class="brief-section-kicker">INTELLIGENCE MAP</span>
          <h2>热力变化与判断顺序</h2>
        </div>
        <p>热力不是榜单。它只提醒哪些行业、岗位和流程正在被反复触碰。</p>
      </div>
      <div class="brief-map-grid">
        <div class="heat-map" data-heat></div>
        <aside class="brief-framework-card" data-brief-framework></aside>
      </div>
    </section>

    <section class="brief-archive-subscription">
      <div class="brief-archive-panel">
        <span class="brief-section-kicker">ARCHIVE</span>
        <h2>往期内参</h2>
        <div class="brief-archive-list" data-brief-relations></div>
      </div>
      <aside class="brief-subscription-card" data-brief-subscription></aside>
    </section>
  </main>
  <footer data-footer></footer>
  <script src="data/site-content.js"></script>
  <script src="assets/app.js"></script>
</body>
</html>
