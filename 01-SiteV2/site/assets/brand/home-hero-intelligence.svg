<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1180 620" role="img" aria-label="观澜AI 首页融合视觉">
  <defs>
    <linearGradient id="paperFade" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#FFFDF8" stop-opacity="0"/>
      <stop offset=".16" stop-color="#FFFDF8" stop-opacity=".72"/>
      <stop offset=".42" stop-color="#F7F4EF" stop-opacity=".94"/>
      <stop offset="1" stop-color="#D8D1C6" stop-opacity=".76"/>
    </linearGradient>
    <linearGradient id="desk" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#F8F5EE"/>
      <stop offset=".48" stop-color="#DCD5CA"/>
      <stop offset="1" stop-color="#9B958D"/>
    </linearGradient>
    <linearGradient id="shadow" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#071827" stop-opacity=".05"/>
      <stop offset="1" stop-color="#071827" stop-opacity=".22"/>
    </linearGradient>
    <linearGradient id="goldLine" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#C8A766" stop-opacity=".06"/>
      <stop offset=".52" stop-color="#C8A766" stop-opacity=".76"/>
      <stop offset="1" stop-color="#E8D59F" stop-opacity=".3"/>
    </linearGradient>
    <linearGradient id="waveBlue" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#071827" stop-opacity=".08"/>
      <stop offset=".5" stop-color="#0D355C" stop-opacity=".52"/>
      <stop offset="1" stop-color="#0D355C" stop-opacity=".95"/>
    </linearGradient>
    <filter id="softShadow" x="-30%" y="-30%" width="160%" height="170%">
      <feDropShadow dx="10" dy="18" stdDeviation="18" flood-color="#071827" flood-opacity=".18"/>
    </filter>
    <filter id="blurSoft" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="10"/>
    </filter>
    <pattern id="paperGrain" width="80" height="80" patternUnits="userSpaceOnUse">
      <path d="M6 12h1M22 36h1M42 18h1M66 54h1M12 68h1" stroke="#071827" stroke-opacity=".08"/>
      <path d="M18 22h1M54 12h1M70 34h1M36 64h1" stroke="#C8A766" stroke-opacity=".1"/>
    </pattern>
  </defs>

  <rect width="1180" height="620" fill="url(#paperFade)"/>
  <rect width="1180" height="620" fill="url(#paperGrain)" opacity=".24"/>

  <g opacity=".28">
    <path d="M82 410 C164 350, 244 358, 320 392 C394 425, 480 426, 560 374 C630 328, 704 330, 780 374 C858 418, 940 418, 1116 322 L1180 322 L1180 620 L0 620 L0 466 C28 452, 56 430, 82 410Z" fill="#A7ADB4" opacity=".2"/>
    <path d="M0 452 C112 390, 190 404, 294 446 C396 487, 506 482, 620 414 C746 338, 850 366, 966 418 C1038 450, 1090 432, 1180 376 L1180 620 L0 620Z" fill="#6F7F8F" opacity=".12"/>
    <path d="M0 496 C116 452, 220 472, 318 504 C452 548, 578 528, 706 468 C840 406, 984 438, 1180 388 L1180 620 L0 620Z" fill="#071827" opacity=".06"/>
  </g>

  <path d="M66 558 C190 526, 296 548, 410 566 C572 592, 724 554, 866 496 C984 448, 1084 444, 1180 468 L1180 620 L0 620 L0 584 C20 574, 42 564, 66 558Z" fill="url(#desk)" opacity=".58"/>
  <path d="M0 520 C170 470, 286 494, 420 528 C598 572, 772 538, 958 462" fill="none" stroke="#C8A766" stroke-width="2" opacity=".38"/>
  <path d="M0 536 C170 492, 286 514, 420 544 C594 582, 760 554, 940 500" fill="none" stroke="#6F7F8F" stroke-width="1.4" opacity=".18"/>

  <g opacity=".2" stroke="#071827" stroke-width="1" fill="none">
    <path d="M20 490 C174 438, 328 458, 474 506"/>
    <path d="M16 510 C178 456, 326 474, 474 522"/>
    <path d="M8 530 C170 480, 330 494, 484 540"/>
  </g>

  <g transform="translate(650 42) rotate(8 194 260)" filter="url(#softShadow)">
    <rect x="0" y="0" width="388" height="528" rx="3" fill="#FFFFFF"/>
    <rect x="0" y="0" width="388" height="528" rx="3" fill="#F7F4EF" opacity=".32"/>
    <rect x="0" y="0" width="388" height="528" rx="3" fill="url(#paperGrain)" opacity=".18"/>
    <path d="M34 0v528" stroke="#071827" stroke-opacity=".07" stroke-width="2"/>
    <path d="M330 40h22M330 56h32" stroke="#6F7F8F" stroke-width="2" stroke-linecap="round" opacity=".55"/>

    <text x="92" y="72" fill="#6F7F8F" font-family="Inter, Arial, sans-serif" font-size="14" letter-spacing="10">WAVESIGHT AI</text>
    <text x="92" y="180" fill="#C8A766" font-family="Inter, Arial, sans-serif" font-size="19" font-weight="700" letter-spacing="7">DAILY JUDGMENT</text>
    <path d="M94 195h154" stroke="#C8A766" stroke-width="2" opacity=".72"/>

    <text x="92" y="276" fill="#071827" font-family="Noto Serif SC, Source Han Serif SC, Songti SC, serif" font-size="38" font-weight="600">企业 AI 正在从</text>
    <text x="92" y="330" fill="#071827" font-family="Noto Serif SC, Source Han Serif SC, Songti SC, serif" font-size="38" font-weight="600">工具进入流程接管</text>

    <g transform="translate(92 372)">
      <text x="0" y="40" fill="#071827" font-family="Georgia, Times New Roman, serif" font-size="44" font-weight="600">3</text>
      <text x="44" y="34" fill="#6F7F8F" font-family="Noto Sans SC, PingFang SC, sans-serif" font-size="15" font-weight="600">关键信号</text>
      <path d="M146 0v52" stroke="#071827" stroke-opacity=".12"/>
      <text x="184" y="40" fill="#071827" font-family="Georgia, Times New Roman, serif" font-size="44" font-weight="600">8</text>
      <text x="228" y="34" fill="#6F7F8F" font-family="Noto Sans SC, PingFang SC, sans-serif" font-size="15" font-weight="600">分钟阅读</text>
    </g>

    <g transform="translate(92 456)" fill="#536675" font-family="Noto Sans SC, PingFang SC, sans-serif" font-size="12">
      <text x="0" y="0" fill="#071827" font-weight="600">本期要点</text>
      <path d="M0 18h252" stroke="#071827" stroke-opacity=".12"/>
      <circle cx="4" cy="42" r="2" fill="#C8A766"/>
      <text x="18" y="46">流程节点正在成为企业 AI 落地的关键胜负手</text>
      <circle cx="4" cy="70" r="2" fill="#C8A766"/>
      <text x="18" y="74">从工具试用转向任务闭环和权限治理</text>
    </g>

    <g transform="translate(180 486)" fill="none" stroke-linecap="round">
      <path d="M0 16 C42 -10, 118 -12, 176 8" stroke="#C8A766" stroke-width="2"/>
      <path d="M0 50 C42 22, 92 54, 176 22" stroke="#071827" stroke-width="7"/>
      <path d="M4 70 C48 42, 94 72, 176 40" stroke="#0D355C" stroke-width="5"/>
      <path d="M8 88 C46 70, 94 92, 176 58" stroke="#A7ADB4" stroke-width="4"/>
    </g>
  </g>

  <g transform="translate(930 356) rotate(-3)" opacity=".92">
    <rect x="0" y="0" width="116" height="180" rx="10" fill="#071827"/>
    <rect x="10" y="12" width="96" height="154" rx="5" fill="#0D355C" opacity=".34"/>
    <path d="M16 142 C42 120, 68 150, 100 126" stroke="#6F7F8F" stroke-width="2" opacity=".42"/>
    <path d="M18 154 C48 134, 74 160, 104 136" stroke="#C8A766" stroke-width="2" opacity=".26"/>
  </g>

  <g transform="translate(1070 332) rotate(13)" opacity=".88">
    <rect x="0" y="0" width="12" height="206" rx="6" fill="#071827"/>
    <rect x="3" y="18" width="6" height="122" rx="3" fill="#FFFFFF" opacity=".15"/>
    <rect x="-2" y="152" width="16" height="22" rx="4" fill="#C8A766"/>
    <path d="M0 206 L6 230 L12 206Z" fill="#1A2028"/>
    <path d="M3 210 L6 224 L9 210Z" fill="#E4C783"/>
  </g>

  <g opacity=".52">
    <rect x="470" y="172" width="130" height="72" rx="14" fill="#FFFFFF" fill-opacity=".26" stroke="#FFFFFF" stroke-opacity=".72"/>
    <text x="492" y="206" fill="#6F7F8F" font-family="Inter, Arial, sans-serif" font-size="11" font-weight="700" letter-spacing="3">TODAY</text>
    <path d="M492 222h72" stroke="#C8A766" stroke-width="2"/>
    <rect x="524" y="270" width="158" height="82" rx="14" fill="#FFFFFF" fill-opacity=".18" stroke="#FFFFFF" stroke-opacity=".6"/>
    <text x="548" y="304" fill="#6F7F8F" font-family="Inter, Arial, sans-serif" font-size="11" font-weight="700" letter-spacing="3">SIGNAL</text>
    <path d="M548 322 C578 296, 600 322, 638 288" stroke="#C8A766" stroke-width="2.4" fill="none"/>
    <rect x="510" y="382" width="132" height="70" rx="14" fill="#FFFFFF" fill-opacity=".16" stroke="#FFFFFF" stroke-opacity=".56"/>
    <text x="534" y="418" fill="#6F7F8F" font-family="Inter, Arial, sans-serif" font-size="11" font-weight="700" letter-spacing="3">BRIEF</text>
  </g>

  <path d="M408 500 C524 444, 672 454, 812 506 C932 550, 1050 540, 1180 498" fill="none" stroke="url(#waveBlue)" stroke-width="12" stroke-linecap="round" opacity=".11" filter="url(#blurSoft)"/>
  <path d="M410 512 C544 458, 680 470, 812 518 C932 562, 1050 552, 1180 512" fill="none" stroke="#0D355C" stroke-width="2" opacity=".12"/>
  <path d="M390 454 C540 400, 692 420, 836 472 C954 514, 1060 506, 1180 456" fill="none" stroke="url(#goldLine)" stroke-width="3" opacity=".62"/>
  <rect x="0" y="0" width="1180" height="620" fill="url(#paperFade)" opacity=".14"/>
</svg>
