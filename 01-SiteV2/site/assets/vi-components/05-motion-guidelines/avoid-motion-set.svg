<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 220" role="img" aria-label="Avoid Motion 禁用动效">
  <title>Avoid Motion 禁用动效</title>
  <defs>
    <linearGradient id="paperShade" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#FFFFFF"/>
      <stop offset="1" stop-color="#F7F4EF"/>
    </linearGradient>
    <marker id="arrow" markerWidth="8" markerHeight="8" refX="6.4" refY="4" orient="auto">
      <path d="M1 1 L7 4 L1 7" fill="none" stroke="#0D355C" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    
  </defs>
  <style>
  :root {
    --gl-ink: #071827;
    --gl-deep: #0B1D2A;
    --gl-blue: #0D355C;
    --gl-wave: #1F5D8C;
    --gl-gray: #6F7F8F;
    --gl-mountain: #A7ADB4;
    --gl-border: #E5E8EC;
    --gl-bg: #F7F4EF;
    --gl-paper: #FFFFFF;
    --gl-gold: #C8A766;
  }
  * { box-sizing: border-box; }
  text { font-family: "Noto Sans SC", "Source Han Sans SC", "PingFang SC", "Microsoft YaHei", Arial, sans-serif; fill: var(--gl-ink); letter-spacing: 0; }
  .serif { font-family: "Noto Serif SC", "Source Han Serif SC", "Songti SC", serif; }
  .mono { font-family: "Inter", "IBM Plex Sans", "Avenir", Arial, sans-serif; letter-spacing: .12em; }
  .label { fill: var(--gl-gray); font-size: 12px; }
  .title { fill: var(--gl-ink); font-size: 22px; font-weight: 700; }
  .subtitle { fill: var(--gl-gray); font-size: 11px; }
  .caption { fill: var(--gl-gray); font-size: 10px; }
  .fine { stroke: var(--gl-border); stroke-width: 1; }
  .gold { stroke: var(--gl-gold); }
  .blue { stroke: var(--gl-blue); }
  .wave { stroke: var(--gl-wave); }
  .card { fill: rgba(255,255,255,.86); stroke: var(--gl-border); stroke-width: 1; }
  .soft { filter: drop-shadow(0 10px 24px rgba(7,24,39,.06)); }
  .no-fill { fill: none; stroke-linecap: round; stroke-linejoin: round; }
</style>
  <rect width="360" height="220" fill="url(#paperShade)"/>
  <g transform="translate(22 48)"><rect width="72" height="106" rx="8" fill="#FAFAFA" stroke="#E5E8EC"/><circle cx="18" cy="24" r="8" fill="none" stroke="#A66C55"/><path d="M14 20 L22 28 M22 20 L14 28" stroke="#A66C55"/><text x="36" y="52" class="caption" text-anchor="middle">避免炫目霓虹</text><text x="36" y="72" class="caption" text-anchor="middle">No Flashy Neon</text></g><g transform="translate(104 48)"><rect width="72" height="106" rx="8" fill="#FAFAFA" stroke="#E5E8EC"/><circle cx="18" cy="24" r="8" fill="none" stroke="#A66C55"/><path d="M14 20 L22 28 M22 20 L14 28" stroke="#A66C55"/><text x="36" y="52" class="caption" text-anchor="middle">避免弹跳效果</text><text x="36" y="72" class="caption" text-anchor="middle">No Bouncing</text></g><g transform="translate(186 48)"><rect width="72" height="106" rx="8" fill="#FAFAFA" stroke="#E5E8EC"/><circle cx="18" cy="24" r="8" fill="none" stroke="#A66C55"/><path d="M14 20 L22 28 M22 20 L14 28" stroke="#A66C55"/><text x="36" y="52" class="caption" text-anchor="middle">避免夸张视差</text><text x="36" y="72" class="caption" text-anchor="middle">No Exaggerated Parallax</text></g><g transform="translate(268 48)"><rect width="72" height="106" rx="8" fill="#FAFAFA" stroke="#E5E8EC"/><circle cx="18" cy="24" r="8" fill="none" stroke="#A66C55"/><path d="M14 20 L22 28 M22 20 L14 28" stroke="#A66C55"/><text x="36" y="52" class="caption" text-anchor="middle">避免噪点循环</text><text x="36" y="72" class="caption" text-anchor="middle">No Noisy Loops</text></g>
      <text x="180" y="190" class="caption" text-anchor="middle">不使用炫光、弹跳、强视差、噪点循环或自动播放干扰阅读。</text>
</svg>
