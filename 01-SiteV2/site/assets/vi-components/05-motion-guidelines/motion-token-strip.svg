<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 220" role="img" aria-label="Motion Tokens 基础动效参数">
  <title>Motion Tokens 基础动效参数</title>
  <defs>
    <linearGradient id="paperShade" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#FFFFFF"/>
      <stop offset="1" stop-color="#F7F4EF"/>
    </linearGradient>
    <marker id="arrow" markerWidth="8" markerHeight="8" refX="6.4" refY="4" orient="auto">
      <path d="M1 1 L7 4 L1 7" fill="none" stroke="#0D355C" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    
  </defs>
  <style>
  :root {
    --gl-ink: #071827;
    --gl-deep: #0B1D2A;
    --gl-blue: #0D355C;
    --gl-wave: #1F5D8C;
    --gl-gray: #6F7F8F;
    --gl-mountain: #A7ADB4;
    --gl-border: #E5E8EC;
    --gl-bg: #F7F4EF;
    --gl-paper: #FFFFFF;
    --gl-gold: #C8A766;
  }
  * { box-sizing: border-box; }
  text { font-family: "Noto Sans SC", "Source Han Sans SC", "PingFang SC", "Microsoft YaHei", Arial, sans-serif; fill: var(--gl-ink); letter-spacing: 0; }
  .serif { font-family: "Noto Serif SC", "Source Han Serif SC", "Songti SC", serif; }
  .mono { font-family: "Inter", "IBM Plex Sans", "Avenir", Arial, sans-serif; letter-spacing: .12em; }
  .label { fill: var(--gl-gray); font-size: 12px; }
  .title { fill: var(--gl-ink); font-size: 22px; font-weight: 700; }
  .subtitle { fill: var(--gl-gray); font-size: 11px; }
  .caption { fill: var(--gl-gray); font-size: 10px; }
  .fine { stroke: var(--gl-border); stroke-width: 1; }
  .gold { stroke: var(--gl-gold); }
  .blue { stroke: var(--gl-blue); }
  .wave { stroke: var(--gl-wave); }
  .card { fill: rgba(255,255,255,.86); stroke: var(--gl-border); stroke-width: 1; }
  .soft { filter: drop-shadow(0 10px 24px rgba(7,24,39,.06)); }
  .no-fill { fill: none; stroke-linecap: round; stroke-linejoin: round; }
</style>
  <rect width="360" height="220" fill="url(#paperShade)"/>
  <rect x="24" y="40" width="312" height="148" rx="10" class="card"/>
      <g transform="translate(48 68)"><rect width="48" height="40" rx="6" fill="#F8FAFB" stroke="#E5E8EC"/><text x="24" y="25" class="mono" font-size="12" text-anchor="middle">120ms</text><text x="24" y="58" class="caption" text-anchor="middle">快速</text></g><g transform="translate(114 68)"><rect width="48" height="40" rx="6" fill="#F8FAFB" stroke="#E5E8EC"/><text x="24" y="25" class="mono" font-size="12" text-anchor="middle">180ms</text><text x="24" y="58" class="caption" text-anchor="middle">常规</text></g><g transform="translate(180 68)"><rect width="48" height="40" rx="6" fill="#F8FAFB" stroke="#E5E8EC"/><text x="24" y="25" class="mono" font-size="12" text-anchor="middle">240ms</text><text x="24" y="58" class="caption" text-anchor="middle">内容</text></g><g transform="translate(246 68)"><rect width="48" height="40" rx="6" fill="#F8FAFB" stroke="#E5E8EC"/><text x="24" y="25" class="mono" font-size="12" text-anchor="middle">320ms</text><text x="24" y="58" class="caption" text-anchor="middle">结构</text></g>
      <polyline points="58,154 118,124 178,112 238,108 302,106" fill="none" stroke="#0D355C" stroke-width="2"/>
      <text x="38" y="28" class="caption">Duration / Easing / Delay / Hover Lift / Opacity Fade / Soft Blur</text>
</svg>
