<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>账户状态｜观澜AI</title>
  <link rel="stylesheet" href="assets/styles.css">
</head>
<body class="page-account">
  <header class="site-header" data-header></header>
  <main class="auth-page account-page">
    <section class="auth-hero account-hero">
      <div class="auth-hero-copy">
        <span class="auth-kicker">ACCOUNT</span>
        <h1>账户与阅读权限</h1>
        <p>查看当前账号、会员状态和阅读权限。</p>
      </div>
    </section>

    <section class="account-grid">
      <article class="account-panel account-status-card" data-account-status></article>
      <article class="account-panel">
        <span class="auth-kicker">ACCESS LAYER</span>
        <h2>当前可读内容</h2>
        <div class="account-access-list" data-account-access></div>
      </article>
      <article class="account-panel">
        <span class="auth-kicker">NEXT STEP</span>
        <h2>继续阅读路径</h2>
        <div class="account-paths">
          <a href="daily.html">进入今日观察</a>
          <a href="pricing.html">查看会员方案</a>
          <a href="login.html">切换账号</a>
        </div>
      </article>
    </section>
  </main>
  <footer data-footer></footer>
  <script src="data/site-content.js"></script>
  <script src="assets/app.js"></script>
</body>
</html>
