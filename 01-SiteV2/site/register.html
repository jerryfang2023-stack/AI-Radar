<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>申请访问｜观澜AI</title>
  <link rel="stylesheet" href="assets/styles.css">
</head>
<body class="page-register">
  <header class="site-header" data-header></header>
  <main class="auth-page auth-register-page">
    <section class="auth-hero">
      <div class="auth-hero-copy">
        <span class="auth-kicker">CREATE ACCOUNT</span>
        <h1>创建账号，开始阅读 AI 商业信号</h1>
        <p>邀请注册。已有邀请码可直接创建账号；没有邀请码可先提交申请。</p>
        <div class="auth-hero-links">
          <a href="invite-request.html">申请邀请码</a>
          <a href="login.html">已有账号登录</a>
        </div>
      </div>
    </section>

    <section class="auth-shell">
      <form class="auth-form-v2" data-auth-form data-success="账号已创建，已记录登录状态。">
        <div class="auth-form-head">
          <span class="auth-kicker">REGISTER</span>
          <h2>创建账号</h2>
          <p>常用邮箱 + 有效邀请码。权限跟随账号。</p>
        </div>
        <div class="auth-field-grid-v2">
          <label class="auth-field">
            <span>姓名</span>
            <input name="name" autocomplete="name" required>
          </label>
          <label class="auth-field">
            <span>邮箱</span>
            <input name="contact" type="email" autocomplete="email" required>
          </label>
          <label class="auth-field auth-field-wide">
            <span>邀请码（必填）</span>
            <input name="inviteCode" autocomplete="one-time-code" placeholder="输入收到的邀请码" required>
          </label>
          <label class="auth-field">
            <span>设置密码</span>
            <input name="password" type="password" autocomplete="new-password" minlength="6" required>
          </label>
          <label class="auth-field">
            <span>确认密码</span>
            <input name="confirmPassword" type="password" autocomplete="new-password" minlength="6" required>
          </label>
        </div>
        <div class="auth-actions">
          <button class="button primary" type="submit">创建账号并开始阅读</button>
          <a class="button secondary" href="invite-request.html">申请邀请码</a>
        </div>
        <p class="auth-boundary">内容用于观察 AI 商业变化，不构成经营、投资或合作建议。</p>
        <div class="auth-status" role="status" aria-live="polite"></div>
      </form>

      <aside class="auth-side-note">
        <span>READABLE LAYERS</span>
        <ol>
          <li><strong>邀请制</strong><p>需要有效邀请码完成注册。</p></li>
          <li><strong>5 个栏目</strong><p>简报、信号、观点、机会、趋势。</p></li>
          <li><strong>持续观察</strong><p>保留来源边界和反证空间。</p></li>
        </ol>
      </aside>
    </section>
  </main>
  <footer data-footer></footer>
  <script src="data/site-content.js?v=20260524-1258"></script>
  <script src="assets/app.js"></script>
</body>
</html>
