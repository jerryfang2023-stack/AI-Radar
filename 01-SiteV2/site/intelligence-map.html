<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="wavesight-version" content="V3.3.5-builder-obsidian-date-timelines">
  <title>情报地图｜观澜 AI</title>
  <link rel="stylesheet" href="assets/wavesight-nav.css">
  <link rel="stylesheet" href="assets/v3-data-observation-desk.css?v=20260609-page-title">
</head>
<body class="v3-data-observation-page">
  <header class="wavesight-topbar" aria-label="观澜 AI 导航">
    <a class="wavesight-brand" href="v3-data-observation.html" aria-label="观澜 AI 首页">
      <img class="wavesight-logo" src="assets/brand/logo-wavesight-reference-horizontal.svg" alt="观澜 AI Wavesight AI">
    </a>
    <nav class="wavesight-nav" aria-label="主导航">
      <a href="v3-data-observation.html">商业信号<span>Business Signals</span></a>
      <a href="intelligence-map.html" aria-current="page">情报地图<span>Intelligence Map</span></a>
      <a href="follow-builders.html">一线观点<span>Builders</span></a>
      <a href="community-intelligence.html">社群情报<span>Community Intel</span></a>
    </nav>
  </header>

  <main class="desk-shell">
    <section class="desk-section desk-trends" aria-labelledby="relationship-title">
      <div class="section-head page-title-head">
        <div>
          <p class="desk-kicker">Intelligence Map</p>
          <h1 id="relationship-title">情报地图 <span class="workbench-summary" data-day-summary>读取中</span></h1>
        </div>
        <div class="workbench-actions">
          <div class="date-controls" data-date-controls aria-label="日期筛选">
            <select data-date-year aria-label="选择年份"></select>
            <select data-date-month aria-label="选择月份"></select>
            <select data-date-day aria-label="选择日期"></select>
          </div>
        </div>
      </div>
      <div class="relationship-overview" data-relationship-overview></div>
      <div class="trend-links" data-relationship-links></div>
    </section>

    <section class="desk-section desk-trends" aria-labelledby="candidate-title">
      <div class="section-head">
        <div>
          <p class="desk-kicker">Trend Candidates</p>
          <h2 id="candidate-title">趋势候选</h2>
        </div>
      </div>
      <div class="candidate-grid" data-trend-candidates></div>
    </section>

    <section class="desk-section desk-trends" aria-labelledby="history-title">
      <div class="section-head">
        <div>
          <p class="desk-kicker">History</p>
          <h2 id="history-title">历史趋势</h2>
          <p class="section-note">保留已沉淀的趋势资产，作为观察今天信号时的参照。</p>
        </div>
      </div>
      <div class="history-list" data-historical-trends></div>
    </section>
  </main>

  <dialog class="detail-dialog" data-detail-dialog>
    <div class="detail-panel">
      <button class="detail-close" type="button" data-detail-close aria-label="关闭详情">×</button>
      <div data-detail-content></div>
    </div>
  </dialog>

  <script src="assets/v3-data-observation-desk.js?v=20260609-network-zoom" defer></script>
</body>
</html>
