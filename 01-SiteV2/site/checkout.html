<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>访问确认｜观澜AI</title>
  <link rel="stylesheet" href="assets/styles.css">
</head>
<body class="page-checkout">
  <header class="site-header" data-header></header>
  <main class="auth-page checkout-page">
    <section class="auth-hero checkout-hero">
      <div class="auth-hero-copy">
        <span class="auth-kicker">CHECKOUT</span>
        <h1>确认订阅</h1>
        <p>确认订阅方案和联系邮箱。</p>
      </div>
    </section>

    <section class="auth-shell checkout-shell">
      <form class="auth-form-v2" data-auth-form data-success="订阅已确认，已记录会员状态。">
        <div class="auth-form-head">
          <span class="auth-kicker">CHECKOUT</span>
          <h2>确认订阅</h2>
          <p>请确认邮箱和订阅方案。</p>
        </div>
        <label class="auth-field">
          <span>邮箱</span>
          <input name="contact" type="email" autocomplete="email" required>
        </label>
        <label class="auth-field">
          <span>订阅方案</span>
          <select name="plan" required>
            <option value="">请选择</option>
            <option>月度会员</option>
            <option>年度会员</option>
          </select>
        </label>
        <label class="auth-check">
          <input name="boundary" type="checkbox" required>
          <span>我知道内容用于观察 AI 商业变化，不构成经营、投资或合作建议。</span>
        </label>
        <div class="auth-actions">
          <button class="button primary" type="submit">确认订阅</button>
          <a class="button secondary" href="account.html">查看账户状态</a>
        </div>
        <div class="auth-status" role="status" aria-live="polite"></div>
      </form>

      <aside class="auth-side-note">
        <span>CHECKOUT</span>
        <ol>
          <li><strong>确认方案</strong><p>选择月度或年度会员。</p></li>
          <li><strong>确认邮箱</strong><p>权限跟随账号邮箱。</p></li>
          <li><strong>继续阅读</strong><p>回到账户页查看阅读权限。</p></li>
        </ol>
      </aside>
    </section>
  </main>
  <footer data-footer></footer>
  <script src="data/site-content.js?v=20260524-1258"></script>
  <script src="assets/app.js"></script>
</body>
</html>
