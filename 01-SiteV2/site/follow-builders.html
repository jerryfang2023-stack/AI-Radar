<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Builder 言论观察台 | WaveSight AI</title>
  <link rel="stylesheet" href="assets/follow-builders.css">
</head>
<body class="builder-page">
  <header class="builder-brandbar" aria-label="WaveSight AI">
    <a class="brand-lockup" href="follow-builders.html" aria-label="WaveSight AI Builder 言论观察台">
      <img class="brand-logo" src="assets/brand/logo-wavesight-reference-horizontal.svg" alt="WaveSight AI">
    </a>
    <div class="brand-context">
      <span>FOLLOW BUILDERS</span>
      <strong>Builder 言论观察台</strong>
    </div>
  </header>

  <main class="builder-shell">
    <section class="builder-controls" aria-label="筛选 Builder 言论">
      <label>
        <span>关键词</span>
        <input type="search" data-search placeholder="搜索人物、公司、主题或原文">
      </label>
      <label>
        <span>日期</span>
        <select data-date-filter></select>
      </label>
      <label>
        <span>主题</span>
        <select data-topic-filter></select>
      </label>
      <label>
        <span>来源</span>
        <select data-source-filter>
          <option value="all">全部来源</option>
          <option value="x">X / Twitter</option>
          <option value="podcast">Podcast</option>
        </select>
      </label>
    </section>

    <section class="builder-board" aria-label="Builder 言论列表">
      <aside class="builder-rail">
        <div class="section-head">
          <div>
            <p class="builder-kicker">Builders</p>
            <h2>人物</h2>
          </div>
        </div>
        <div class="builder-list" data-builder-list></div>

        <section class="podcast-section" aria-labelledby="podcast-title">
          <div class="section-head">
            <div>
              <p class="builder-kicker">Podcasts</p>
              <h2 id="podcast-title">长访谈观察</h2>
            </div>
          </div>
          <div class="podcast-grid" data-podcast-grid></div>
        </section>
      </aside>

      <section class="remark-stage">
        <div class="section-head stage-head">
          <div>
            <p class="builder-kicker">Daily Remarks</p>
            <h2>公开言论</h2>
          </div>
          <span class="result-count" data-result-count></span>
        </div>
        <div class="remark-grid" data-remark-grid></div>
      </section>
    </section>
  </main>

  <dialog class="remark-dialog" data-dialog>
    <div class="dialog-panel">
      <button class="dialog-close" type="button" data-dialog-close aria-label="关闭">×</button>
      <div data-dialog-content></div>
    </div>
  </dialog>

  <script src="assets/follow-builders.js" defer></script>
</body>
</html>
