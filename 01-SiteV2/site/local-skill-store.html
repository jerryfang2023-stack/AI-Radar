<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<title>Skill Store</title>
<style>
  :root {
    --page: #fffdf8;
    --paper: #ffffff;
    --soft: #f7f4ef;
    --ink: #071827;
    --muted: #667386;
    --line: rgba(7, 24, 39, .12);
    --blue: #123a5f;
    --gold: #c8a45d;
    --green: #377c61;
    --orange: #b85f28;
    --red: #9a4832;
    --purple: #6f5a93;
    --shadow: 0 16px 44px rgba(7, 24, 39, .06);
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    color: var(--ink);
    background:
      linear-gradient(180deg, rgba(255,253,248,.96), rgba(247,244,239,.68)),
      var(--page);
    font-family: Inter, "Segoe UI", "Microsoft YaHei", sans-serif;
    line-height: 1.5;
  }
  body.is-embedded {
    background: transparent;
  }
  body.is-embedded .shell {
    max-width: none;
    padding: 0;
  }
  button, input, select { font: inherit; }
  button { cursor: pointer; }
  .shell { max-width: 1480px; margin: 0 auto; padding: 28px; }
  .header {
    display: grid;
    grid-template-columns: minmax(0, 1fr) auto;
    gap: 18px;
    align-items: end;
    padding-bottom: 18px;
    border-bottom: 1px solid var(--line);
  }
  .eyebrow { color: var(--gold); font-size: 12px; font-weight: 760; letter-spacing: 0; }
  h1, h2, h3, p { margin: 0; }
  h1 { margin-top: 6px; font: 700 34px/1.16 Georgia, "Noto Serif SC", serif; }
  h2 { font: 700 22px/1.28 Georgia, "Noto Serif SC", serif; }
  h3 { font-size: 15px; line-height: 1.35; }
  p { color: var(--muted); font-size: 13px; line-height: 1.65; }
  .header-side {
    justify-self: end;
    display: grid;
    justify-items: end;
    gap: 8px;
    color: var(--muted);
    font-size: 12px;
    text-align: right;
  }
  .meta-line { margin-top: 8px; color: var(--muted); font-size: 12px; }
  .metrics { display: grid; grid-template-columns: repeat(6, minmax(0, 1fr)); gap: 7px; margin-top: 10px; }
  .view-tabs {
    display: inline-flex;
    gap: 6px;
    padding: 5px;
    border: 1px solid var(--line);
    border-radius: 8px;
    background: rgba(255,255,255,.72);
  }
  .view-tabs button {
    min-height: 34px;
    border: 0;
    border-radius: 6px;
    background: transparent;
    color: #34445a;
    padding: 0 14px;
    font-size: 13px;
    font-weight: 760;
  }
  .view-tabs button[aria-current="true"] {
    background: var(--blue);
    color: #fffdf8;
  }
  .skill-view { display: none; }
  .skill-view.is-active { display: block; }
  .metric, .panel, .skill-card, .issue-row, .lane-row {
    border: 1px solid var(--line);
    border-radius: 8px;
    background: rgba(255,255,255,.82);
    box-shadow: var(--shadow);
  }
  .metric {
    min-height: 42px;
    min-width: 0;
    padding: 7px 9px;
    display: flex;
    align-items: center;
    justify-content: flex-start;
    gap: 10px;
    box-shadow: none;
  }
  .metric span { color: var(--gold); font-size: 10px; font-weight: 760; white-space: nowrap; }
  .metric strong { color: var(--blue); font-size: 16px; line-height: 1; text-align: left; white-space: nowrap; }
  .ops-grid { display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 12px; margin-top: 16px; }
  .ops-grid.cleanup-grid { grid-template-columns: minmax(0, 1fr); }
  .ops-grid.cleanup-attention-grid { grid-template-columns: minmax(0, 1fr); }
  .panel { padding: 16px; box-shadow: none; }
  .panel-head { display: flex; justify-content: space-between; gap: 12px; align-items: end; margin-bottom: 12px; }
  .panel-actions { display: flex; flex-wrap: wrap; justify-content: flex-end; gap: 8px; }
  .detail-actions { display: flex; justify-content: flex-end; margin-top: 12px; }
  .action-button {
    min-height: 34px;
    border: 1px solid var(--line);
    border-radius: 6px;
    background: #fff;
    color: #34445a;
    padding: 0 12px;
    font-size: 12px;
    font-weight: 760;
    white-space: nowrap;
  }
  .action-button.primary {
    border-color: var(--blue);
    background: var(--blue);
    color: #fffdf8;
  }
  .action-button:disabled {
    cursor: default;
    opacity: .52;
  }
  .action-button.danger {
    border-color: var(--red);
    background: var(--red);
    color: #fffdf8;
  }
  .lane-list, .issue-list, .cleanup-list { display: grid; gap: 8px; }
  .lane-row, .issue-row {
    width: 100%;
    min-height: 46px;
    padding: 10px 12px;
    display: grid;
    grid-template-columns: 150px minmax(0, 1fr) auto;
    gap: 12px;
    align-items: center;
    border-radius: 6px;
    box-shadow: none;
    text-align: left;
  }
  .lane-row span, .issue-row span { color: var(--muted); font-size: 12px; }
  .lane-row strong, .issue-row strong { overflow-wrap: anywhere; }
  .lane-row em { color: var(--green); font-style: normal; font-size: 12px; }
  .issue-row em {
    max-width: 520px;
    overflow: hidden;
    color: var(--muted);
    font-style: normal;
    font-size: 12px;
    text-align: right;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  .issue-row { border-color: rgba(184,95,40,.24); color: var(--ink); }
  .issue-row strong { color: var(--orange); font-size: 12px; text-align: right; }
  .cleanup-action-status {
    margin: -4px 0 10px;
    padding: 10px 12px;
    border: 1px solid rgba(200,160,82,.38);
    border-radius: 6px;
    background: #fff8ea;
  }
  .cleanup-action-status[hidden] { display: none; }
  .cleanup-action-status h3 { margin-bottom: 4px; color: var(--blue); font-size: 13px; }
  .cleanup-action-status p { color: #34445a; font-size: 12px; line-height: 1.55; }
  .cleanup-action-status p + p { margin-top: 3px; }
  .detail-action-status { margin: 10px 0 0; }
  .cleanup-toolbar {
    display: flex;
    flex-wrap: wrap;
    justify-content: flex-end;
    align-items: center;
    gap: 8px;
  }
  .cleanup-selection-count {
    margin-right: auto;
    color: var(--muted);
    font-size: 12px;
  }
  .cleanup-section { display: grid; gap: 8px; }
  .cleanup-section + .cleanup-section { margin-top: 14px; }
  .cleanup-section-head {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
    padding-bottom: 4px;
    border-bottom: 1px solid var(--line);
  }
  .cleanup-section-head h3 { font-size: 15px; }
  .cleanup-section-head span { color: var(--muted); font-size: 12px; }
  .cleanup-row {
    min-height: 42px;
    display: grid;
    grid-template-columns: 22px minmax(170px, .46fr) minmax(280px, 1fr) minmax(340px, .82fr);
    gap: 10px;
    align-items: center;
    padding: 9px 10px;
    border: 1px solid rgba(184,95,40,.22);
    border-radius: 6px;
    background: rgba(255,255,255,.82);
  }
  .cleanup-row input { width: 16px; min-height: 16px; padding: 0; }
  .cleanup-row strong {
    min-width: 0;
    overflow: hidden;
    color: var(--blue);
    font-size: 13px;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  .cleanup-row em {
    min-width: 0;
    overflow: hidden;
    color: var(--muted);
    font-style: normal;
    font-size: 12px;
    text-align: right;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  .cleanup-status {
    min-width: 0;
    display: flex;
    justify-content: flex-end;
    align-items: center;
    gap: 8px;
  }
  .cleanup-status em { flex: 1 1 auto; }
  .row-action {
    min-height: 28px;
    border: 1px solid rgba(18,58,95,.16);
    border-radius: 6px;
    background: rgba(18,58,95,.06);
    color: var(--blue);
    padding: 0 9px;
    font-size: 11px;
    font-weight: 760;
    white-space: nowrap;
  }
  .row-action:hover { background: rgba(18,58,95,.11); }
  .cleanup-desc {
    min-width: 0;
    overflow: hidden;
    color: #34445a;
    font-size: 12px;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  .trash-row {
    border-color: rgba(154,72,50,.22);
  }
  .controls {
    position: sticky;
    top: 0;
    z-index: 3;
    display: grid;
    grid-template-columns: minmax(420px, 1fr) minmax(210px, .28fr) minmax(210px, .28fr) minmax(210px, .28fr);
    gap: 8px;
    align-items: center;
    margin-top: 8px;
    padding: 8px;
    border: 1px solid var(--line);
    border-radius: 8px;
    background: rgba(255,253,248,.9);
    backdrop-filter: blur(12px);
  }
  .controls[hidden] { display: none; }
  .shell[data-skill-view="catalog"] .controls {
    grid-template-columns: minmax(420px, 1fr) minmax(230px, .34fr) minmax(230px, .34fr);
  }
  .shell[data-skill-view="cleanup"] .controls {
    grid-template-columns: minmax(360px, 1fr) minmax(190px, .25fr) minmax(190px, .25fr) minmax(190px, .25fr);
  }
  input, select {
    width: 100%;
    min-height: 36px;
    border: 1px solid var(--line);
    border-radius: 6px;
    background: #fff;
    color: var(--ink);
    padding: 0 12px;
  }
  input { min-width: 0; }
  [data-cleanup-filter][hidden] { display: none; }
  .layout { display: grid; grid-template-columns: 230px minmax(0, 1fr); gap: 18px; margin-top: 18px; align-items: start; }
  .layout[hidden] { display: none !important; }
  .sidebar {
    position: sticky;
    top: 76px;
    display: grid;
    gap: 4px;
    padding: 8px;
    border: 1px solid var(--line);
    border-radius: 8px;
    background: rgba(255,255,255,.64);
  }
  .sidebar button {
    min-height: 34px;
    border: 0;
    border-radius: 6px;
    background: transparent;
    color: #34445a;
    padding: 0 9px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    text-align: left;
  }
  .sidebar button.active { background: var(--blue); color: #fffdf8; }
  .results-head { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
  .results-head span { color: var(--muted); font-size: 12px; }
  .skill-section + .skill-section { margin-top: 22px; }
  .skill-section header {
    display: flex;
    justify-content: space-between;
    gap: 12px;
    align-items: center;
    padding-bottom: 8px;
    margin-bottom: 10px;
    border-bottom: 1px solid var(--line);
  }
  .skill-section header strong { font: 700 20px/1.2 Georgia, "Noto Serif SC", serif; }
  .skill-section header span { color: var(--muted); font-size: 12px; }
  .skill-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(292px, 1fr)); gap: 10px; }
  .skill-card {
    min-height: 198px;
    padding: 14px;
    display: flex;
    flex-direction: column;
    gap: 9px;
    box-shadow: none;
    transition: border-color .16s ease, transform .16s ease, box-shadow .16s ease;
  }
  .skill-card:hover { border-color: rgba(200,164,93,.62); transform: translateY(-1px); box-shadow: 0 12px 30px rgba(7,24,39,.06); }
  .skill-card.is-guanlan { border-color: rgba(200,164,93,.48); background: linear-gradient(180deg, #fff, #fff9ec); }
  .skill-card.has-issue { border-color: rgba(184,95,40,.28); }
  .skill-top { display: flex; justify-content: space-between; gap: 12px; align-items: start; }
  .skill-top strong { display: block; font-size: 15px; overflow-wrap: anywhere; }
  .skill-top span { display: block; margin-top: 3px; color: var(--muted); font-size: 12px; }
  .skill-top em {
    flex: 0 0 auto;
    max-width: 112px;
    color: var(--blue);
    background: rgba(200,164,93,.14);
    border: 1px solid rgba(200,164,93,.28);
    border-radius: 999px;
    padding: 3px 8px;
    font-style: normal;
    font-size: 11px;
    text-align: center;
  }
  .skill-card p {
    display: -webkit-box;
    min-height: 62px;
    overflow: hidden;
    -webkit-line-clamp: 3;
    -webkit-box-orient: vertical;
  }
  .tag-row { display: flex; gap: 6px; flex-wrap: wrap; margin-top: auto; }
  .tag {
    min-height: 22px;
    display: inline-flex;
    align-items: center;
    border-radius: 999px;
    background: rgba(7,24,39,.06);
    color: #34445a;
    padding: 0 8px;
    font-size: 11px;
  }
  .tag.blue { background: rgba(18,58,95,.1); color: var(--blue); }
  .tag.gold { background: rgba(200,164,93,.18); color: #745b1f; }
  .tag.green { background: rgba(55,124,97,.11); color: var(--green); }
  .tag.orange { background: rgba(184,95,40,.11); color: var(--orange); }
  .tag.red { background: rgba(154,72,50,.12); color: var(--red); }
  .tag.purple { background: rgba(111,90,147,.12); color: var(--purple); }
  .skill-foot { display: flex; justify-content: space-between; gap: 8px; color: var(--muted); font-size: 11px; }
  .empty, .empty-line {
    padding: 28px;
    border: 1px solid var(--line);
    border-radius: 8px;
    background: rgba(255,255,255,.72);
    color: var(--muted);
    text-align: center;
  }
  .detail-backdrop {
    position: fixed;
    inset: 0;
    z-index: 20;
    display: none;
    place-items: center;
    padding: 28px;
    background: rgba(7,24,39,.42);
    backdrop-filter: blur(12px);
  }
  .detail-backdrop.open { display: grid; }
  .detail-modal {
    width: min(920px, 100%);
    max-height: min(780px, 92vh);
    overflow: auto;
    border: 1px solid rgba(200,164,93,.42);
    border-radius: 8px;
    background: var(--page);
    box-shadow: 0 30px 90px rgba(7,24,39,.28);
  }
  .detail-head {
    display: flex;
    justify-content: space-between;
    gap: 18px;
    padding: 20px;
    border-bottom: 1px solid var(--line);
    background: linear-gradient(180deg, #fff, #fff8ea);
  }
  .detail-head h2 { overflow-wrap: anywhere; }
  .detail-head button {
    width: 34px;
    height: 34px;
    border: 1px solid var(--line);
    border-radius: 999px;
    background: #fff;
  }
  .detail-body { padding: 20px; display: grid; gap: 14px; }
  .detail-block, .detail-item {
    border: 1px solid var(--line);
    border-radius: 8px;
    background: rgba(255,255,255,.72);
    padding: 14px;
  }
  .detail-block h3 { margin-bottom: 8px; color: var(--blue); }
  .detail-block p + p { margin-top: 6px; }
  .detail-grid { display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 10px; }
  .detail-item span { display: block; color: var(--muted); font-size: 11px; font-weight: 760; }
  .detail-item strong { display: block; margin-top: 5px; font-size: 13px; overflow-wrap: anywhere; }
  @media (max-width: 980px) {
    .metrics { grid-template-columns: repeat(3, minmax(0, 1fr)); }
    .ops-grid, .layout { grid-template-columns: 1fr; }
    .controls { grid-template-columns: 1fr 1fr; }
    .sidebar { position: static; }
  }
  @media (max-width: 640px) {
    .shell { padding: 18px; }
    .header, .metrics, .detail-grid { grid-template-columns: 1fr; }
    .header-side { justify-self: start; justify-items: start; text-align: left; }
    .controls { grid-template-columns: 1fr; }
    .skill-grid { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>
  <main class="shell">
    <header class="header">
      <div>
        <div class="eyebrow">观澜 AI 能力管理</div>
        <h1>Skill Store</h1>
        <div class="meta-line" data-generated>更新中</div>
      </div>
      <div class="header-side">
        <section class="view-tabs" aria-label="Skill Store 视图">
          <button type="button" data-view="catalog" aria-current="true">skill目录</button>
          <button type="button" data-view="cleanup">清理管理</button>
        </section>
      </div>
    </header>

    <section class="metrics" data-metrics></section>

    <section class="skill-view is-active" data-view-panel="catalog"></section>

    <section class="skill-view" data-view-panel="cleanup">
      <section class="ops-grid cleanup-grid">
        <article class="panel">
          <div class="panel-head">
            <div><h2>清理列表</h2></div>
            <div class="cleanup-toolbar">
              <span class="cleanup-selection-count" data-cleanup-selection>已选 0</span>
              <button type="button" class="action-button" data-cleanup-action="select-all">全选列表</button>
              <button type="button" class="action-button primary" data-cleanup-action="delete-selected">移入暂存区</button>
            </div>
          </div>
          <div class="cleanup-action-status" data-cleanup-action-status aria-live="polite" hidden></div>
          <section class="cleanup-section">
            <div class="cleanup-section-head"><h3>建议清理</h3><span data-cleanup-candidate-count></span></div>
            <div class="cleanup-list" data-cleanup-delete-candidates></div>
          </section>
        </article>
        <article class="panel">
          <div class="panel-head">
            <div><h2>永久删除暂存区</h2></div>
            <div class="cleanup-toolbar">
              <span class="cleanup-selection-count" data-trash-selection>已选 0</span>
              <button type="button" class="action-button" data-trash-action="refresh">刷新暂存区</button>
              <button type="button" class="action-button" data-trash-action="select-all">全选暂存区</button>
              <button type="button" class="action-button danger" data-trash-action="permanent-delete">永久删除选中</button>
            </div>
          </div>
          <div class="cleanup-action-status" data-trash-action-status aria-live="polite" hidden></div>
          <section class="cleanup-section">
            <div class="cleanup-section-head"><h3>已移入暂存区</h3><span data-trash-count></span></div>
            <div class="cleanup-list" data-trash-items></div>
          </section>
        </article>
      </section>
    </section>

    <section class="controls" data-controls>
      <input type="search" data-search placeholder="搜索 skill 名称、分类或描述">
      <select data-sort>
        <option value="priority">推荐排序</option>
        <option value="name">按名称</option>
        <option value="modified">按最近更新</option>
        <option value="usage">按使用次数</option>
      </select>
      <select data-group>
        <option value="lane">按领域分组</option>
        <option value="status">按状态分组</option>
        <option value="category">按类别分组</option>
      </select>
      <select data-cleanup-filter hidden>
        <option value="cleanup">全部清理候选</option>
        <option value="cleanup-archive">归档候选</option>
        <option value="cleanup-delete">删除候选</option>
        <option value="cleanup-merge">合并复核</option>
        <option value="cleanup-observe">观察</option>
      </select>
    </section>

    <section class="layout" data-catalog-list>
      <aside class="sidebar" data-sidebar></aside>
      <section>
        <div class="results-head"><h2>Skills</h2><span data-results-count></span></div>
        <div data-skill-list></div>
      </section>
    </section>
  </main>

  <div class="detail-backdrop" data-detail role="dialog" aria-modal="true">
    <div class="detail-modal">
      <div class="detail-head">
        <div data-detail-title></div>
        <button type="button" data-close-detail aria-label="关闭">×</button>
      </div>
      <div class="detail-body" data-detail-body></div>
    </div>
  </div>

  <script>
    if (new URLSearchParams(location.search).get("embed") === "1") document.body.classList.add("is-embedded");
  </script>
  <script src="data/local-skill-store-data.js?v=20260613-skill-store-v132"></script>
  <script src="assets/local-skill-store.js?v=20260613-skill-store-v132"></script>
</body>
</html>
