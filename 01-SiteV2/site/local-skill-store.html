<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Skill Store Dashboard</title>
<style>
  :root {
    --gl-bg-page: #fffdf8;
    --gl-bg-soft: #f7f4ef;
    --gl-paper: rgba(255, 255, 255, 0.78);
    --gl-paper-strong: #ffffff;
    --gl-ink: #071827;
    --gl-ink-soft: #34445a;
    --gl-muted: #788392;
    --gl-line: rgba(7, 24, 39, 0.12);
    --gl-line-strong: rgba(7, 24, 39, 0.2);
    --gl-blue: #123a5f;
    --gl-blue-2: #1f5f8b;
    --gl-gold: #c8a45d;
    --gl-gold-soft: rgba(200, 164, 93, 0.15);
    --gl-green: #377c61;
    --gl-yellow: #a97718;
    --gl-orange: #b85f28;
    --gl-purple: #6f5a93;
    --gl-radius: 8px;
    --gl-shadow: 0 18px 60px rgba(7, 24, 39, 0.08);
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    min-height: 100vh;
    background:
      linear-gradient(180deg, rgba(255,253,248,0.94), rgba(247,244,239,0.72)),
      radial-gradient(circle at 12% 0%, rgba(200,164,93,0.12), transparent 30%),
      var(--gl-bg-page);
    color: var(--gl-ink);
    font-family: "Aptos", "Segoe UI", "Microsoft YaHei", sans-serif;
    padding: 28px;
    line-height: 1.5;
  }
  .shell { max-width: 1480px; margin: 0 auto; }
  .header {
    display: grid;
    grid-template-columns: minmax(0, 1fr) auto;
    gap: 18px;
    align-items: end;
    margin-bottom: 22px;
    border-bottom: 1px solid var(--gl-line);
    padding-bottom: 18px;
  }
  .eyebrow {
    color: var(--gl-gold);
    font-size: 12px;
    font-weight: 700;
    letter-spacing: 0;
    margin-bottom: 6px;
  }
  h1 {
    font-family: "Georgia", "Noto Serif SC", "SimSun", serif;
    font-size: 34px;
    line-height: 1.15;
    font-weight: 700;
    letter-spacing: 0;
  }
  .subtitle { color: var(--gl-ink-soft); font-size: 14px; max-width: 720px; margin-top: 8px; }
  .actions { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; justify-content: flex-end; }
  button {
    border: 1px solid var(--gl-line-strong);
    background: var(--gl-paper-strong);
    color: var(--gl-ink);
    border-radius: 999px;
    padding: 8px 14px;
    cursor: pointer;
    font-size: 13px;
  }
  button:hover { border-color: var(--gl-gold); color: var(--gl-blue); }
  .last-updated { color: var(--gl-muted); font-size: 12px; }
  .guanlan-panel {
    display: grid;
    grid-template-columns: minmax(320px, 1.45fr) repeat(3, minmax(170px, 0.55fr));
    gap: 12px;
    margin-bottom: 16px;
  }
  .signal-card {
    background: linear-gradient(145deg, rgba(7,24,39,0.96), rgba(18,58,95,0.92));
    color: #fffdf8;
    border: 1px solid rgba(200,164,93,0.42);
    border-radius: var(--gl-radius);
    padding: 18px;
    box-shadow: var(--gl-shadow);
  }
  .signal-card .kicker { color: #dfc27f; font-size: 12px; font-weight: 700; margin-bottom: 10px; }
  .signal-card .headline { font-family: "Georgia", "Noto Serif SC", serif; font-size: 28px; line-height: 1.18; }
  .signal-card .subline { color: rgba(255,253,248,0.68); font-size: 12px; margin-top: 12px; }
  .signal-card .copy { color: rgba(255,253,248,0.72); font-size: 13px; margin-top: 10px; }
  .stat-card {
    background: var(--gl-paper);
    border: 1px solid var(--gl-line);
    border-radius: var(--gl-radius);
    padding: 16px;
    box-shadow: 0 12px 36px rgba(7, 24, 39, 0.05);
    backdrop-filter: blur(12px);
    min-height: 120px;
    display: flex;
    flex-direction: column;
    justify-content: center;
  }
  .stat-card .num { color: var(--gl-blue); font-size: 30px; line-height: 1; font-weight: 760; }
  .stat-card .num span { font-size: 14px; font-weight: 700; color: var(--gl-ink-soft); }
  .stat-card .label { color: var(--gl-muted); font-size: 12px; margin-top: 10px; line-height: 1.45; }
  .controls {
    position: sticky;
    top: 0;
    z-index: 5;
    display: flex;
    gap: 10px;
    margin-bottom: 18px;
    flex-wrap: wrap;
    align-items: center;
    background: rgba(255,253,248,0.88);
    border: 1px solid var(--gl-line);
    border-radius: var(--gl-radius);
    padding: 12px;
    backdrop-filter: blur(14px);
  }
  .controls input, .controls select {
    background: #fff;
    border: 1px solid var(--gl-line);
    border-radius: 6px;
    padding: 9px 12px;
    color: var(--gl-ink);
    font-size: 14px;
  }
  .controls input { flex: 1; min-width: 240px; }
  .controls input:focus, .controls select:focus { outline: none; border-color: var(--gl-gold); box-shadow: 0 0 0 3px var(--gl-gold-soft); }
  .chip-group { display: flex; gap: 7px; flex-wrap: wrap; }
  .chip {
    background: #fff;
    border: 1px solid var(--gl-line);
    border-radius: 999px;
    padding: 6px 11px;
    font-size: 12px;
    cursor: pointer;
    color: var(--gl-ink-soft);
    transition: all 0.16s ease;
  }
  .chip:hover { border-color: var(--gl-gold); color: var(--gl-blue); }
  .chip.active { background: var(--gl-blue); color: #fffdf8; border-color: var(--gl-blue); }
  .chip.guanlan-chip { border-color: rgba(200,164,93,0.48); background: rgba(200,164,93,0.12); color: var(--gl-blue); font-weight: 700; }
  .chip.guanlan-chip.active { background: var(--gl-gold); border-color: var(--gl-gold); color: var(--gl-ink); }
  .layout { display: flex; gap: 18px; align-items: flex-start; }
  .sidebar {
    width: 220px;
    flex-shrink: 0;
    position: sticky;
    top: 78px;
    background: rgba(255,255,255,0.55);
    border: 1px solid var(--gl-line);
    border-radius: var(--gl-radius);
    padding: 8px;
  }
  .cat-list { display: flex; flex-direction: column; gap: 3px; }
  .cat-item {
    padding: 8px 10px;
    border-radius: 6px;
    font-size: 13px;
    cursor: pointer;
    color: var(--gl-ink-soft);
    display: flex;
    justify-content: space-between;
    gap: 10px;
    transition: all 0.12s ease;
  }
  .cat-item:hover { background: var(--gl-bg-soft); color: var(--gl-ink); }
  .cat-item.active { background: var(--gl-blue); color: #fffdf8; }
  .cat-item.guanlan-fixed { border: 1px solid rgba(200,164,93,0.35); color: var(--gl-blue); font-weight: 700; }
  .cat-item.guanlan-fixed.active { background: var(--gl-gold); color: var(--gl-ink); border-color: var(--gl-gold); }
  .cat-item .badge { font-size: 11px; opacity: 0.72; }
  .main-content { flex: 1; min-width: 0; }
  .category-section { margin-bottom: 28px; }
  .category-header {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 10px;
    padding-bottom: 8px;
    border-bottom: 1px solid var(--gl-line);
  }
  .category-header strong { font-family: "Georgia", "Noto Serif SC", serif; font-size: 20px; }
  .category-header .count {
    background: var(--gl-bg-soft);
    border: 1px solid var(--gl-line);
    border-radius: 999px;
    padding: 2px 9px;
    font-size: 12px;
    color: var(--gl-ink-soft);
  }
  .category-header .size-info { color: var(--gl-muted); font-size: 12px; margin-left: auto; }
  .category-header a {
    color: inherit;
    text-decoration: none;
    font: inherit;
  }
  .category-header a:hover { color: var(--gl-blue); text-decoration: underline; }
  .skill-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(286px, 1fr)); gap: 10px; }
  .skill-card {
    background: var(--gl-paper-strong);
    border: 1px solid var(--gl-line);
    border-radius: var(--gl-radius);
    padding: 14px;
    display: flex;
    min-height: 178px;
    flex-direction: column;
    gap: 8px;
    cursor: pointer;
    transition: border-color 0.16s ease, transform 0.16s ease, box-shadow 0.16s ease;
  }
  .skill-card:hover { border-color: rgba(200,164,93,0.62); transform: translateY(-1px); box-shadow: 0 14px 34px rgba(7, 24, 39, 0.07); }
  .skill-card.guanlan-card { border-color: rgba(200,164,93,0.52); background: linear-gradient(180deg, #ffffff, #fffaf0); }
  .skill-card .top { display: flex; justify-content: space-between; align-items: flex-start; gap: 10px; }
  .skill-card .name { font-weight: 760; font-size: 15px; color: var(--gl-ink); word-break: break-word; }
  .role-pill {
    flex-shrink: 0;
    color: var(--gl-blue);
    background: var(--gl-gold-soft);
    border: 1px solid rgba(200,164,93,0.4);
    border-radius: 999px;
    padding: 3px 8px;
    font-size: 11px;
    font-weight: 700;
  }
  .desc {
    font-size: 12px;
    color: var(--gl-ink-soft);
    line-height: 1.55;
    display: -webkit-box;
    -webkit-line-clamp: 3;
    -webkit-box-orient: vertical;
    overflow: hidden;
    min-height: 4.6em;
  }
  .meta { display: flex; gap: 6px; flex-wrap: wrap; margin-top: auto; }
  .tag {
    font-size: 11px;
    padding: 2px 8px;
    border-radius: 999px;
    background: rgba(18,58,95,0.08);
    color: var(--gl-blue);
    border: 1px solid transparent;
  }
  .tag.green { background: rgba(55,124,97,0.1); color: var(--gl-green); }
  .tag.yellow { background: rgba(169,119,24,0.12); color: var(--gl-yellow); }
  .tag.purple { background: rgba(111,90,147,0.1); color: var(--gl-purple); }
  .tag.orange { background: rgba(184,95,40,0.1); color: var(--gl-orange); }
  .tag.blue { background: rgba(31,95,139,0.1); color: var(--gl-blue-2); }
  .tag.gold { background: var(--gl-gold-soft); color: var(--gl-blue); border-color: rgba(200,164,93,0.28); }
  .bottom-info { display: flex; justify-content: space-between; gap: 8px; font-size: 11px; color: var(--gl-muted); padding-top: 2px; }
  .empty {
    text-align: center;
    padding: 56px;
    color: var(--gl-muted);
    background: var(--gl-paper);
    border: 1px solid var(--gl-line);
    border-radius: var(--gl-radius);
  }
  .detail-backdrop {
    position: fixed;
    inset: 0;
    z-index: 30;
    display: none;
    align-items: center;
    justify-content: center;
    padding: 28px;
    background: rgba(7, 24, 39, 0.42);
    backdrop-filter: blur(12px);
  }
  .detail-backdrop.open { display: flex; }
  .detail-modal {
    width: min(860px, 100%);
    max-height: min(760px, 92vh);
    overflow: auto;
    background: var(--gl-bg-page);
    border: 1px solid rgba(200,164,93,0.42);
    border-radius: 10px;
    box-shadow: 0 30px 90px rgba(7, 24, 39, 0.28);
  }
  .detail-head {
    display: flex;
    justify-content: space-between;
    gap: 18px;
    padding: 22px;
    border-bottom: 1px solid var(--gl-line);
    background: linear-gradient(180deg, #ffffff, #fff8ea);
  }
  .detail-title { min-width: 0; }
  .detail-title h2 {
    font-family: "Georgia", "Noto Serif SC", serif;
    font-size: 26px;
    line-height: 1.2;
    word-break: break-word;
  }
  .detail-title p { color: var(--gl-ink-soft); font-size: 13px; margin-top: 8px; }
  .detail-close {
    width: 34px;
    height: 34px;
    display: grid;
    place-items: center;
    flex: 0 0 auto;
    border-radius: 999px;
    font-size: 18px;
    line-height: 1;
  }
  .detail-body { padding: 22px; display: grid; gap: 18px; }
  .detail-description {
    background: #ffffff;
    border: 1px solid rgba(200,164,93,0.38);
    border-radius: 8px;
    padding: 16px;
  }
  .detail-description h3 {
    font-size: 13px;
    color: var(--gl-blue);
    margin-bottom: 10px;
  }
  .detail-description .desc-full {
    color: var(--gl-ink);
    font-size: 14px;
    line-height: 1.72;
    white-space: pre-wrap;
  }
  .detail-original {
    margin-top: 12px;
    color: var(--gl-muted);
    font-size: 12px;
  }
  .detail-original summary { cursor: pointer; color: var(--gl-blue); }
  .detail-original div { margin-top: 8px; white-space: pre-wrap; line-height: 1.6; }
  .detail-grid { display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 10px; }
  .detail-item {
    background: rgba(255,255,255,0.72);
    border: 1px solid var(--gl-line);
    border-radius: 8px;
    padding: 12px;
    min-width: 0;
  }
  .detail-item .label {
    color: var(--gl-muted);
    font-size: 11px;
    font-weight: 700;
    margin-bottom: 6px;
  }
  .detail-item .value {
    color: var(--gl-ink);
    font-size: 13px;
    word-break: break-word;
  }
  .detail-item a { color: var(--gl-blue-2); text-decoration: none; }
  .detail-item a:hover { text-decoration: underline; }
  .detail-section h3 {
    font-size: 13px;
    color: var(--gl-blue);
    margin-bottom: 8px;
  }
  ::-webkit-scrollbar { width: 8px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: rgba(7,24,39,0.18); border-radius: 999px; }

    body { padding: 18px; }
    .header { grid-template-columns: 1fr; }
    .actions { justify-content: flex-start; }
    .guanlan-panel { grid-template-columns: 1fr 1fr; }
    .sidebar { display: none; }
    .layout { display: block; }
  }
  @media (max-width: 620px) {
    .guanlan-panel { grid-template-columns: 1fr; }
    h1 { font-size: 28px; }
    .skill-grid { grid-template-columns: 1fr; }
    .detail-grid { grid-template-columns: 1fr; }
  }
</style>
</head>

<div class="shell">
  <header class="header">
    <div>
      <div class="eyebrow">WAVESIGHT AI LOCAL TOOLING</div>

  <section class="controls" aria-label="Filters">

      <span class="chip" data-filter="medium">中频</span>
      <span class="chip" data-filter="rare">低频</span>
    </div>
  </section>

  <div class="layout">
    <aside class="sidebar" id="sidebar">
      <div class="cat-list" id="cat-list"></div>
    </aside>
    <main class="main-content" id="main-content"></main>
  </div>
</div>

<div class="detail-backdrop" id="detail-backdrop" role="dialog" aria-modal="true" aria-label="Skill 详情">
  <div class="detail-modal">
    <div class="detail-head">
      <div class="detail-title" id="detail-title"></div>
      <button class="detail-close" id="detail-close" title="关闭">×</button>
    </div>
    <div class="detail-body" id="detail-body"></div>
  </div>
</div>

function formatSize(kb) {
  if (kb < 1) return "<1 KB";
  if (kb < 1024) return kb + " KB";
  return (kb / 1024).toFixed(1) + " MB";
}

function timeAgo(dateStr) {
  const d = new Date(dateStr);
  const now = new Date();
  const diff = (now - d) / 86400000;
  if (diff < 1) return "今天";
  if (diff < 2) return "昨天";
  if (diff < 30) return Math.round(diff) + " 天前";
  return dateStr;
}

function escapeHtml(text) {
  const d = document.createElement("div");
  d.textContent = text || "";
  return d.innerHTML;
}

function getFrequency(s) {
  return localStorage.getItem("freq_" + s.name) || s.frequency;
}

function skillCard(s) {
  const tags = [];
  if (s.isGuanlan) tags.push('<span class="tag gold">观澜 AI</span>');
  if (s.hasScripts) tags.push('<span class="tag green">scripts</span>');
  if (s.hasConfig) tags.push('<span class="tag yellow">config</span>');
  if (s.hasDeps) tags.push('<span class="tag purple">deps</span>');
  if (s.hasTemplates) tags.push('<span class="tag orange">templates</span>');

  const freqLabel = { frequent: "高频", medium: "中频", rare: "低频" };
  const freqClass = { frequent: "green", medium: "yellow", rare: "" };
  const displayFreq = getFrequency(s);
  tags.push('<span class="tag ' + freqClass[displayFreq] + ' freq-badge" style="cursor:pointer" data-skill="' + s.name + '" title="点击切换频率">' + freqLabel[displayFreq] + '</span>');

  const sourceLabel = { store: "store", claudian: "claudian", unknown: "unknown" };
  const sourceClass = { store: "tag blue", claudian: "tag purple", unknown: "tag" };
  tags.push('<span class="' + (sourceClass[s.source] || "tag") + '">' + (sourceLabel[s.source] || escapeHtml(s.source)) + '</span>');

  const sizeClass = s.sizeKB > 1000 ? "orange" : s.sizeKB > 100 ? "yellow" : "green";
  const role = s.isGuanlan ? '<span class="role-pill">' + escapeHtml(s.guanlanRole) + '</span>' : "";
  const cardClass = s.isGuanlan ? "skill-card guanlan-card" : "skill-card";

  return `
    <article class="${cardClass}" data-name="${escapeHtml(s.name)}" data-cat="${escapeHtml(s.category)}" tabindex="0" title="点击查看详情">
      <div class="top">
        <div class="name">${escapeHtml(s.name)}</div>
        ${role}
      </div>
      ${s.description ? '<div class="desc">' + escapeHtml(s.description) + '</div>' : '<div class="desc">暂无描述</div>'}
      <div class="meta">${tags.join(" ")}</div>
      <div class="bottom-info">
        <span>${formatSize(s.sizeKB)}</span>
        <span>${s.fileCount} 文件</span>
        <span>${timeAgo(s.modified)}</span>
      </div>
    </article>
  `;
}

function cycleFrequency(name, el) {
  const order = ["rare", "medium", "frequent"];
  const labels = { rare: "低频", medium: "中频", frequent: "高频" };
  const classes = { rare: "", medium: "yellow", frequent: "green" };
  const current = localStorage.getItem("freq_" + name) || SKILLS.find((s) => s.name === name).frequency;
  const next = order[(order.indexOf(current) + 1) % 3];
  localStorage.setItem("freq_" + name, next);
  el.textContent = labels[next];
  el.className = "tag " + classes[next] + " freq-badge";
}

document.addEventListener("click", function(e) {
  const close = e.target.closest("#detail-close");
  if (close) {
    closeDetail();
    return;
  }
  if (e.target.id === "detail-backdrop") {
    closeDetail();
    return;
  }
  const badge = e.target.closest(".freq-badge");
  if (badge) {
    cycleFrequency(badge.dataset.skill, badge);
    return;
  }
  const chip = e.target.closest(".chip");
  if (chip && chip.dataset.filter !== undefined) {
    setFilter(chip.dataset.filter, chip);
    return;
  }
  const item = e.target.closest(".cat-item");
  if (item && item.dataset.cat !== undefined) {
    scrollToCategory(item.dataset.cat === "__all" ? null : item.dataset.cat);
    return;
  }
  const card = e.target.closest(".skill-card");
  if (card && card.dataset.name) {
    openDetail(card.dataset.name);
  }
});

document.addEventListener("keydown", function(e) {
  if (e.key === "Escape") closeDetail();
  if ((e.key === "Enter" || e.key === " ") && e.target.classList && e.target.classList.contains("skill-card")) {
    e.preventDefault();
    openDetail(e.target.dataset.name);
  }
});

let currentFilter = "all";
let activeCategory = null;

function clearActiveFiltersForSearch() {
  currentFilter = "all";
  activeCategory = null;
  document.querySelectorAll(".chip").forEach((chip) => chip.classList.remove("active"));
  const allChip = document.querySelector('.chip[data-filter="all"]');
  if (allChip) allChip.classList.add("active");
  document.querySelectorAll(".cat-item").forEach((item) => item.classList.remove("active"));
  const allItem = document.querySelector('.cat-item[data-cat="__all"]');
  if (allItem) allItem.classList.add("active");
}

function handleSearchInput() {
  clearActiveFiltersForSearch();
  filter();
}

function setFilter(f, el) {
  currentFilter = f;
  activeCategory = null;
  document.querySelectorAll(".chip").forEach((chip) => chip.classList.remove("active"));
  document.querySelectorAll(".cat-item").forEach((item) => item.classList.remove("active"));
  if (el) el.classList.add("active");
  const all = document.querySelector('.cat-item[data-cat="__all"]');
  if (f === "all" && all) all.classList.add("active");
  if (f === "guanlan") {
    const guanlan = document.querySelector('.cat-item[data-cat="观澜 AI"]');
    if (guanlan) guanlan.classList.add("active");
  }
  filter();
}

function scrollToCategory(cat) {
  activeCategory = cat;
  currentFilter = "all";
  document.querySelectorAll(".chip").forEach((chip) => chip.classList.remove("active"));
  const allChip = document.querySelector('.chip[data-filter="all"]');
  if (allChip) allChip.classList.add("active");
  document.querySelectorAll(".cat-item").forEach((item) => item.classList.remove("active"));
  const selector = cat === null ? '.cat-item[data-cat="__all"]' : '.cat-item[data-cat="' + cssEscape(cat) + '"]';
  const el = document.querySelector(selector);
  if (el) el.classList.add("active");
  filter();
}

function cssEscape(value) {
  if (window.CSS && typeof window.CSS.escape === "function") return window.CSS.escape(value);
  return String(value).replace(/"/g, '\"');
}

function filter() {
  const q = document.getElementById("search").value.toLowerCase();
  const sort = document.getElementById("sort").value;
  const groupMode = document.getElementById("group").value;

  let filtered = SKILLS.filter((s) => {
    if (currentFilter === "guanlan" && !s.isGuanlan) return false;
    if (currentFilter === "scripts" && !s.hasScripts) return false;
    if (currentFilter === "config" && !s.hasConfig) return false;
    if (currentFilter === "large" && s.sizeKB < 500) return false;
    if (currentFilter === "frequent" && getFrequency(s) !== "frequent") return false;
    if (currentFilter === "medium" && getFrequency(s) !== "medium") return false;
    if (currentFilter === "rare" && getFrequency(s) !== "rare") return false;
    if (activeCategory && s.category !== activeCategory) return false;
    if (q) {
      const name = s.name.toLowerCase();
      const desc = (s.description || "").toLowerCase();
      const role = (s.guanlanRole || "").toLowerCase();
      const repo = (s.githubRepo || "").toLowerCase();
      const repoName = repoLabel(s.githubRepo || "").toLowerCase();
      const sourceNote = (s.sourceNote || "").toLowerCase();
      if (!name.includes(q) && !desc.includes(q) && !role.includes(q) && !repo.includes(q) && !repoName.includes(q) && !sourceNote.includes(q)) return false;
    }
    return true;
  });

  filtered.sort((a, b) => {
    if (sort === "size") return b.sizeKB - a.sizeKB;
    if (sort === "files") return b.fileCount - a.fileCount;
    if (sort === "modified") return b.modified.localeCompare(a.modified);
    if (sort === "frequency") {
      const order = { frequent: 0, medium: 1, rare: 2 };
      return (order[getFrequency(a)] || 2) - (order[getFrequency(b)] || 2);
    }
    if (a.isGuanlan !== b.isGuanlan) return a.isGuanlan ? -1 : 1;
    return a.name.localeCompare(b.name);
  });

  const container = document.getElementById("main-content");
  if (filtered.length === 0) {
    container.innerHTML = '<div class="empty">没有匹配的 Skill</div>';
    return;
  }

  const groups = {};
  for (const skill of filtered) {
    const groupKey = groupMode === "repo" ? skill.repoGroup : skill.category;
    if (!groups[groupKey]) groups[groupKey] = [];
    groups[groupKey].push(skill);
  }

  let html = "";
  const grouped = Object.entries(groups).sort((a, b) => {
    if (groupMode === "repo") {
      if (a[0] === "未记录 GitHub 来源") return 1;
      if (b[0] === "未记录 GitHub 来源") return -1;
      return b[1].length - a[1].length || a[0].localeCompare(b[0]);
    }
    if (a[0] === "观澜 AI") return -1;
    if (b[0] === "观澜 AI") return 1;
    return b[1].length - a[1].length;
  });

  for (const [groupName, items] of grouped) {
    const totalSize = items.reduce((sum, skill) => sum + skill.sizeKB, 0);
    const repoLink = groupMode === "repo" && groupName.startsWith("http")
      ? '<a href="' + escapeHtml(groupName) + '" target="_blank" rel="noreferrer" title="' + escapeHtml(groupName) + '">' + escapeHtml(repoLabel(groupName)) + '</a>'
      : escapeHtml(groupName);
    html += `
      <section class="category-section">
        <div class="category-header">
          <strong>${repoLink}</strong>
          <span class="count">${items.length}</span>
          <span class="size-info">${formatSize(totalSize)}</span>
        </div>
        <div class="skill-grid">
          ${items.map((skill) => skillCard(skill)).join("")}
        </div>
      </section>
    `;
  }

  container.innerHTML = html;
}

function valueOrEmpty(value) {
  if (value === undefined || value === null || value === "") return "未记录";
  return String(value);
}

function linkOrText(url) {
  if (!url) return "未记录";
  const safe = escapeHtml(url);
  return '<a href="' + safe + '" target="_blank" rel="noreferrer">' + safe + '</a>';
}

function detailItem(label, value, isLink) {
  return '<div class="detail-item"><div class="label">' + escapeHtml(label) + '</div><div class="value">' + (isLink ? linkOrText(value) : escapeHtml(valueOrEmpty(value))) + '</div></div>';
}

function sourceLabel(value) {
  const labels = {
    store: "Skill Store",
    unknown: "未记录",
    claudian: "Claudian",
  };
  return labels[value] || value || "未记录";
}

function frequencyLabel(value) {
  return { frequent: "高频", medium: "中频", rare: "低频" }[value] || value || "未记录";
}

function structureLabel(skill) {
  return [
    skill.hasScripts ? "脚本 scripts" : "",
    skill.hasConfig ? "配置 config" : "",
    skill.hasDeps ? "依赖 deps" : "",
    skill.hasTemplates ? "模板 templates" : "",
  ].filter(Boolean).join(" / ") || "无附加目录";
}

function repoLabel(repo) {
  if (!repo) return "未记录";
  const genericRepoNames = new Set([
    "skills",
    "skill",
    "prompts",
    "prompt",
    "agents",
    "agent",
    "tools",
    "tool",
    "templates",
    "template",
    "examples",
    "example",
  ]);
  try {
    const parts = new URL(repo).pathname.split("/").filter(Boolean);
    const repoName = parts.at(-1) || repo;
    const owner = parts.at(-2);
    if (owner && genericRepoNames.has(repoName.toLowerCase())) return owner + "/" + repoName;
    return repoName;
  } catch {
    const parts = String(repo).split("/").filter(Boolean);
    const repoName = parts.at(-1) || repo;
    const owner = parts.at(-2);
    if (owner && genericRepoNames.has(String(repoName).toLowerCase())) return owner + "/" + repoName;
    return repoName;
  }
}

function openDetail(name) {
  const skill = SKILLS.find((item) => item.name === name);
  if (!skill) return;
  const title = document.getElementById("detail-title");
  const body = document.getElementById("detail-body");
  const source = skill.githubRepo ? "GitHub 仓库" : skill.sourceRegistry ? "Registry" : skill.sourceRaw || "未记录";
  title.innerHTML = '<h2>' + escapeHtml(skill.name) + '</h2><p>' + escapeHtml(skill.guanlanRole || skill.category || "Skill") + ' · ' + escapeHtml(source) + '</p>';
  body.innerHTML = `
    <div class="detail-description">
      <h3>描述</h3>
      <div class="desc-full">${escapeHtml(skill.description || "暂无描述")}</div>
      ${skill.originalDescription && skill.originalDescription !== skill.description ? '<details class="detail-original"><summary>查看原始描述</summary><div>' + escapeHtml(skill.originalDescription) + '</div></details>' : ''}
    </div>
    <div class="detail-grid">
      ${detailItem("来源类型", sourceLabel(skill.sourceRaw))}
      ${detailItem("GitHub 仓库", skill.githubRepo, true)}
      ${detailItem("主页", skill.homepage, true)}
      ${detailItem("注册源", skill.sourceRegistry, true)}
      ${detailItem("注册标识", skill.sourceSlug)}
      ${detailItem("源路径", skill.sourcePath)}
      ${detailItem("来源备注", skill.sourceNote)}
      ${detailItem("安装版本", skill.installedVersion)}
      ${detailItem("下载 / 安装时间", skill.installedAt)}
      ${detailItem("最后修改时间", skill.modifiedAt)}
      ${detailItem("本地路径", skill.localPath)}
      ${detailItem("文件统计", formatSize(skill.sizeKB) + " · " + skill.fileCount + " 文件")}
      ${detailItem("结构", structureLabel(skill))}
      ${detailItem("使用频率", frequencyLabel(getFrequency(skill)))}
    </div>
  `;
  document.getElementById("detail-backdrop").classList.add("open");
}

function closeDetail() {
  const backdrop = document.getElementById("detail-backdrop");
  if (backdrop) backdrop.classList.remove("open");
}

function buildSidebar() {
  const catList = document.getElementById("cat-list");
  const counts = {};
  for (const skill of SKILLS) {
    counts[skill.category] = (counts[skill.category] || 0) + 1;
  }
  let html = '<div class="cat-item active" data-cat="__all">全部 <span class="badge">' + SKILLS.length + '</span></div>';
  if (counts["观澜 AI"]) {
    html += '<div class="cat-item guanlan-fixed" data-cat="观澜 AI">观澜 AI <span class="badge">' + counts["观澜 AI"] + '</span></div>';
  }
  for (const [cat, count] of Object.entries(counts).sort((a, b) => b[1] - a[1])) {
    if (cat === "观澜 AI") continue;
    html += '<div class="cat-item" data-cat="' + escapeHtml(cat) + '">' + escapeHtml(cat) + ' <span class="badge">' + count + '</span></div>';
  }
  catList.innerHTML = html;
}

buildSidebar();
filter();
</script>
<script data-wavesight-embed>
(() => {
  const postHeight = () => {
    requestAnimationFrame(() => {
      const shell = document.querySelector(".shell");
      const rect = shell ? shell.getBoundingClientRect() : document.body.getBoundingClientRect();
      const height = Math.ceil(rect.top + rect.height + 36);
      parent.postMessage({ type: "wavesight-skill-store-height", height }, "*");
    });
  };
  document.addEventListener("click", (event) => {
    if (!event.target.closest(".cat-item")) return;
    setTimeout(postHeight, 80);
  }, true);
  window.addEventListener("load", () => setTimeout(postHeight, 80));
  window.addEventListener("resize", postHeight);
  window.addEventListener("load", () => {
    new MutationObserver(postHeight).observe(document.body, { childList: true, subtree: true, attributes: true });
  });
})();
</script>
