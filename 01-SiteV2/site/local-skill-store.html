<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<title>Skill Store Dashboard</title>
<style>
  :root {
    --page: #fffdf8;
    --paper: #ffffff;
    --soft: #f7f4ef;
    --ink: #071827;
    --muted: #667386;
    --line: rgba(7, 24, 39, .12);
    --blue: #123a5f;
    --gold: #c8a45d;
    --green: #377c61;
    --orange: #b85f28;
    --red: #9a4832;
    --purple: #6f5a93;
    --shadow: 0 16px 44px rgba(7, 24, 39, .06);
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    color: var(--ink);
    background:
      linear-gradient(180deg, rgba(255,253,248,.96), rgba(247,244,239,.68)),
      var(--page);
    font-family: Inter, "Segoe UI", "Microsoft YaHei", sans-serif;
    line-height: 1.5;
  }
  button, input, select { font: inherit; }
  button { cursor: pointer; }
  .shell { max-width: 1480px; margin: 0 auto; padding: 28px; }
  .header {
    display: grid;
    grid-template-columns: minmax(0, 1fr) auto;
    gap: 18px;
    align-items: end;
    padding-bottom: 18px;
    border-bottom: 1px solid var(--line);
  }
  .eyebrow { color: var(--gold); font-size: 12px; font-weight: 760; letter-spacing: 0; }
  h1, h2, h3, p { margin: 0; }
  h1 { margin-top: 6px; font: 700 34px/1.16 Georgia, "Noto Serif SC", serif; }
  h2 { font: 700 22px/1.28 Georgia, "Noto Serif SC", serif; }
  h3 { font-size: 15px; line-height: 1.35; }
  p { color: var(--muted); font-size: 13px; line-height: 1.65; }
  .subtitle { margin-top: 8px; max-width: 780px; color: #34445a; font-size: 14px; }
  .updated { justify-self: end; color: var(--muted); font-size: 12px; text-align: right; }
  .command { margin-top: 8px; color: var(--blue); font-family: "IBM Plex Mono", Consolas, monospace; font-size: 12px; }
  .metrics { display: grid; grid-template-columns: repeat(6, minmax(0, 1fr)); gap: 10px; margin-top: 18px; }
  .metric, .panel, .skill-card, .issue-row, .lane-row {
    border: 1px solid var(--line);
    border-radius: 8px;
    background: rgba(255,255,255,.82);
    box-shadow: var(--shadow);
  }
  .metric { min-height: 106px; padding: 14px; display: grid; align-content: center; }
  .metric span { color: var(--gold); font-size: 12px; font-weight: 760; }
  .metric strong { margin-top: 6px; color: var(--blue); font-size: 30px; line-height: 1; }
  .metric em { margin-top: 8px; color: var(--muted); font-style: normal; font-size: 12px; }
  .ops-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-top: 16px; }
  .panel { padding: 16px; box-shadow: none; }
  .panel-head { display: flex; justify-content: space-between; gap: 12px; align-items: end; margin-bottom: 12px; }
  .lane-list, .issue-list { display: grid; gap: 8px; }
  .lane-row, .issue-row {
    width: 100%;
    min-height: 46px;
    padding: 10px 12px;
    display: grid;
    grid-template-columns: 150px minmax(0, 1fr) auto;
    gap: 12px;
    align-items: center;
    border-radius: 6px;
    box-shadow: none;
    text-align: left;
  }
  .lane-row span, .issue-row span { color: var(--muted); font-size: 12px; }
  .lane-row strong, .issue-row strong { overflow-wrap: anywhere; }
  .lane-row em { color: var(--green); font-style: normal; font-size: 12px; }
  .issue-row { border-color: rgba(184,95,40,.24); color: var(--ink); }
  .issue-row strong { color: var(--orange); font-size: 12px; text-align: right; }
  .controls {
    position: sticky;
    top: 0;
    z-index: 3;
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
    align-items: center;
    margin-top: 16px;
    padding: 12px;
    border: 1px solid var(--line);
    border-radius: 8px;
    background: rgba(255,253,248,.9);
    backdrop-filter: blur(12px);
  }
  input, select {
    min-height: 40px;
    border: 1px solid var(--line);
    border-radius: 6px;
    background: #fff;
    color: var(--ink);
    padding: 0 12px;
  }
  input { flex: 1; min-width: 260px; }
  .chip-group { display: flex; gap: 7px; flex-wrap: wrap; }
  .chip {
    min-height: 34px;
    border: 1px solid var(--line);
    border-radius: 999px;
    background: #fff;
    color: #34445a;
    padding: 0 11px;
    font-size: 12px;
  }
  .chip.active { background: var(--blue); border-color: var(--blue); color: #fffdf8; }
  .layout { display: grid; grid-template-columns: 230px minmax(0, 1fr); gap: 18px; margin-top: 18px; align-items: start; }
  .sidebar {
    position: sticky;
    top: 76px;
    display: grid;
    gap: 4px;
    padding: 8px;
    border: 1px solid var(--line);
    border-radius: 8px;
    background: rgba(255,255,255,.64);
  }
  .sidebar button {
    min-height: 34px;
    border: 0;
    border-radius: 6px;
    background: transparent;
    color: #34445a;
    padding: 0 9px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    text-align: left;
  }
  .sidebar button.active { background: var(--blue); color: #fffdf8; }
  .results-head { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
  .results-head span { color: var(--muted); font-size: 12px; }
  .skill-section + .skill-section { margin-top: 22px; }
  .skill-section header {
    display: flex;
    justify-content: space-between;
    gap: 12px;
    align-items: center;
    padding-bottom: 8px;
    margin-bottom: 10px;
    border-bottom: 1px solid var(--line);
  }
  .skill-section header strong { font: 700 20px/1.2 Georgia, "Noto Serif SC", serif; }
  .skill-section header span { color: var(--muted); font-size: 12px; }
  .skill-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(292px, 1fr)); gap: 10px; }
  .skill-card {
    min-height: 198px;
    padding: 14px;
    display: flex;
    flex-direction: column;
    gap: 9px;
    box-shadow: none;
    transition: border-color .16s ease, transform .16s ease, box-shadow .16s ease;
  }
  .skill-card:hover { border-color: rgba(200,164,93,.62); transform: translateY(-1px); box-shadow: 0 12px 30px rgba(7,24,39,.06); }
  .skill-card.is-guanlan { border-color: rgba(200,164,93,.48); background: linear-gradient(180deg, #fff, #fff9ec); }
  .skill-card.has-issue { border-color: rgba(184,95,40,.28); }
  .skill-top { display: flex; justify-content: space-between; gap: 12px; align-items: start; }
  .skill-top strong { display: block; font-size: 15px; overflow-wrap: anywhere; }
  .skill-top span { display: block; margin-top: 3px; color: var(--muted); font-size: 12px; }
  .skill-top em {
    flex: 0 0 auto;
    max-width: 112px;
    color: var(--blue);
    background: rgba(200,164,93,.14);
    border: 1px solid rgba(200,164,93,.28);
    border-radius: 999px;
    padding: 3px 8px;
    font-style: normal;
    font-size: 11px;
    text-align: center;
  }
  .skill-card p {
    display: -webkit-box;
    min-height: 62px;
    overflow: hidden;
    -webkit-line-clamp: 3;
    -webkit-box-orient: vertical;
  }
  .tag-row { display: flex; gap: 6px; flex-wrap: wrap; margin-top: auto; }
  .tag {
    min-height: 22px;
    display: inline-flex;
    align-items: center;
    border-radius: 999px;
    background: rgba(7,24,39,.06);
    color: #34445a;
    padding: 0 8px;
    font-size: 11px;
  }
  .tag.blue { background: rgba(18,58,95,.1); color: var(--blue); }
  .tag.gold { background: rgba(200,164,93,.18); color: #745b1f; }
  .tag.green { background: rgba(55,124,97,.11); color: var(--green); }
  .tag.orange { background: rgba(184,95,40,.11); color: var(--orange); }
  .tag.red { background: rgba(154,72,50,.12); color: var(--red); }
  .tag.purple { background: rgba(111,90,147,.12); color: var(--purple); }
  .skill-foot { display: flex; justify-content: space-between; gap: 8px; color: var(--muted); font-size: 11px; }
  .empty, .empty-line {
    padding: 28px;
    border: 1px solid var(--line);
    border-radius: 8px;
    background: rgba(255,255,255,.72);
    color: var(--muted);
    text-align: center;
  }
  .detail-backdrop {
    position: fixed;
    inset: 0;
    z-index: 20;
    display: none;
    place-items: center;
    padding: 28px;
    background: rgba(7,24,39,.42);
    backdrop-filter: blur(12px);
  }
  .detail-backdrop.open { display: grid; }
  .detail-modal {
    width: min(920px, 100%);
    max-height: min(780px, 92vh);
    overflow: auto;
    border: 1px solid rgba(200,164,93,.42);
    border-radius: 8px;
    background: var(--page);
    box-shadow: 0 30px 90px rgba(7,24,39,.28);
  }
  .detail-head {
    display: flex;
    justify-content: space-between;
    gap: 18px;
    padding: 20px;
    border-bottom: 1px solid var(--line);
    background: linear-gradient(180deg, #fff, #fff8ea);
  }
  .detail-head h2 { overflow-wrap: anywhere; }
  .detail-head button {
    width: 34px;
    height: 34px;
    border: 1px solid var(--line);
    border-radius: 999px;
    background: #fff;
  }
  .detail-body { padding: 20px; display: grid; gap: 14px; }
  .detail-block, .detail-item {
    border: 1px solid var(--line);
    border-radius: 8px;
    background: rgba(255,255,255,.72);
    padding: 14px;
  }
  .detail-block h3 { margin-bottom: 8px; color: var(--blue); }
  .detail-block p + p { margin-top: 6px; }
  .detail-grid { display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 10px; }
  .detail-item span { display: block; color: var(--muted); font-size: 11px; font-weight: 760; }
  .detail-item strong { display: block; margin-top: 5px; font-size: 13px; overflow-wrap: anywhere; }
  @media (max-width: 980px) {
    .metrics { grid-template-columns: repeat(3, minmax(0, 1fr)); }
    .ops-grid, .layout { grid-template-columns: 1fr; }
    .sidebar { position: static; }
  }
  @media (max-width: 640px) {
    .shell { padding: 18px; }
    .header, .metrics, .detail-grid { grid-template-columns: 1fr; }
    .updated { justify-self: start; text-align: left; }
    .skill-grid { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>
  <main class="shell">
    <header class="header">
      <div>
        <div class="eyebrow">WAVESIGHT AI SKILL OPS</div>
        <h1>Skill Store Dashboard</h1>
        <div class="subtitle">本地安装状态、观澜项目镜像、lane 责任边界、eval / examples 覆盖和同步风险。</div>
      </div>
      <div class="updated">
        <div data-generated>更新中</div>
        <div class="command">npm run build:skill-store-dashboard</div>
      </div>
    </header>

    <section class="metrics" data-metrics></section>

    <section class="ops-grid">
      <article class="panel">
        <div class="panel-head"><div><div class="eyebrow">LANE OWNERS</div><h2>生产入口</h2></div></div>
        <div class="lane-list" data-lane-owners></div>
      </article>
      <article class="panel">
        <div class="panel-head"><div><div class="eyebrow">ATTENTION</div><h2>需处理</h2></div></div>
        <div class="issue-list" data-issues></div>
      </article>
    </section>

    <section class="controls">
      <input type="search" data-search placeholder="搜索 skill、lane、gate、失败学习或路径">
      <select data-sort>
        <option value="priority">按治理优先级</option>
        <option value="name">按名称</option>
        <option value="modified">按最近修改</option>
        <option value="size">按体积</option>
        <option value="files">按文件数</option>
      </select>
      <select data-group>
        <option value="lane">按 lane 分组</option>
        <option value="status">按状态分组</option>
        <option value="sync">按同步状态分组</option>
        <option value="category">按类别分组</option>
      </select>
      <div class="chip-group">
        <button type="button" class="chip active" data-filter="all">全部</button>
        <button type="button" class="chip" data-filter="current">current</button>
        <button type="button" class="chip" data-filter="lane-owner">lane owner</button>
        <button type="button" class="chip" data-filter="needs-action">需处理</button>
        <button type="button" class="chip" data-filter="sync-issue">同步问题</button>
        <button type="button" class="chip" data-filter="missing-evals">缺 eval</button>
        <button type="button" class="chip" data-filter="missing-examples">缺 examples</button>
        <button type="button" class="chip" data-filter="missing-version">版本未知</button>
        <button type="button" class="chip" data-filter="retired-risk">历史风险</button>
        <button type="button" class="chip" data-filter="guanlan">观澜相关</button>
        <button type="button" class="chip" data-filter="scripts">有脚本</button>
      </div>
    </section>

    <section class="layout">
      <aside class="sidebar" data-sidebar></aside>
      <section>
        <div class="results-head"><h2>Skills</h2><span data-results-count></span></div>
        <div data-skill-list></div>
      </section>
    </section>
  </main>

  <div class="detail-backdrop" data-detail role="dialog" aria-modal="true">
    <div class="detail-modal">
      <div class="detail-head">
        <div data-detail-title></div>
        <button type="button" data-close-detail aria-label="关闭">×</button>
      </div>
      <div class="detail-body" data-detail-body></div>
    </div>
  </div>

  <script src="data/local-skill-store-data.js?v=20260612-skill-ops"></script>
  <script src="assets/local-skill-store.js?v=20260612-skill-ops"></script>
</body>
</html>
