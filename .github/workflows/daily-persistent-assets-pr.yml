name: WaveSight Business Signals PR

on:
  workflow_dispatch:
    inputs:
      date:
        description: "Asia/Shanghai date to run, formatted as YYYY-MM-DD. Leave empty for today."
        required: false
        type: string
      pass_score:
        description: "Daily Monitor diagnostic score reference. Evidence-supply, Card/editorial and frontstage gates decide release."
        required: false
        default: "85"
        type: string

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: wavesight-business-signals-${{ github.event.inputs.date || github.ref_name }}
  cancel-in-progress: false

jobs:
  business-signals-pr:
    name: Business Signals Scheduled PR
    runs-on: ubuntu-latest
    timeout-minutes: 90
    env:
      TZ: Asia/Shanghai
      ANYSEARCH_API_KEY: ${{ secrets.ANYSEARCH_API_KEY }}
      TAVILY_API_KEY: ${{ secrets.TAVILY_API_KEY }}
      TAVILY_DISABLED: "true"
      EXA_API_KEY: ${{ secrets.EXA_API_KEY }}
      DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
      DEEPSEEK_FLASH_MODEL: deepseek-v4-flash
      DEEPSEEK_PRO_MODEL: deepseek-v4-pro
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      FEISHU_WEBHOOK_URL: ${{ secrets.FEISHU_WEBHOOK_URL }}
      FEISHU_WEBHOOK_SECRET: ${{ secrets.FEISHU_WEBHOOK_SECRET }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Resolve run date
        id: run-date
        shell: bash
        run: |
          if [ -n "${{ github.event.inputs.date }}" ]; then
            run_date="${{ github.event.inputs.date }}"
          else
            run_date="$(TZ=Asia/Shanghai date +%F)"
          fi

          if ! [[ "$run_date" =~ ^[0-9]{4}-[0-9]{2}-[0-9]{2}$ ]]; then
            echo "Invalid date: $run_date" >&2
            exit 2
          fi

          echo "date=$run_date" >> "$GITHUB_OUTPUT"
          echo "RUN_DATE=$run_date" >> "$GITHUB_ENV"

      - name: Check existing business-signal assets
        id: existing-assets
        shell: bash
        run: |
          set -euo pipefail
          skip=false
          reason="not_applicable"
          branch_exists=false

          raw_file="01-SiteV2/content/01-raw/${RUN_DATE}-raw-candidates.md"
          pool_file="01-SiteV2/content/02-pool/${RUN_DATE}-pool-candidates.md"
          signal_file="01-SiteV2/content/04-business-signals/signals/${RUN_DATE}-signals.md"
          data_center_manifest="01-SiteV2/content/11-databases/data-center-v4/${RUN_DATE}/manifest.json"
          branch="automation/business-signals-${RUN_DATE}"
          signal_card_count="$(find 01-SiteV2/knowledge/01-Signal-Cards -type f -name "${RUN_DATE}--signal--*.md" 2>/dev/null | wc -l | tr -d ' ')"

          if git ls-remote --exit-code --heads origin "$branch" >/dev/null 2>&1; then
            branch_exists=true
          fi

          if [ "${{ github.event_name }}" = "schedule" ]; then
            if [ -f "$raw_file" ] && [ -f "$pool_file" ] && [ -f "$signal_file" ] && [ -f "$data_center_manifest" ] && [ "$signal_card_count" -ge 1 ]; then
              if node agent-workflow/tools/assert-business-signals-frontstage.mjs --date="${RUN_DATE}" >/tmp/business-frontstage-health.log 2>&1 \
                && node agent-workflow/tools/assert-data-center-v4.mjs --date="${RUN_DATE}" >/tmp/data-center-v4-health.log 2>&1 \
                && node agent-workflow/tools/assert-daily-production-chain.mjs --date="${RUN_DATE}" --stage=pre-commit --block-stale=true >/tmp/business-chain-health.log 2>&1; then
                skip=true
                reason="same-date V4 data-center and V3 compatibility assets exist on main and current gates pass"
              else
                reason="same-date files exist but current gates do not pass; continue targeted production"
                cat /tmp/business-frontstage-health.log 2>/dev/null || true
                cat /tmp/data-center-v4-health.log 2>/dev/null || true
                cat /tmp/business-chain-health.log 2>/dev/null || true
              fi
            fi
          fi

          echo "skip=$skip" >> "$GITHUB_OUTPUT"
          echo "reason=$reason" >> "$GITHUB_OUTPUT"
          echo "branch_exists=$branch_exists" >> "$GITHUB_OUTPUT"
          echo "signal_card_count=$signal_card_count" >> "$GITHUB_OUTPUT"
          echo "skip_business_signal_assets=$skip"
          echo "business_signal_skip_reason=$reason"
          echo "existing_automation_branch=$branch_exists"
          echo "same_date_signal_card_count=$signal_card_count"

      - name: Report cloud dependency state
        shell: bash
        run: |
          {
            echo "# GitHub Business Signals PR"
            echo
            echo "- date: ${RUN_DATE}"
            echo "- generated_at: $(date -Is)"
            echo "- mode: business_signals_pr"
            echo "- trigger: ${{ github.event_name }}"
            echo "- schedule: local 08:10 conditional dispatch; 09:15 targeted recovery; 10:30 cloud safety fallback"
            echo "- business_signal_skip: ${{ steps.existing-assets.outputs.skip }}"
            echo "- business_signal_skip_reason: ${{ steps.existing-assets.outputs.reason }}"
            echo "- existing_automation_branch: ${{ steps.existing-assets.outputs.branch_exists }}"
            echo "- existing_signal_card_count: ${{ steps.existing-assets.outputs.signal_card_count }}"
            echo "- anysearch_secret: $([ -n "$ANYSEARCH_API_KEY" ] && echo configured || echo missing)"
            echo "- tavily_secret: $([ "$TAVILY_DISABLED" = "true" ] && echo disabled || ([ -n "$TAVILY_API_KEY" ] && echo configured || echo missing))"
            echo "- exa_secret: $([ -n "$EXA_API_KEY" ] && echo configured || echo missing)"
            echo "- deepseek_v4_title_translation: $([ -n "$DEEPSEEK_API_KEY" ] && echo configured || echo missing)"
            echo "- openai_title_translation_fallback: $([ -n "$OPENAI_API_KEY" ] && echo configured || echo optional-missing-with-deterministic-rules-only)"
            echo
            echo "This V4 workflow commits the Data Center factual bundle plus frozen V3 page-compatibility assets to an automation branch, opens or updates a PR, and auto-merges only after factual-integrity and compatibility gates pass."
            echo "Raw / Pool are persisted after V3 monitor hard gates pass. Card assets are persisted after asset generation. Site data is persisted only after Card/source-first/frontstage gates pass."
            echo "Business Signals monitor now defaults to source artifact aggregation: AI HOT, keyword, GDELT, and RSS are collected as independent source artifacts before the unified Raw / Pool chain runs."
            echo "First-line viewpoints are produced by .github/workflows/daily-first-line-viewpoints-pr.yml and are not part of this business-signal PR."
            echo "It never pushes directly to main. GitHub Pages deploys automatically after the PR merge updates main."
            echo
            echo "Production order:"
            echo "1. Collect source Raw artifacts independently and in parallel."
            echo "2. Run the V3 evidence-supply gate from source artifacts."
            echo "3. Confirm Raw / Pool integrity and historical duplicate state without re-blocking diagnostic volume targets."
            echo "4. Build and gate the Data Center V4 factual bundle."
            echo "5. Materialize V4 JSONL serving tables."
            echo "6. Run frozen V3 Card, trend, and frontstage compatibility stages."
            echo "7. Build operations data after V4 and compatibility gates pass."
            echo "8. Confirm same-date downstream assets are no longer stale."
            echo "9. Write a persistent asset manifest."
            echo "10. Commit generated assets to an automation branch and open or update a PR."
            echo "11. Auto-merge the PR after all gates pass, so main triggers GitHub Pages deployment."
            echo
            echo "Skipped by design:"
            echo "- paused opinion lane."
            echo "- Direct main commit."
            echo "- Direct deploy from the automation branch."
          } | tee "agent-workflow/reports/${RUN_DATE}-github-daily-persistent-assets-pr.md"

      - name: Syntax checks
        shell: bash
        run: |
          node --check agent-workflow/tools/run-guanlan-daily-monitor.mjs
          node --check agent-workflow/tools/run-guanlan-daily-monitor-with-qc.mjs
          node --check agent-workflow/tools/run-daily-automation-controller.mjs
          node --check agent-workflow/tools/run-business-signals-health-dispatch.mjs
          node --check agent-workflow/tools/build-data-center-v4.mjs
          node --check agent-workflow/tools/backfill-data-center-v4.mjs
          node --check agent-workflow/tools/assert-data-center-v4.mjs
          node --check agent-workflow/tools/build-legacy-card-event-mappings.mjs
          node --check agent-workflow/tools/build-data-center-v4-obsidian-index.mjs
          node --check agent-workflow/tools/assert-tag-taxonomy-v4.mjs
          node --check agent-workflow/tools/event-public-title.mjs
          node --check agent-workflow/tools/sync-light-data-lake.mjs
          node --check 01-SiteV2/site/scripts/build-data-center-v4-frontstage.mjs
          node --check 01-SiteV2/site/scripts/build-industry-reports-frontstage.mjs
          node --check agent-workflow/tools/assert-daily-production-chain.mjs
          node --check agent-workflow/tools/generate-asset-cards-from-pool.mjs
          node --check agent-workflow/tools/assert-pool-to-card-dedupe.mjs
          node --check agent-workflow/tools/assert-business-signals-frontstage.mjs
          node --check agent-workflow/tools/assert-business-signals-three-block-contract.mjs
          node --check agent-workflow/tools/run-trend-candidate-decision.mjs
          node agent-workflow/tools/assert-business-signals-pipeline-policy.mjs
          node --check agent-workflow/tools/classify-business-signals-production-state.mjs
          node --check agent-workflow/tools/assert-v3-source-first-frontstage.mjs
          node --check agent-workflow/tools/frontstage-regression-gate.mjs
          node --check agent-workflow/tools/assert-community-intelligence-data.mjs
          node --check agent-workflow/tools/send-feishu-webhook.mjs
          node --check 01-SiteV2/site/scripts/build-v3-data-observation-desk.mjs
          node --check 01-SiteV2/site/scripts/sync-pipeline-dashboard-data.mjs
          gh --version
          npm run test:data-center

      - name: Collect source raw artifacts
        id: source-artifacts
        if: steps.existing-assets.outputs.skip != 'true'
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p "agent-workflow/reports/source-runs/${RUN_DATE}"
          sources=(aihot keyword gdelt rss)
          pids=()
          logs=()
          source_timeout="${SOURCE_COLLECTION_TIMEOUT:-12m}"

          for source in "${sources[@]}"; do
            log_file="agent-workflow/reports/source-runs/${RUN_DATE}/${source}-source-run.log"
            logs+=("$log_file")
            {
              timeout "$source_timeout" node agent-workflow/tools/run-guanlan-daily-monitor.mjs \
                --date="${RUN_DATE}" \
                --source-only="$source" \
                --source-artifact-dir="agent-workflow/reports/source-runs/${RUN_DATE}" \
                --search-limit=200 \
                --search-path-query-limit=5 \
                --gdelt-query-limit=12 \
                --hn-limit=8 \
                --raw-dedupe-buffer=140 \
                --raw-max=360 \
                --fetch-timeout-ms=20000
            } >"$log_file" 2>&1 &
            pids+=("$!")
          done

          failed=0
          for index in "${!pids[@]}"; do
            source="${sources[$index]}"
            log_file="${logs[$index]}"
            if wait "${pids[$index]}"; then
              echo "Source collection succeeded: $source"
            else
              echo "Source collection failed: $source" >&2
              failed=1
              printf '{"date":"%s","generated_at":"%s","mode":"business_source_raw","source_id":"%s","source_label":"%s","status":"failed","discovered_count":0,"raw_candidate_count":0,"failures":["source collection command failed; see %s-source-run.log"],"items":[]}\n' \
                "$RUN_DATE" "$(date -Is)" "$source" "$source" "$source" \
                > "agent-workflow/reports/source-runs/${RUN_DATE}/${source}-raw-source-candidates.json"
            fi
            echo "--- ${source} source log ---"
            cat "$log_file"
          done

          if [ "$failed" -ne 0 ]; then
            echo "One or more source lanes failed; continuing to unified monitor so quality gates can decide release." >&2
          fi

      - name: Run Daily Monitor with QC
        id: monitor
        if: steps.existing-assets.outputs.skip != 'true'
        continue-on-error: true
        shell: bash
        run: |
          set -o pipefail
          node agent-workflow/tools/run-guanlan-daily-monitor-with-qc.mjs \
            --date="${RUN_DATE}" \
            --pass-score="${{ github.event.inputs.pass_score || '85' }}" \
            --max-cycles=1 \
            --search-limit=200 \
            --search-path-query-limit=5 \
            --gdelt-query-limit=12 \
            --hn-limit=8 \
            --raw-dedupe-buffer=140 \
            --raw-max=360 \
            --fetch-timeout-ms=20000 \
            --snapshot-timeout-ms=16000 \
            --use-source-artifacts=true \
            --source-artifact-dir="agent-workflow/reports/source-runs/${RUN_DATE}" \
            --source-refresh-timeout-ms=900000 \
            --monitor-timeout-ms=900000 \
            2>&1 | tee "agent-workflow/reports/${RUN_DATE}-github-persistent-assets-pr-monitor-run.log"

      - name: Confirm V3 evidence-supply handoff and dedupe state
        id: persistent-assets-post-monitor
        if: always() && steps.existing-assets.outputs.skip != 'true'
        continue-on-error: true
        shell: bash
        run: |
          set -o pipefail
          node agent-workflow/tools/assert-daily-production-chain.mjs \
            --date="${RUN_DATE}" \
            --stage=post-monitor \
            2>&1 | tee "agent-workflow/reports/${RUN_DATE}-github-persistent-assets-pr-post-monitor-gate.log"

      - name: Build Data Center V4 factual bundle
        id: data-center-v4
        if: steps.monitor.outcome == 'success' && steps.persistent-assets-post-monitor.outcome == 'success'
        continue-on-error: true
        shell: bash
        run: |
          set -o pipefail
          node agent-workflow/tools/build-data-center-v4.mjs \
            --date="${RUN_DATE}" \
            2>&1 | tee "agent-workflow/reports/${RUN_DATE}-github-persistent-assets-pr-data-center-v4.log"

      - name: Run Data Center V4 integrity gate
        id: data-center-v4-gate
        if: steps.data-center-v4.outcome == 'success'
        continue-on-error: true
        shell: bash
        run: |
          set -o pipefail
          node agent-workflow/tools/assert-data-center-v4.mjs \
            --date="${RUN_DATE}" \
            2>&1 | tee "agent-workflow/reports/${RUN_DATE}-github-persistent-assets-pr-data-center-v4-gate.log"

      - name: Materialize Data Center V4 JSONL tables
        id: data-center-v4-materialize
        if: steps.data-center-v4-gate.outcome == 'success'
        continue-on-error: true
        shell: bash
        run: |
          set -o pipefail
          node agent-workflow/tools/sync-light-data-lake.mjs \
            --v4-only=true \
            --duckdb=skip \
            2>&1 | tee "agent-workflow/reports/${RUN_DATE}-github-persistent-assets-pr-data-center-v4-materialize.log"
          node 01-SiteV2/site/scripts/build-data-center-v4-frontstage.mjs \
            2>&1 | tee "agent-workflow/reports/${RUN_DATE}-github-persistent-assets-pr-data-center-v4-frontstage.log"
          npm run test:data-center-site

      - name: Regenerate business-signal Card assets
        id: assets
        if: steps.data-center-v4-materialize.outcome == 'success'
        continue-on-error: true
        shell: bash
        run: |
          set -o pipefail
          node agent-workflow/tools/generate-asset-cards-from-pool.mjs \
            --date="${RUN_DATE}" \
            --from-raw=true \
            2>&1 | tee "agent-workflow/reports/${RUN_DATE}-github-persistent-assets-pr-assets.log"

      - name: Run Pool-to-Card duplicate gate
        id: pool-to-card-dedupe
        if: steps.assets.outcome == 'success'
        continue-on-error: true
        shell: bash
        run: |
          set -o pipefail
          node agent-workflow/tools/assert-pool-to-card-dedupe.mjs \
            --date="${RUN_DATE}" \
            2>&1 | tee "agent-workflow/reports/${RUN_DATE}-github-persistent-assets-pr-pool-to-card-dedupe.log"

      - name: Run Signal Card editorial quality gate
        id: card-editorial-gate
        if: steps.pool-to-card-dedupe.outcome == 'success'
        continue-on-error: true
        shell: bash
        run: |
          set -o pipefail
          node agent-workflow/tools/assert-signal-card-editorial-quality.mjs \
            --date="${RUN_DATE}" \
            2>&1 | tee "agent-workflow/reports/${RUN_DATE}-github-persistent-assets-pr-card-editorial-gate.log"
          node agent-workflow/tools/build-legacy-card-event-mappings.mjs
          node agent-workflow/tools/build-data-center-v4-obsidian-index.mjs

      - name: Legacy page compatibility - record trend candidate decision
        id: trend-decision
        if: steps.card-editorial-gate.outcome == 'success'
        continue-on-error: true
        shell: bash
        run: |
          set -o pipefail
          node agent-workflow/tools/run-trend-candidate-decision.mjs \
            --date="${RUN_DATE}" \
            --write-no-decision=true \
            2>&1 | tee "agent-workflow/reports/${RUN_DATE}-github-persistent-assets-pr-trend-decision.log"

      - name: Build legacy compatibility data and V4 Industry Reports projection
        id: business-frontstage-data
        if: steps.trend-decision.outcome == 'success'
        continue-on-error: true
        shell: bash
        run: |
          set -o pipefail
          node 01-SiteV2/site/scripts/build-v3-data-observation-desk.mjs \
            2>&1 | tee "agent-workflow/reports/${RUN_DATE}-github-persistent-assets-pr-business-frontstage-data.log"
          node 01-SiteV2/site/scripts/build-industry-reports-frontstage.mjs \
            2>&1 | tee "agent-workflow/reports/${RUN_DATE}-github-persistent-assets-pr-industry-reports-frontstage.log"
          node --test agent-workflow/tools/tests/industry-reports-frontstage.test.mjs

      - name: Run unified Business Signals frontstage gate
        id: business-frontstage-gate
        if: steps.business-frontstage-data.outcome == 'success'
        continue-on-error: true
        shell: bash
        run: |
          set -o pipefail
          node agent-workflow/tools/assert-business-signals-frontstage.mjs \
            --date="${RUN_DATE}" \
            --skip-editorial=true \
            2>&1 | tee "agent-workflow/reports/${RUN_DATE}-github-persistent-assets-pr-business-frontstage-gate.log"

      - name: Sync FDE and AI hardware Obsidian archives
        id: business-lenses-obsidian-sync
        if: steps.business-frontstage-gate.outcome == 'success'
        continue-on-error: true
        shell: bash
        run: |
          set -o pipefail
          node agent-workflow/tools/sync-business-lenses-to-obsidian.mjs \
            2>&1 | tee "agent-workflow/reports/${RUN_DATE}-github-persistent-assets-pr-business-lenses-obsidian-sync.log"

      - name: Sync operations data after V4 production
        id: operations-data
        if: always() && steps.data-center-v4-materialize.outcome == 'success'
        continue-on-error: true
        shell: bash
        run: |
          set -o pipefail
          node 01-SiteV2/site/scripts/sync-pipeline-dashboard-data.mjs \
            2>&1 | tee "agent-workflow/reports/${RUN_DATE}-github-persistent-assets-pr-operations-data.log"

      - name: Confirm site data freshness
        id: pre-commit-gate
        if: steps.business-frontstage-gate.outcome == 'success' && steps.operations-data.outcome == 'success'
        continue-on-error: true
        shell: bash
        run: |
          set -o pipefail
          node agent-workflow/tools/assert-daily-production-chain.mjs \
            --date="${RUN_DATE}" \
            --stage=pre-commit \
            --block-stale=true \
            2>&1 | tee "agent-workflow/reports/${RUN_DATE}-github-persistent-assets-pr-pre-commit-gate.log"

      - name: Write persistent asset manifest
        id: persistent-manifest
        if: always()
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p agent-workflow/reports

          raw_file="01-SiteV2/content/01-raw/${RUN_DATE}-raw-candidates.md"
          pool_file="01-SiteV2/content/02-pool/${RUN_DATE}-pool-candidates.md"
          signal_file="01-SiteV2/content/04-business-signals/signals/${RUN_DATE}-signals.md"

          state_for() {
            local path="$1"
            if [ -e "$path" ]; then
              echo "present"
            else
              echo "missing"
            fi
          }

          signal_card_count="$(find 01-SiteV2/knowledge/01-Signal-Cards -type f -name "${RUN_DATE}--signal--*.md" 2>/dev/null | wc -l | tr -d ' ')"

          cat > "agent-workflow/reports/${RUN_DATE}-persistent-asset-manifest.md" <<EOF
          # ${RUN_DATE} Data Center V4 + Internal Compatibility Asset Manifest

          - generated_at: $(date -Is)
          - workflow_mode: business_signals_pr
          - monitor: ${{ steps.monitor.outcome }}
          - raw_pool_gate: ${{ steps.persistent-assets-post-monitor.outcome }}
          - data_center_v4_build: ${{ steps.data-center-v4.outcome }}
          - data_center_v4_gate: ${{ steps.data-center-v4-gate.outcome }}
          - data_center_v4_materialize: ${{ steps.data-center-v4-materialize.outcome }}
          - asset_generation: ${{ steps.assets.outcome }}
          - pool_to_card_dedupe_gate: ${{ steps.pool-to-card-dedupe.outcome }}
          - card_editorial_gate: ${{ steps.card-editorial-gate.outcome }}
          - trend_candidate_decision: ${{ steps.trend-decision.outcome }}
          - business_frontstage_data: ${{ steps.business-frontstage-data.outcome }}
          - business_frontstage_gate: ${{ steps.business-frontstage-gate.outcome }}
          - operations_data_sync: ${{ steps.operations-data.outcome }}
          - pre_commit_gate: ${{ steps.pre-commit-gate.outcome }}

          ## Persisted Asset State

          | Asset | State |
          |---|---|
          | Raw candidates | $(state_for "$raw_file") |
          | Source raw artifacts | $(state_for "agent-workflow/reports/source-runs/${RUN_DATE}") |
          | Raw originals | $(state_for "01-SiteV2/content/01-raw/originals/${RUN_DATE}") |
          | Pool candidates | $(state_for "$pool_file") |
          | Data Center V4 bundle | $(state_for "01-SiteV2/content/11-databases/data-center-v4/${RUN_DATE}/manifest.json") |
          | Business signals | $(state_for "$signal_file") |
          | Signal card files | ${signal_card_count} |
          | V3 data observation desk data | $(state_for "01-SiteV2/site/data/v3-data-observation-desk.json") |
          | Industry Reports application data | $(state_for "01-SiteV2/site/data/industry-reports-frontstage.json") |
          | Intelligence graph index | $(state_for "01-SiteV2/site/data/intelligence-graph-index.json") |
          | Operations dashboard data | $(state_for "01-SiteV2/site/data/pipeline-dashboard.json") |

          ## Persistence Rule

          The Data Center V4 bundle must be committed only after its integrity gate passes.
          Raw / Pool remain source-capture and compatibility artifacts.
          Card assets must be committed once asset generation runs.
          The operations dashboard records V4 and compatibility lane states independently; compatibility assets are published only after their own gate passes.
          Accepted V4 facts persist after the V4 integrity/materialization gate; compatibility site data persists only when its own gates pass.
          First-line viewpoints data is produced by the independent first-line workflow.
          EOF

          cat > "agent-workflow/reports/${RUN_DATE}-persistent-asset-manifest.json" <<EOF
          {
            "date": "${RUN_DATE}",
            "generated_at": "$(date -Is)",
            "workflow_mode": "business_signals_pr",
            "outcomes": {
              "monitor": "${{ steps.monitor.outcome }}",
              "raw_pool_gate": "${{ steps.persistent-assets-post-monitor.outcome }}",
              "data_center_v4_build": "${{ steps.data-center-v4.outcome }}",
              "data_center_v4_gate": "${{ steps.data-center-v4-gate.outcome }}",
              "data_center_v4_materialize": "${{ steps.data-center-v4-materialize.outcome }}",
              "asset_generation": "${{ steps.assets.outcome }}",
              "pool_to_card_dedupe_gate": "${{ steps.pool-to-card-dedupe.outcome }}",
              "card_editorial_gate": "${{ steps.card-editorial-gate.outcome }}",
              "trend_candidate_decision": "${{ steps.trend-decision.outcome }}",
              "business_frontstage_data": "${{ steps.business-frontstage-data.outcome }}",
              "business_frontstage_gate": "${{ steps.business-frontstage-gate.outcome }}",
              "operations_data_sync": "${{ steps.operations-data.outcome }}",
              "pre_commit_gate": "${{ steps.pre-commit-gate.outcome }}"
            },
            "assets": {
              "raw_candidates": "$(state_for "$raw_file")",
              "source_raw_artifacts": "$(state_for "agent-workflow/reports/source-runs/${RUN_DATE}")",
              "raw_originals": "$(state_for "01-SiteV2/content/01-raw/originals/${RUN_DATE}")",
              "pool_candidates": "$(state_for "$pool_file")",
              "data_center_v4_bundle": "$(state_for "01-SiteV2/content/11-databases/data-center-v4/${RUN_DATE}/manifest.json")",
              "business_signals": "$(state_for "$signal_file")",
              "signal_card_files": ${signal_card_count},
              "v3_data_observation_desk": "$(state_for "01-SiteV2/site/data/v3-data-observation-desk.json")",
              "industry_reports_frontstage": "$(state_for "01-SiteV2/site/data/industry-reports-frontstage.json")",
              "intelligence_graph_index": "$(state_for "01-SiteV2/site/data/intelligence-graph-index.json")",
              "operations_dashboard_data": "$(state_for "01-SiteV2/site/data/pipeline-dashboard.json")"
            }
          }
          EOF

      - name: Upload business signals PR artifacts
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: wavesight-business-signals-pr-${{ steps.run-date.outputs.date }}
          if-no-files-found: warn
          retention-days: 14
          path: |
            agent-workflow/reports/${{ steps.run-date.outputs.date }}-github-daily-persistent-assets-pr.md
            agent-workflow/reports/source-runs/${{ steps.run-date.outputs.date }}/**
            agent-workflow/reports/${{ steps.run-date.outputs.date }}-github-persistent-assets-pr-*.log
            agent-workflow/reports/${{ steps.run-date.outputs.date }}-persistent-asset-manifest.md
            agent-workflow/reports/${{ steps.run-date.outputs.date }}-persistent-asset-manifest.json
            agent-workflow/reports/${{ steps.run-date.outputs.date }}-guanlan-*.md
            agent-workflow/reports/${{ steps.run-date.outputs.date }}-daily-production-chain-readiness.md
            agent-workflow/reports/${{ steps.run-date.outputs.date }}-pool-to-card-dedupe-gate.md
            agent-workflow/reports/${{ steps.run-date.outputs.date }}-business-signals-frontstage-gate.md
            agent-workflow/reports/${{ steps.run-date.outputs.date }}-business-signals-frontstage-gate.json
            agent-workflow/reports/${{ steps.run-date.outputs.date }}-data-center-v4-integrity-gate.md
            agent-workflow/reports/${{ steps.run-date.outputs.date }}-data-center-v4-integrity-gate.json
            agent-workflow/reports/${{ steps.run-date.outputs.date }}-trend-candidate-decision*.md
            agent-workflow/reports/${{ steps.run-date.outputs.date }}-no-trend-candidate-decision.md
            agent-workflow/reports/frontstage-regression-gate-*.md
            01-SiteV2/content/01-raw/${{ steps.run-date.outputs.date }}-raw-candidates.md
            01-SiteV2/content/01-raw/originals/${{ steps.run-date.outputs.date }}/**
            01-SiteV2/content/02-pool/${{ steps.run-date.outputs.date }}-pool-candidates.md
            01-SiteV2/content/11-databases/data-center-v4/${{ steps.run-date.outputs.date }}/**
            data-lake/tables/source_artifacts.jsonl
            data-lake/tables/raw_documents.jsonl
            data-lake/tables/claims.jsonl
            data-lake/tables/entities.jsonl
            data-lake/tables/entity_mentions.jsonl
            data-lake/tables/canonical_events.jsonl
            data-lake/tables/compatibility_cards.jsonl
            data-lake/tables/event_sources.jsonl
            data-lake/tables/event_claims.jsonl
            data-lake/tables/event_conflicts.jsonl
            data-lake/tables/relationships.jsonl
            data-lake/tables/tag_assertions.jsonl
            data-lake/tables/fde_records.jsonl
            data-lake/tables/hardware_records.jsonl
            data-lake/tables/qa_queue.jsonl
            data-lake/tables/legacy_asset_mappings.jsonl
            01-SiteV2/site/data/data-center-v4-frontstage.json
            01-SiteV2/content/04-business-signals/signals/${{ steps.run-date.outputs.date }}-signals.md
            01-SiteV2/knowledge/01-Signal-Cards/**/${{ steps.run-date.outputs.date }}--signal--*.md
            01-SiteV2/content/06-asset-candidates/trend/${{ steps.run-date.outputs.date }}--trend-candidate--*.md
            01-SiteV2/knowledge/03-Asset-Candidates/trend/${{ steps.run-date.outputs.date }}--trend-candidate--*.md
            01-SiteV2/site/data/v3-data-observation-desk.json
            01-SiteV2/site/data/industry-reports-frontstage.json
            01-SiteV2/site/data/intelligence-graph-index.json
            01-SiteV2/site/data/pipeline-dashboard.json
            01-SiteV2/site/data/pipeline-dashboard.js

      - name: Commit Data Center V4 and accepted compatibility assets
        id: commit
        if: always() && (steps.data-center-v4-materialize.outcome == 'success' || steps.pre-commit-gate.outcome == 'success')
        shell: bash
        run: |
          set -euo pipefail
          branch="automation/business-signals-${RUN_DATE}"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git checkout -B "$branch"

          stage_if_exists() {
            local path="$1"
            if [ -e "$path" ]; then
              git add "$path"
            fi
          }

          stage_find() {
            local root="$1"
            local pattern="$2"
            if [ -d "$root" ]; then
              find "$root" -type f -name "$pattern" -print0 | xargs -0 -r git add
            fi
          }

          stage_if_exists "agent-workflow/reports/${RUN_DATE}-github-daily-persistent-assets-pr.md"
          stage_if_exists "agent-workflow/reports/${RUN_DATE}-daily-production-chain-readiness.md"
          stage_if_exists "agent-workflow/reports/${RUN_DATE}-pool-to-card-dedupe-gate.md"
          stage_if_exists "agent-workflow/reports/${RUN_DATE}-pool-to-card-handoff.md"
          stage_if_exists "agent-workflow/reports/${RUN_DATE}-frontstage-manifest.json"
          stage_if_exists "agent-workflow/reports/${RUN_DATE}-data-center-v4-integrity-gate.md"
          stage_if_exists "agent-workflow/reports/${RUN_DATE}-data-center-v4-integrity-gate.json"
          stage_if_exists "agent-workflow/reports/${RUN_DATE}-persistent-asset-manifest.md"
          stage_if_exists "agent-workflow/reports/${RUN_DATE}-persistent-asset-manifest.json"
          stage_if_exists "agent-workflow/reports/${RUN_DATE}-guanlan-daily-monitor-log.md"
          stage_if_exists "agent-workflow/reports/${RUN_DATE}-guanlan-daily-monitor-quality-loop.md"
          stage_if_exists "agent-workflow/reports/${RUN_DATE}-guanlan-monitor-quality-gate.md"

          if [ "${{ steps.data-center-v4-materialize.outcome }}" = "success" ]; then
            stage_if_exists "01-SiteV2/content/01-raw/${RUN_DATE}-raw-candidates.md"
            stage_if_exists "01-SiteV2/content/01-raw/originals/${RUN_DATE}"
            stage_if_exists "01-SiteV2/content/02-pool/${RUN_DATE}-pool-candidates.md"
            stage_if_exists "01-SiteV2/content/11-databases/data-center-v4/${RUN_DATE}"
            stage_if_exists "01-SiteV2/site/data/data-center-v4-frontstage.json"
          fi

          if [ "${{ steps.pre-commit-gate.outcome }}" = "success" ] && [ "${{ steps.assets.outcome }}" = "success" ]; then
            stage_if_exists "01-SiteV2/content/04-business-signals/signals/${RUN_DATE}-signals.md"
            stage_if_exists "01-SiteV2/content/11-databases/data-center-v4/legacy-card-event-mappings.json"
            stage_if_exists "01-SiteV2/content/11-databases/data-center-v4/legacy-card-event-mappings.md"
            stage_if_exists "01-SiteV2/content/11-databases/data-center-v4/Data Center V4 Index.md"
            stage_find "01-SiteV2/knowledge/01-Signal-Cards" "${RUN_DATE}--signal--*.md"
            git add -u -- "01-SiteV2/knowledge/01-Signal-Cards"
            current_card_count="$(find "01-SiteV2/knowledge/01-Signal-Cards" -type f -name "${RUN_DATE}--signal--*.md" | wc -l | tr -d ' ')"
            staged_card_count="$(git ls-files ":(glob)01-SiteV2/knowledge/01-Signal-Cards/*/${RUN_DATE}--signal--*.md" | wc -l | tr -d ' ')"
            if [ "$current_card_count" != "$staged_card_count" ]; then
              echo "Same-date Card replacement mismatch: worktree=${current_card_count}, staged=${staged_card_count}" >&2
              exit 1
            fi
          fi

          if [ "${{ steps.pre-commit-gate.outcome }}" = "success" ] && [ "${{ steps.trend-decision.outcome }}" = "success" ]; then
            stage_find "01-SiteV2/content/06-asset-candidates/trend" "${RUN_DATE}--trend-candidate--*.md"
            stage_find "01-SiteV2/knowledge/03-Asset-Candidates/trend" "${RUN_DATE}--trend-candidate--*.md"
            no_decision_file="agent-workflow/reports/${RUN_DATE}-no-trend-candidate-decision.md"
            if git ls-files --error-unmatch "$no_decision_file" >/dev/null 2>&1; then
              git add -u -- "$no_decision_file"
            fi
          fi

          if [ "${{ steps.pre-commit-gate.outcome }}" = "success" ]; then
            stage_if_exists "agent-workflow/reports/${RUN_DATE}-business-signals-frontstage-gate.md"
            stage_if_exists "agent-workflow/reports/${RUN_DATE}-business-signals-frontstage-gate.json"
            stage_if_exists "agent-workflow/reports/${RUN_DATE}-trend-candidate-decision.md"
            stage_if_exists "agent-workflow/reports/${RUN_DATE}-trend-candidate-decision-blocked.md"
            stage_if_exists "agent-workflow/reports/${RUN_DATE}-no-trend-candidate-decision.md"
            stage_if_exists "01-SiteV2/site/data/v3-data-observation-desk.json"
            stage_if_exists "01-SiteV2/site/data/intelligence-graph-index.json"
          fi

          if [ "${{ steps.operations-data.outcome }}" = "success" ]; then
            stage_if_exists "01-SiteV2/site/data/pipeline-dashboard.json"
            stage_if_exists "01-SiteV2/site/data/pipeline-dashboard.js"
          fi

          if [ "${{ steps.pre-commit-gate.outcome }}" = "success" ] && [ "${{ steps.business-frontstage-data.outcome }}" = "success" ]; then
            stage_if_exists "01-SiteV2/site/data/industry-reports-frontstage.json"
          fi

          if git diff --cached --quiet; then
            echo "No generated changes to commit."
            echo "changed=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          git commit -m "Persist Data Center V4 assets for ${RUN_DATE}"
          git push --force-with-lease origin "$branch"
          echo "branch=$branch" >> "$GITHUB_OUTPUT"
          echo "changed=true" >> "$GITHUB_OUTPUT"

      - name: Open or update PR
        id: pr
        if: always() && steps.commit.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ secrets.GH_PR_TOKEN || github.token }}
        shell: bash
        run: |
          set -euo pipefail
          branch="${{ steps.commit.outputs.branch }}"
          manual_url="https://github.com/${GITHUB_REPOSITORY}/pull/new/${branch}"
          body_file="$(mktemp)"
          cat > "$body_file" <<BODY
          Data Center V4 update for ${RUN_DATE}.

          What this PR contains:
          - Data Center V4 factual bundle generated, gated, and materialized before page compatibility stages.
          - Raw / Pool generated in GitHub Actions and persisted after monitor gates passed.
          - Signal Cards persisted when asset generation succeeded.
          - A trend candidate or explicit no-candidate decision persisted after Card quality passed.
          - Internal Business Signals compatibility data included only when dedupe, source-first/regression, operations sync and pre-commit gates passed.
          - Industry Reports application data generated as a dedicated public projection when compatibility data is available.
          - Operations dashboard data included when the business-signal frontstage sync passes.
          - Persistent asset manifest for local Obsidian recovery.
          - Artifacts uploaded for review.

          Guardrails:
          - No direct main push.
          - Auto-merge requires the Data Center V4 integrity/materialization chain; failed compatibility gates cannot block accepted V4 facts.
          - No direct deploy from the automation branch; GitHub Pages deploys after main is updated.
          - No stopped content-output lane is executed.

          Automation result:
          - This PR is expected to auto-merge after gates pass.
          - After merge, GitHub Pages deploys from main automatically.
          - Pull main locally or let the WaveSight local Obsidian sync task fast-forward main after merge.
          BODY

          pr_number="$(gh pr list \
            --base main \
            --head "$branch" \
            --state open \
            --json number \
            --jq '.[0].number // empty')"

          if [ -n "$pr_number" ]; then
            pr_url="$(gh pr view "$pr_number" --json url --jq .url)"
            gh pr edit "$pr_number" \
              --title "Business Signals update ${RUN_DATE}" \
              --body-file "$body_file"
            echo "Updated PR #${pr_number}"
            echo "status=updated" >> "$GITHUB_OUTPUT"
            echo "pr_number=$pr_number" >> "$GITHUB_OUTPUT"
            echo "pr_url=$pr_url" >> "$GITHUB_OUTPUT"
            echo "manual_url=$manual_url" >> "$GITHUB_OUTPUT"
          else
            if pr_url="$(gh pr create \
              --base main \
              --head "$branch" \
              --title "Business Signals update ${RUN_DATE}" \
              --body-file "$body_file" 2>pr-create-error.log)"; then
              pr_number="$(gh pr list \
                --base main \
                --head "$branch" \
                --state open \
                --json number \
                --jq '.[0].number // empty')"
              if [ -z "$pr_number" ]; then
                echo "Created PR but could not resolve its open PR number for branch $branch" >&2
                exit 1
              fi
              echo "$pr_url"
              echo "status=created" >> "$GITHUB_OUTPUT"
              echo "pr_number=$pr_number" >> "$GITHUB_OUTPUT"
              echo "pr_url=$pr_url" >> "$GITHUB_OUTPUT"
              echo "manual_url=$manual_url" >> "$GITHUB_OUTPUT"
            else
              cat pr-create-error.log >&2
              if grep -Eqi "not permitted to create.*pull requests|GitHub Actions is not permitted" pr-create-error.log; then
                {
                  echo "### Business Signals PR branch is ready"
                  echo
                  echo "Business Signals assets were generated and the automation branch was pushed."
                  echo
                  echo "GitHub repository settings currently block GitHub Actions from creating pull requests with the default token."
                  echo
                  echo "- Branch: \`$branch\`"
                  echo "- Manual PR: $manual_url"
                  echo
                  echo "To make this fully automatic, enable the repository setting that allows GitHub Actions to create and merge pull requests, or provide a \`GH_PR_TOKEN\` secret with pull request write permission."
                } >> "$GITHUB_STEP_SUMMARY"
                echo "PR creation is blocked by repository settings; manual PR link: $manual_url"
                echo "status=manual_required" >> "$GITHUB_OUTPUT"
                echo "manual_url=$manual_url" >> "$GITHUB_OUTPUT"
                exit 0
              fi
              echo "status=failed" >> "$GITHUB_OUTPUT"
              exit 1
            fi
          fi

      - name: Auto-merge PR after gates pass
        id: auto-merge
        if: always() && steps.pr.outputs.pr_number != '' && steps.data-center-v4-materialize.outcome == 'success'
        env:
          GH_TOKEN: ${{ secrets.GH_PR_TOKEN || github.token }}
        shell: bash
        run: |
          set -euo pipefail
          pr_number="${{ steps.pr.outputs.pr_number }}"
          merge_body="Automated Data Center V4 update after factual integrity and materialization gates passed; compatibility assets are included only when their own gates pass."

          if gh pr merge "$pr_number" \
            --squash \
            --auto \
            --delete-branch \
            --subject "Persist business signals for ${RUN_DATE}" \
            --body "$merge_body" \
            2>auto-merge-error.log; then
            echo "status=enabled_or_merged" >> "$GITHUB_OUTPUT"
            echo "Auto-merge enabled or completed for PR #${pr_number}."
            exit 0
          fi

          cat auto-merge-error.log >&2

          if grep -Eqi "auto-merge.*disabled|not enabled for this repository|GraphQL:.*auto.?merge" auto-merge-error.log; then
            echo "Repository auto-merge is not available; attempting immediate merge after gates passed."
            if gh pr merge "$pr_number" \
              --squash \
              --delete-branch \
              --subject "Persist business signals for ${RUN_DATE}" \
              --body "$merge_body" 2>immediate-merge-error.log; then
              echo "status=merged" >> "$GITHUB_OUTPUT"
              exit 0
            fi
            cat immediate-merge-error.log >&2
            if grep -Eqi "merge conflicts|not mergeable|mergePullRequest" immediate-merge-error.log; then
              echo "status=publication_waiting" >> "$GITHUB_OUTPUT"
              echo "Production and quality gates passed; PR #${pr_number} is waiting for publication conflict repair." >> "$GITHUB_STEP_SUMMARY"
              exit 0
            fi
            exit 1
          fi

          echo "status=failed" >> "$GITHUB_OUTPUT"
          exit 1

      - name: Business signals PR result
        if: always()
        shell: bash
        run: |
          node agent-workflow/tools/classify-business-signals-production-state.mjs \
            --skip="${{ steps.existing-assets.outputs.skip }}" \
            --skipReason="${{ steps.existing-assets.outputs.reason }}" \
            --monitor="${{ steps.monitor.outcome }}" \
            --evidenceGate="${{ steps.persistent-assets-post-monitor.outcome }}" \
            --dataCenterBuild="${{ steps.data-center-v4.outcome }}" \
            --dataCenterGate="${{ steps.data-center-v4-gate.outcome }}" \
            --dataCenterMaterialize="${{ steps.data-center-v4-materialize.outcome }}" \
            --cards="${{ steps.assets.outcome }}" \
            --dedupe="${{ steps.pool-to-card-dedupe.outcome }}" \
            --cardEditorial="${{ steps.card-editorial-gate.outcome }}" \
            --trendDecision="${{ steps.trend-decision.outcome }}" \
            --frontstageData="${{ steps.business-frontstage-data.outcome }}" \
            --frontstageGate="${{ steps.business-frontstage-gate.outcome }}" \
            --operations="${{ steps.operations-data.outcome }}" \
            --freshness="${{ steps.pre-commit-gate.outcome }}" \
            --commit="${{ steps.commit.outcome }}" \
            --changed="${{ steps.commit.outputs.changed }}" \
            --pr="${{ steps.pr.outcome }}" \
            --prStatus="${{ steps.pr.outputs.status }}" \
            --merge="${{ steps.auto-merge.outcome }}" \
            --mergeStatus="${{ steps.auto-merge.outputs.status }}"
