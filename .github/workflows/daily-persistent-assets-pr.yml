name: WaveSight Business Signals PR

on:
  schedule:
    # 09:07 Asia/Shanghai, every day. Avoids exact-hour GitHub Actions schedule congestion.
    - cron: "7 1 * * *"
  workflow_dispatch:
    inputs:
      date:
        description: "Asia/Shanghai date to run, formatted as YYYY-MM-DD. Leave empty for today."
        required: false
        type: string
      pass_score:
        description: "Daily Monitor pre-gate pass score."
        required: false
        default: "80"
        type: string

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: wavesight-business-signals-${{ github.event.inputs.date || github.run_id }}
  cancel-in-progress: false

jobs:
  business-signals-pr:
    name: Business Signals Scheduled PR
    runs-on: ubuntu-latest
    timeout-minutes: 90
    env:
      TZ: Asia/Shanghai
      ANYSEARCH_API_KEY: ${{ secrets.ANYSEARCH_API_KEY }}
      TAVILY_API_KEY: ${{ secrets.TAVILY_API_KEY }}
      EXA_API_KEY: ${{ secrets.EXA_API_KEY }}
      FEISHU_WEBHOOK_URL: ${{ secrets.FEISHU_WEBHOOK_URL }}
      FEISHU_WEBHOOK_SECRET: ${{ secrets.FEISHU_WEBHOOK_SECRET }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Resolve run date
        id: run-date
        shell: bash
        run: |
          if [ -n "${{ github.event.inputs.date }}" ]; then
            run_date="${{ github.event.inputs.date }}"
          else
            run_date="$(TZ=Asia/Shanghai date +%F)"
          fi

          if ! [[ "$run_date" =~ ^[0-9]{4}-[0-9]{2}-[0-9]{2}$ ]]; then
            echo "Invalid date: $run_date" >&2
            exit 2
          fi

          echo "date=$run_date" >> "$GITHUB_OUTPUT"
          echo "RUN_DATE=$run_date" >> "$GITHUB_ENV"

      - name: Check existing business-signal assets
        id: existing-assets
        shell: bash
        run: |
          set -euo pipefail
          skip=false
          reason="not_applicable"
          branch_exists=false

          raw_file="01-SiteV2/content/01-raw/${RUN_DATE}-raw-candidates.md"
          pool_file="01-SiteV2/content/02-pool/${RUN_DATE}-pool-candidates.md"
          signal_file="01-SiteV2/content/04-business-signals/signals/${RUN_DATE}-signals.md"
          branch="automation/business-signals-${RUN_DATE}"

          if git ls-remote --exit-code --heads origin "$branch" >/dev/null 2>&1; then
            branch_exists=true
          fi

          if [ "${{ github.event_name }}" = "schedule" ]; then
            if [ -f "$raw_file" ] && [ -f "$pool_file" ] && [ -f "$signal_file" ]; then
              skip=true
              reason="same-date business-signal assets already exist on main"
            fi
          fi

          echo "skip=$skip" >> "$GITHUB_OUTPUT"
          echo "reason=$reason" >> "$GITHUB_OUTPUT"
          echo "branch_exists=$branch_exists" >> "$GITHUB_OUTPUT"
          echo "skip_business_signal_assets=$skip"
          echo "business_signal_skip_reason=$reason"
          echo "existing_automation_branch=$branch_exists"

      - name: Report cloud dependency state
        shell: bash
        run: |
          {
            echo "# GitHub Business Signals PR"
            echo
            echo "- date: ${RUN_DATE}"
            echo "- generated_at: $(date -Is)"
            echo "- mode: business_signals_pr"
            echo "- trigger: ${{ github.event_name }}"
            echo "- schedule: 09:07 Asia/Shanghai daily"
            echo "- business_signal_skip: ${{ steps.existing-assets.outputs.skip }}"
            echo "- business_signal_skip_reason: ${{ steps.existing-assets.outputs.reason }}"
            echo "- existing_automation_branch: ${{ steps.existing-assets.outputs.branch_exists }}"
            echo "- anysearch_secret: $([ -n "$ANYSEARCH_API_KEY" ] && echo configured || echo missing)"
            echo "- tavily_secret: $([ -n "$TAVILY_API_KEY" ] && echo configured || echo missing)"
            echo "- exa_secret: $([ -n "$EXA_API_KEY" ] && echo configured || echo missing)"
            echo "- openai_or_deepseek_required: false"
            echo
            echo "This V3.3 workflow commits Raw / Pool / business-signal Card assets, business-signal frontstage data, intelligence map data, topic-center data, and operations dashboard data to an automation branch, opens or updates a PR, and auto-merges the PR after all gates pass."
            echo "Raw / Pool are persisted after monitor gates pass. Card assets are persisted after asset generation. Site data is persisted only after frontstage gates pass."
            echo "First-line viewpoints are produced by .github/workflows/daily-first-line-viewpoints-pr.yml and are not part of this business-signal PR."
            echo "It never pushes directly to main. GitHub Pages deploys automatically after the PR merge updates main."
            echo
            echo "Production order:"
            echo "1. Run Daily Monitor with QC."
            echo "2. Confirm final active Raw / Pool post-dedupe counts and historical duplicate count."
            echo "3. Regenerate business-signal Card assets in the runner workspace."
            echo "4. Run Pool-to-Card duplicate gate."
            echo "5. Write a persistent asset manifest."
            echo "6. Sync V3.3 business-signal site data when business-signal gates pass."
            echo "7. Confirm same-date downstream assets are no longer stale."
            echo "8. Commit generated assets to an automation branch and open or update a PR."
            echo "9. Auto-merge the PR after all gates pass, so main triggers GitHub Pages deployment."
            echo
            echo "Skipped by design:"
            echo "- Trend candidate / no-decision shell."
            echo "- paused opinion lane."
            echo "- Direct main commit."
            echo "- Direct deploy from the automation branch."
          } | tee "agent-workflow/reports/${RUN_DATE}-github-daily-persistent-assets-pr.md"

      - name: Syntax checks
        shell: bash
        run: |
          node --check agent-workflow/tools/run-guanlan-daily-monitor.mjs
          node --check agent-workflow/tools/run-guanlan-daily-monitor-with-qc.mjs
          node --check agent-workflow/tools/assert-guanlan-automation-readiness.mjs
          node --check agent-workflow/tools/assert-daily-production-chain.mjs
          node --check agent-workflow/tools/generate-asset-cards-from-pool.mjs
          node --check agent-workflow/tools/assert-pool-to-card-dedupe.mjs
          node --check agent-workflow/tools/assert-v3-source-first-frontstage.mjs
          node --check agent-workflow/tools/frontstage-regression-gate.mjs
          node --check agent-workflow/tools/build-hermes-daily-brief.mjs
          node --check agent-workflow/tools/assert-community-intelligence-data.mjs
          node --check agent-workflow/tools/build-topic-center-data.mjs
          node --check agent-workflow/tools/send-feishu-webhook.mjs
          node --check 01-SiteV2/site/scripts/build-v3-data-observation-desk.mjs
          node --check 01-SiteV2/site/scripts/sync-pipeline-dashboard-data.mjs
          gh --version

      - name: Run Daily Monitor with QC
        id: monitor
        if: steps.existing-assets.outputs.skip != 'true'
        continue-on-error: true
        shell: bash
        run: |
          set -o pipefail
          node agent-workflow/tools/run-guanlan-daily-monitor-with-qc.mjs \
            --date="${RUN_DATE}" \
            --pass-score="${{ github.event.inputs.pass_score || '80' }}" \
            --max-cycles=3 \
            --search-limit=180 \
            --search-path-query-limit=5 \
            --gdelt-query-limit=12 \
            --hn-limit=15 \
            --fetch-timeout-ms=20000 \
            --snapshot-timeout-ms=16000 \
            --monitor-timeout-ms=840000 \
            2>&1 | tee "agent-workflow/reports/${RUN_DATE}-github-persistent-assets-pr-monitor-run.log"

      - name: Check monitor readiness
        id: monitor-readiness
        if: always() && steps.existing-assets.outputs.skip != 'true'
        continue-on-error: true
        shell: bash
        run: |
          set -o pipefail
          node agent-workflow/tools/assert-guanlan-automation-readiness.mjs \
            --command=monitor \
            --date="${RUN_DATE}" \
            2>&1 | tee "agent-workflow/reports/${RUN_DATE}-github-persistent-assets-pr-monitor-readiness.log"

      - name: Confirm Raw / Pool post-dedupe counts
        id: persistent-assets-post-monitor
        if: always() && steps.existing-assets.outputs.skip != 'true'
        continue-on-error: true
        shell: bash
        run: |
          set -o pipefail
          node agent-workflow/tools/assert-daily-production-chain.mjs \
            --date="${RUN_DATE}" \
            --stage=post-monitor \
            --raw-min=150 \
            --pool-min=75 \
            2>&1 | tee "agent-workflow/reports/${RUN_DATE}-github-persistent-assets-pr-post-monitor-gate.log"

      - name: Regenerate business-signal Card assets
        id: assets
        if: steps.monitor.outcome == 'success' && steps.monitor-readiness.outcome == 'success' && steps.persistent-assets-post-monitor.outcome == 'success'
        continue-on-error: true
        shell: bash
        run: |
          set -o pipefail
          node agent-workflow/tools/generate-asset-cards-from-pool.mjs \
            --date="${RUN_DATE}" \
            --require-final-qc=false \
            --signal-target=10 \
            --trend-candidates=false \
            2>&1 | tee "agent-workflow/reports/${RUN_DATE}-github-persistent-assets-pr-assets.log"

      - name: Run Pool-to-Card duplicate gate
        id: pool-to-card-dedupe
        if: steps.assets.outcome == 'success'
        continue-on-error: true
        shell: bash
        run: |
          set -o pipefail
          node agent-workflow/tools/assert-pool-to-card-dedupe.mjs \
            --date="${RUN_DATE}" \
            2>&1 | tee "agent-workflow/reports/${RUN_DATE}-github-persistent-assets-pr-pool-to-card-dedupe.log"

      - name: Sync site data
        id: site-data
        if: steps.pool-to-card-dedupe.outcome == 'success'
        continue-on-error: true
        shell: bash
        run: |
          set -o pipefail
          node 01-SiteV2/site/scripts/build-v3-data-observation-desk.mjs
          node 01-SiteV2/site/scripts/sync-pipeline-dashboard-data.mjs
          node agent-workflow/tools/build-topic-center-data.mjs --date="${RUN_DATE}"

      - name: Run V3 source-first frontstage gate
        id: source-first-frontstage
        if: steps.site-data.outcome == 'success'
        continue-on-error: true
        shell: bash
        run: |
          set -o pipefail
          node agent-workflow/tools/assert-v3-source-first-frontstage.mjs \
            2>&1 | tee "agent-workflow/reports/${RUN_DATE}-github-persistent-assets-pr-source-first-frontstage.log"

      - name: Run frontstage regression gate
        id: frontstage-regression
        if: steps.site-data.outcome == 'success'
        continue-on-error: true
        shell: bash
        run: |
          set -o pipefail
          node agent-workflow/tools/frontstage-regression-gate.mjs \
            2>&1 | tee "agent-workflow/reports/${RUN_DATE}-github-persistent-assets-pr-frontstage-regression.log"

      - name: Confirm site data freshness
        id: pre-commit-gate
        if: steps.source-first-frontstage.outcome == 'success' && steps.frontstage-regression.outcome == 'success'
        continue-on-error: true
        shell: bash
        run: |
          set -o pipefail
          node agent-workflow/tools/assert-daily-production-chain.mjs \
            --date="${RUN_DATE}" \
            --stage=pre-commit \
            --raw-min=150 \
            --pool-min=75 \
            --block-stale=true \
            2>&1 | tee "agent-workflow/reports/${RUN_DATE}-github-persistent-assets-pr-pre-commit-gate.log"

      - name: Write persistent asset manifest
        id: persistent-manifest
        if: always()
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p agent-workflow/reports

          raw_file="01-SiteV2/content/01-raw/${RUN_DATE}-raw-candidates.md"
          pool_file="01-SiteV2/content/02-pool/${RUN_DATE}-pool-candidates.md"
          signal_file="01-SiteV2/content/04-business-signals/signals/${RUN_DATE}-signals.md"

          state_for() {
            local path="$1"
            if [ -e "$path" ]; then
              echo "present"
            else
              echo "missing"
            fi
          }

          signal_card_count="$(find 01-SiteV2/knowledge/01-Signal-Cards -type f -name "${RUN_DATE}--signal--*.md" 2>/dev/null | wc -l | tr -d ' ')"

          cat > "agent-workflow/reports/${RUN_DATE}-persistent-asset-manifest.md" <<EOF
          # ${RUN_DATE} Business Signals Asset Manifest

          - generated_at: $(date -Is)
          - workflow_mode: business_signals_pr
          - monitor: ${{ steps.monitor.outcome }}
          - monitor_readiness: ${{ steps.monitor-readiness.outcome }}
          - raw_pool_gate: ${{ steps.persistent-assets-post-monitor.outcome }}
          - asset_generation: ${{ steps.assets.outcome }}
          - pool_to_card_dedupe_gate: ${{ steps.pool-to-card-dedupe.outcome }}
          - site_data_sync: ${{ steps.site-data.outcome }}
          - source_first_frontstage_gate: ${{ steps.source-first-frontstage.outcome }}
          - frontstage_regression_gate: ${{ steps.frontstage-regression.outcome }}
          - pre_commit_gate: ${{ steps.pre-commit-gate.outcome }}

          ## Persisted Asset State

          | Asset | State |
          |---|---|
          | Raw candidates | $(state_for "$raw_file") |
          | Raw originals | $(state_for "01-SiteV2/content/01-raw/originals/${RUN_DATE}") |
          | Pool candidates | $(state_for "$pool_file") |
          | Business signals | $(state_for "$signal_file") |
          | Signal card files | ${signal_card_count} |
          | Site content data | $(state_for "01-SiteV2/site/data/site-content.json") |
          | V3 data observation desk data | $(state_for "01-SiteV2/site/data/v3-data-observation-desk.json") |
          | Intelligence graph index | $(state_for "01-SiteV2/site/data/intelligence-graph-index.json") |
          | Operations dashboard data | $(state_for "01-SiteV2/site/data/pipeline-dashboard.json") |

          ## Persistence Rule

          Raw / Pool must be committed once monitor and post-monitor gates pass.
          Card assets must be committed once asset generation runs.
          Site data must be committed only when dedupe, site sync, source-first frontstage, frontstage regression and pre-commit gates pass.
          First-line viewpoints data is produced by the independent first-line workflow.
          EOF

          cat > "agent-workflow/reports/${RUN_DATE}-persistent-asset-manifest.json" <<EOF
          {
            "date": "${RUN_DATE}",
            "generated_at": "$(date -Is)",
            "workflow_mode": "business_signals_pr",
            "outcomes": {
              "monitor": "${{ steps.monitor.outcome }}",
              "monitor_readiness": "${{ steps.monitor-readiness.outcome }}",
              "raw_pool_gate": "${{ steps.persistent-assets-post-monitor.outcome }}",
              "asset_generation": "${{ steps.assets.outcome }}",
              "pool_to_card_dedupe_gate": "${{ steps.pool-to-card-dedupe.outcome }}",
              "site_data_sync": "${{ steps.site-data.outcome }}",
              "source_first_frontstage_gate": "${{ steps.source-first-frontstage.outcome }}",
              "frontstage_regression_gate": "${{ steps.frontstage-regression.outcome }}",
              "pre_commit_gate": "${{ steps.pre-commit-gate.outcome }}"
            },
            "assets": {
              "raw_candidates": "$(state_for "$raw_file")",
              "raw_originals": "$(state_for "01-SiteV2/content/01-raw/originals/${RUN_DATE}")",
              "pool_candidates": "$(state_for "$pool_file")",
              "business_signals": "$(state_for "$signal_file")",
              "signal_card_files": ${signal_card_count},
              "site_content_data": "$(state_for "01-SiteV2/site/data/site-content.json")",
              "v3_data_observation_desk": "$(state_for "01-SiteV2/site/data/v3-data-observation-desk.json")",
              "intelligence_graph_index": "$(state_for "01-SiteV2/site/data/intelligence-graph-index.json")",
              "operations_dashboard_data": "$(state_for "01-SiteV2/site/data/pipeline-dashboard.json")"
            }
          }
          EOF

      - name: Upload business signals PR artifacts
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: wavesight-business-signals-pr-${{ steps.run-date.outputs.date }}
          if-no-files-found: warn
          retention-days: 14
          path: |
            agent-workflow/reports/${{ steps.run-date.outputs.date }}-github-daily-persistent-assets-pr.md
            agent-workflow/reports/${{ steps.run-date.outputs.date }}-github-persistent-assets-pr-*.log
            agent-workflow/reports/${{ steps.run-date.outputs.date }}-persistent-asset-manifest.md
            agent-workflow/reports/${{ steps.run-date.outputs.date }}-persistent-asset-manifest.json
            agent-workflow/reports/${{ steps.run-date.outputs.date }}-guanlan-*.md
            agent-workflow/reports/${{ steps.run-date.outputs.date }}-daily-production-chain-readiness.md
            agent-workflow/reports/${{ steps.run-date.outputs.date }}-pool-to-card-dedupe-gate.md
            01-SiteV2/content/01-raw/${{ steps.run-date.outputs.date }}-raw-candidates.md
            01-SiteV2/content/01-raw/originals/${{ steps.run-date.outputs.date }}/**
            01-SiteV2/content/02-pool/${{ steps.run-date.outputs.date }}-pool-candidates.md
            01-SiteV2/content/04-business-signals/signals/${{ steps.run-date.outputs.date }}-signals.md
            01-SiteV2/knowledge/01-Signal-Cards/**/${{ steps.run-date.outputs.date }}--signal--*.md
            01-SiteV2/site/data/site-content.json
            01-SiteV2/site/data/site-content.js
            01-SiteV2/site/data/v3-data-observation-desk.json
            01-SiteV2/site/data/intelligence-graph-index.json
            01-SiteV2/site/data/pipeline-dashboard.json
            01-SiteV2/site/data/pipeline-dashboard.js
            01-SiteV2/site/data/topic-center.json
            01-SiteV2/site/data/topic-center.js

      - name: Commit business signals to automation branch
        id: commit
        if: always() && steps.pre-commit-gate.outcome == 'success'
        shell: bash
        run: |
          set -euo pipefail
          branch="automation/business-signals-${RUN_DATE}"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git checkout -B "$branch"

          stage_if_exists() {
            local path="$1"
            if [ -e "$path" ]; then
              git add "$path"
            fi
          }

          stage_find() {
            local root="$1"
            local pattern="$2"
            if [ -d "$root" ]; then
              find "$root" -type f -name "$pattern" -print0 | xargs -0 -r git add
            fi
          }

          stage_if_exists "agent-workflow/reports/${RUN_DATE}-github-daily-persistent-assets-pr.md"
          stage_if_exists "agent-workflow/reports/${RUN_DATE}-daily-production-chain-readiness.md"
          stage_if_exists "agent-workflow/reports/${RUN_DATE}-pool-to-card-dedupe-gate.md"
          stage_if_exists "agent-workflow/reports/${RUN_DATE}-persistent-asset-manifest.md"
          stage_if_exists "agent-workflow/reports/${RUN_DATE}-persistent-asset-manifest.json"
          stage_if_exists "agent-workflow/reports/${RUN_DATE}-guanlan-daily-monitor-log.md"
          stage_if_exists "agent-workflow/reports/${RUN_DATE}-guanlan-daily-monitor-quality-loop.md"
          stage_if_exists "agent-workflow/reports/${RUN_DATE}-guanlan-monitor-quality-gate.md"

          stage_if_exists "01-SiteV2/content/01-raw/${RUN_DATE}-raw-candidates.md"
          stage_if_exists "01-SiteV2/content/01-raw/originals/${RUN_DATE}"
          stage_if_exists "01-SiteV2/content/02-pool/${RUN_DATE}-pool-candidates.md"

          if [ "${{ steps.assets.outcome }}" = "success" ]; then
            stage_if_exists "01-SiteV2/content/04-business-signals/signals/${RUN_DATE}-signals.md"
            stage_find "01-SiteV2/knowledge/01-Signal-Cards" "${RUN_DATE}--signal--*.md"
          fi

          if [ "${{ steps.pre-commit-gate.outcome }}" = "success" ]; then
            stage_if_exists "01-SiteV2/site/data/site-content.json"
            stage_if_exists "01-SiteV2/site/data/site-content.js"
            stage_if_exists "01-SiteV2/site/data/v3-data-observation-desk.json"
            stage_if_exists "01-SiteV2/site/data/intelligence-graph-index.json"
            stage_if_exists "01-SiteV2/site/data/pipeline-dashboard.json"
            stage_if_exists "01-SiteV2/site/data/pipeline-dashboard.js"
            stage_if_exists "01-SiteV2/site/data/topic-center.json"
            stage_if_exists "01-SiteV2/site/data/topic-center.js"
          fi

          if git diff --cached --quiet; then
            echo "No generated changes to commit."
            echo "changed=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          git commit -m "Persist business signals for ${RUN_DATE}"
          git push --force-with-lease origin "$branch"
          echo "branch=$branch" >> "$GITHUB_OUTPUT"
          echo "changed=true" >> "$GITHUB_OUTPUT"

      - name: Open or update PR
        id: pr
        if: always() && steps.commit.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ secrets.GH_PR_TOKEN || github.token }}
        shell: bash
        run: |
          set -euo pipefail
          branch="${{ steps.commit.outputs.branch }}"
          manual_url="https://github.com/${GITHUB_REPOSITORY}/pull/new/${branch}"
          body_file="$(mktemp)"
          cat > "$body_file" <<BODY
          Business Signals update for ${RUN_DATE}.

          What this PR contains:
          - Raw / Pool generated in GitHub Actions and persisted after monitor gates passed.
          - Signal Cards persisted when asset generation succeeded.
          - Site data included only when dedupe, sync, source-first frontstage, frontstage regression and pre-commit gates passed.
          - Intelligence map and topic-center data generated from the business-signal Card chain.
          - Operations dashboard data included when the business-signal frontstage sync passes.
          - Persistent asset manifest for local Obsidian recovery.
          - Artifacts uploaded for review.

          Guardrails:
          - No direct main push.
          - Auto-merge is allowed only after the full daily asset and frontstage gate chain passes.
          - No direct deploy from the automation branch; GitHub Pages deploys after main is updated.
          - No stopped content-output lane is executed.

          Automation result:
          - This PR is expected to auto-merge after gates pass.
          - After merge, GitHub Pages deploys from main automatically.
          - Pull main locally or let the WaveSight local Obsidian sync task fast-forward main after merge.
          BODY

          if pr_number="$(gh pr view "$branch" --json number --jq .number 2>/dev/null)"; then
            pr_url="$(gh pr view "$branch" --json url --jq .url)"
            gh pr edit "$pr_number" \
              --title "Business Signals update ${RUN_DATE}" \
              --body-file "$body_file"
            echo "Updated PR #${pr_number}"
            echo "status=updated" >> "$GITHUB_OUTPUT"
            echo "pr_number=$pr_number" >> "$GITHUB_OUTPUT"
            echo "pr_url=$pr_url" >> "$GITHUB_OUTPUT"
            echo "manual_url=$manual_url" >> "$GITHUB_OUTPUT"
          else
            if pr_url="$(gh pr create \
              --base main \
              --head "$branch" \
              --title "Business Signals update ${RUN_DATE}" \
              --body-file "$body_file" 2>pr-create-error.log)"; then
              pr_number="$(gh pr view "$branch" --json number --jq .number)"
              echo "$pr_url"
              echo "status=created" >> "$GITHUB_OUTPUT"
              echo "pr_number=$pr_number" >> "$GITHUB_OUTPUT"
              echo "pr_url=$pr_url" >> "$GITHUB_OUTPUT"
              echo "manual_url=$manual_url" >> "$GITHUB_OUTPUT"
            else
              cat pr-create-error.log >&2
              if grep -Eqi "not permitted to create.*pull requests|GitHub Actions is not permitted" pr-create-error.log; then
                {
                  echo "### Business Signals PR branch is ready"
                  echo
                  echo "Business Signals assets were generated and the automation branch was pushed."
                  echo
                  echo "GitHub repository settings currently block GitHub Actions from creating pull requests with the default token."
                  echo
                  echo "- Branch: \`$branch\`"
                  echo "- Manual PR: $manual_url"
                  echo
                  echo "To make this fully automatic, enable the repository setting that allows GitHub Actions to create and merge pull requests, or provide a \`GH_PR_TOKEN\` secret with pull request write permission."
                } >> "$GITHUB_STEP_SUMMARY"
                echo "PR creation is blocked by repository settings; manual PR link: $manual_url"
                echo "status=manual_required" >> "$GITHUB_OUTPUT"
                echo "manual_url=$manual_url" >> "$GITHUB_OUTPUT"
                exit 0
              fi
              echo "status=failed" >> "$GITHUB_OUTPUT"
              exit 1
            fi
          fi

      - name: Auto-merge PR after gates pass
        id: auto-merge
        if: always() && steps.pr.outputs.pr_number != '' && steps.pre-commit-gate.outcome == 'success'
        env:
          GH_TOKEN: ${{ secrets.GH_PR_TOKEN || github.token }}
        shell: bash
        run: |
          set -euo pipefail
          pr_number="${{ steps.pr.outputs.pr_number }}"
          merge_body="Automated Business Signals update after monitor, dedupe, source-first frontstage and frontstage regression gates passed."

          if gh pr merge "$pr_number" \
            --squash \
            --auto \
            --delete-branch \
            --subject "Persist business signals for ${RUN_DATE}" \
            --body "$merge_body" \
            2>auto-merge-error.log; then
            echo "status=enabled_or_merged" >> "$GITHUB_OUTPUT"
            echo "Auto-merge enabled or completed for PR #${pr_number}."
            exit 0
          fi

          cat auto-merge-error.log >&2

          if grep -Eqi "auto-merge.*disabled|not enabled for this repository|GraphQL:.*auto.?merge" auto-merge-error.log; then
            echo "Repository auto-merge is not available; attempting immediate merge after gates passed."
            gh pr merge "$pr_number" \
              --squash \
              --delete-branch \
              --subject "Persist business signals for ${RUN_DATE}" \
              --body "$merge_body"
            echo "status=merged" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "status=failed" >> "$GITHUB_OUTPUT"
          exit 1

      - name: Build Hermes daily brief
        id: hermes-brief
        if: always()
        continue-on-error: true
        shell: bash
        run: |
          set -o pipefail
          node agent-workflow/tools/build-hermes-daily-brief.mjs \
            --date="${RUN_DATE}" \
            --trigger="${{ github.event_name }}" \
            --skip="${{ steps.existing-assets.outputs.skip }}" \
            --skip-reason="${{ steps.existing-assets.outputs.reason }}" \
            --monitor="${{ steps.monitor.outcome }}" \
            --monitor-readiness="${{ steps.monitor-readiness.outcome }}" \
            --raw-pool-gate="${{ steps.persistent-assets-post-monitor.outcome }}" \
            --asset-generation="${{ steps.assets.outcome }}" \
            --pool-to-card-dedupe="${{ steps.pool-to-card-dedupe.outcome }}" \
            --builders-data="not_required" \
            --builders-gate="not_required" \
            --site-data="${{ steps.site-data.outcome }}" \
            --source-first-frontstage="${{ steps.source-first-frontstage.outcome }}" \
            --frontstage-regression="${{ steps.frontstage-regression.outcome }}" \
            --pre-commit-gate="${{ steps.pre-commit-gate.outcome }}" \
            --commit="${{ steps.commit.outcome }}" \
            --pr="${{ steps.pr.outcome }}" \
            --auto-merge="${{ steps.auto-merge.outcome }}" \
            --pr-url="${{ steps.pr.outputs.pr_url }}" \
            --manual-url="${{ steps.pr.outputs.manual_url }}" \
            --run-url="https://github.com/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}" \
            --page-url="${{ vars.WAVESIGHT_SITE_URL || '' }}" \
            --commit-sha="${GITHUB_SHA}" \
            2>&1 | tee "agent-workflow/reports/${RUN_DATE}-github-persistent-assets-pr-hermes-brief.log"

      - name: Send Hermes brief to Feishu Agent
        id: feishu-notify
        if: always() && steps.hermes-brief.outcome == 'success'
        continue-on-error: true
        shell: bash
        run: |
          set -o pipefail
          node agent-workflow/tools/send-feishu-webhook.mjs \
            --file="agent-workflow/reports/${RUN_DATE}-hermes-daily-brief.json" \
            2>&1 | tee "agent-workflow/reports/${RUN_DATE}-github-persistent-assets-pr-feishu-notify.log"

      - name: Business signals PR result
        if: always()
        shell: bash
        run: |
          fail=0

          if [ "${{ steps.existing-assets.outputs.skip }}" = "true" ]; then
            echo "Business-signal chain skipped: ${{ steps.existing-assets.outputs.reason }}"
            echo "Business Signals scheduled PR run passed without changes because same-date assets already exist on main."
            exit 0
          fi

          require_success() {
            local label="$1"
            local outcome="$2"
            if [ "$outcome" != "success" ]; then
              echo "${label} did not pass: ${outcome}" >&2
              fail=1
            fi
          }

          business_fail=0
          require_business_success() {
            local label="$1"
            local outcome="$2"
            if [ "$outcome" != "success" ]; then
              echo "${label} did not pass: ${outcome}" >&2
              business_fail=1
            fi
          }

          if [ "${{ steps.existing-assets.outputs.skip }}" != "true" ]; then
            require_business_success "Daily Monitor with QC" "${{ steps.monitor.outcome }}"
            require_business_success "Monitor readiness" "${{ steps.monitor-readiness.outcome }}"
            require_business_success "Raw / Pool post-dedupe gate" "${{ steps.persistent-assets-post-monitor.outcome }}"
            require_business_success "Business-signal Card regeneration" "${{ steps.assets.outcome }}"
            require_business_success "Pool-to-Card duplicate gate" "${{ steps.pool-to-card-dedupe.outcome }}"
          fi

          if [ "${{ steps.pre-commit-gate.outcome }}" = "success" ]; then
            require_business_success "Site data sync" "${{ steps.site-data.outcome }}"
            require_business_success "V3 source-first frontstage gate" "${{ steps.source-first-frontstage.outcome }}"
            require_business_success "Frontstage regression gate" "${{ steps.frontstage-regression.outcome }}"
            require_business_success "Site freshness gate" "${{ steps.pre-commit-gate.outcome }}"
          else
            business_fail=1
            echo "Business-signal frontstage data was not fully persisted." >&2
          fi
          require_success "Commit business signals" "${{ steps.commit.outcome }}"

          if [ "${{ steps.commit.outputs.changed }}" = "true" ]; then
            require_success "Open or update PR" "${{ steps.pr.outcome }}"
            if [ "${{ steps.pr.outputs.status }}" = "manual_required" ]; then
              echo "Business Signals gates passed, and the automation branch was pushed."
              echo "Manual PR is required because repository settings block GitHub Actions PR creation:"
              echo "${{ steps.pr.outputs.manual_url }}"
              # Auto-merge is expected to be skipped when repo settings block it
            else
              require_success "Auto-merge PR" "${{ steps.auto-merge.outcome }}"
            fi
          fi

          if [ "${{ steps.existing-assets.outputs.skip }}" != "true" ] && [ "${{ steps.pre-commit-gate.outcome }}" != "success" ]; then
            echo "Business-signal frontstage data was not persisted because one or more business-signal gates did not fully pass." >&2
          fi

          if [ "$business_fail" -ne 0 ]; then
            echo "Business-signal chain did not fully pass in this run." >&2
          fi

          if [ "$fail" -ne 0 ]; then
            echo "Business Signals scheduled PR run did not pass. Inspect the PR branch and uploaded artifacts. Nothing was pushed directly to main or deployed from the automation branch." >&2
            exit 1
          fi

          echo "Business Signals scheduled PR run passed. The PR was merged or auto-merge was enabled; GitHub Pages will deploy after main updates."
