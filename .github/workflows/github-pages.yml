name: Deploy Frontstage to GitHub Pages

on:
  push:
    branches:
      - main
    paths:
      - "01-SiteV2/site/**"
      - "01-SiteV2/content/**"
      - "01-SiteV2/knowledge/**"
      - ".github/workflows/github-pages.yml"
  workflow_run:
    # GitHub suppresses workflow triggers from some bot-authored pushes. These
    # production workflows auto-merge data PRs, so deploy after they succeed.
    workflows:
      - WaveSight Business Signals PR
      - WaveSight First-Line Viewpoints PR
      - WaveSight Community Intelligence PR
    types:
      - completed
  workflow_dispatch:
    inputs:
      public_brief_date:
        description: "Optional date to regenerate public daily brief before deploy, for example 2026-05-24"
        required: false
        type: string

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: github-pages
  cancel-in-progress: true

jobs:
  deploy:
    name: Publish Frontstage Site
    if: ${{ github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Node.js
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.public_brief_date != '' }}
        uses: actions/setup-node@v6
        with:
          node-version: "22"

      - name: Install dependencies
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.public_brief_date != '' }}
        run: npm ci

      - name: Generate public Daily Brief
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.public_brief_date != '' }}
        run: npm run export:public-daily-brief -- --date=${{ inputs.public_brief_date }}

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v6

      - name: Archive Frontstage artifact
        shell: bash
        run: |
          tar \
            --dereference \
            --hard-dereference \
            --directory "01-SiteV2/site" \
            -cvf "$RUNNER_TEMP/artifact.tar" \
            --exclude=.git \
            --exclude=.github \
            --exclude=".[^/]*" \
            .

      - name: Upload Frontstage artifact
        uses: actions/upload-artifact@v6
        with:
          name: github-pages
          path: ${{ runner.temp }}/artifact.tar
          retention-days: 1
          if-no-files-found: error

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
