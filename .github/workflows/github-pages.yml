name: Deploy Frontstage to GitHub Pages

on:
  push:
    branches:
      - main
    paths:
      - "01-SiteV2/site/**"
      - "01-SiteV2/content/**"
      - "01-SiteV2/knowledge/**"
      - ".github/workflows/github-pages.yml"
  workflow_run:
    # GitHub suppresses workflow triggers from some bot-authored pushes. These
    # production workflows auto-merge data PRs, so deploy after they succeed.
    workflows:
      - WaveSight Business Signals PR
      - WaveSight First-Line Viewpoints PR
      - WaveSight Community Intelligence PR
    types:
      - completed
  workflow_dispatch:
    inputs: {}

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: github-pages
  cancel-in-progress: true

jobs:
  deploy:
    name: Publish Frontstage Site
    if: ${{ github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v6

      - name: Archive Frontstage artifact
        shell: bash
        run: |
          tar \
            --dereference \
            --hard-dereference \
            --directory "01-SiteV2/site" \
            -cvf "$RUNNER_TEMP/artifact.tar" \
            --exclude=.git \
            --exclude=.github \
            --exclude=".[^/]*" \
            .

      - name: Upload Frontstage artifact
        uses: actions/upload-artifact@v6
        with:
          name: github-pages
          path: ${{ runner.temp }}/artifact.tar
          retention-days: 1
          if-no-files-found: error

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
