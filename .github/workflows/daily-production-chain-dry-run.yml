name: WaveSight Daily Production Chain Dry Run

on:
  workflow_dispatch:
    inputs:
      date:
        description: "Asia/Shanghai date to run, formatted as YYYY-MM-DD. Leave empty for today."
        required: false
        type: string
      pass_score:
        description: "Daily Monitor diagnostic score reference. Evidence, Card and frontstage gates decide release."
        required: false
        default: "85"
        type: string

permissions:
  contents: read

concurrency:
  group: wavesight-daily-production-chain-dry-run-${{ github.event.inputs.date || github.run_id }}
  cancel-in-progress: false

jobs:
  production-chain:
    name: Full Production Chain Dry Run
    runs-on: ubuntu-latest
    timeout-minutes: 90
    env:
      TZ: Asia/Shanghai
      ANYSEARCH_API_KEY: ${{ secrets.ANYSEARCH_API_KEY }}
      TAVILY_API_KEY: ${{ secrets.TAVILY_API_KEY }}
      EXA_API_KEY: ${{ secrets.EXA_API_KEY }}
      DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
      DEEPSEEK_MODEL: deepseek-v4-flash
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Resolve run date
        id: run-date
        shell: bash
        run: |
          if [ -n "${{ github.event.inputs.date }}" ]; then
            run_date="${{ github.event.inputs.date }}"
          else
            run_date="$(TZ=Asia/Shanghai date +%F)"
          fi

          if ! [[ "$run_date" =~ ^[0-9]{4}-[0-9]{2}-[0-9]{2}$ ]]; then
            echo "Invalid date: $run_date" >&2
            exit 2
          fi

          echo "date=$run_date" >> "$GITHUB_OUTPUT"
          echo "RUN_DATE=$run_date" >> "$GITHUB_ENV"

      - name: Report cloud dependency state
        shell: bash
        run: |
          {
            echo "# GitHub Daily Production Chain Dry Run"
            echo
            echo "- date: ${RUN_DATE}"
            echo "- generated_at: $(date -Is)"
            echo "- anysearch_secret: $([ -n "$ANYSEARCH_API_KEY" ] && echo configured || echo missing)"
            echo "- tavily_secret: $([ -n "$TAVILY_API_KEY" ] && echo configured || echo missing)"
            echo "- exa_secret: $([ -n "$EXA_API_KEY" ] && echo configured || echo missing)"
            echo "- deepseek_v4_title_translation: $([ -n "$DEEPSEEK_API_KEY" ] && echo configured || echo missing)"
            echo "- openai_title_translation_fallback: $([ -n "$OPENAI_API_KEY" ] && echo configured || echo missing)"
            echo
            echo "This workflow is a dry run. It uploads artifacts only and never commits, pushes, opens PRs, commits site data, or deploys."
            echo
            echo "Production order:"
            echo "1. Run the V3 evidence-supply gate."
            echo "2. Confirm Raw / Pool integrity and historical duplicate state without re-blocking diagnostic volume targets."
            echo "3. Mark same-date downstream assets stale if Raw / Pool changed."
            echo "4. Build and gate the Data Center V4 factual bundle."
            echo "5. Materialize V4 JSONL serving tables."
            echo "6. Run frozen V3 Card, trend, and frontstage compatibility stages."
            echo "7. Sync operations data only after both V4 and compatibility gates pass, still artifact-only."
          } | tee "agent-workflow/reports/${RUN_DATE}-github-daily-production-chain-dry-run.md"

      - name: Syntax checks
        shell: bash
        run: |
          node --check agent-workflow/tools/run-guanlan-daily-monitor.mjs
          node --check agent-workflow/tools/run-guanlan-daily-monitor-with-qc.mjs
          node --check agent-workflow/tools/assert-daily-production-chain.mjs
          node --check agent-workflow/tools/build-data-center-v4.mjs
          node --check agent-workflow/tools/assert-data-center-v4.mjs
          node --check agent-workflow/tools/build-legacy-card-event-mappings.mjs
          node --check agent-workflow/tools/build-data-center-v4-obsidian-index.mjs
          node --check agent-workflow/tools/assert-tag-taxonomy-v3.mjs
          node --check agent-workflow/tools/sync-light-data-lake.mjs
          node --check 01-SiteV2/site/scripts/build-data-center-v4-frontstage.mjs
          node --check 01-SiteV2/site/scripts/build-industry-reports-frontstage.mjs
          node --check agent-workflow/tools/generate-asset-cards-from-pool.mjs
          node --check agent-workflow/tools/assert-pool-to-card-dedupe.mjs
          node --check agent-workflow/tools/assert-business-signals-frontstage.mjs
          node --check agent-workflow/tools/assert-business-signals-three-block-contract.mjs
          node --check agent-workflow/tools/run-trend-candidate-decision.mjs
          node agent-workflow/tools/assert-business-signals-pipeline-policy.mjs
          node --check agent-workflow/tools/classify-business-signals-production-state.mjs
          node --check 01-SiteV2/site/scripts/build-v3-data-observation-desk.mjs
          node --check 01-SiteV2/site/scripts/sync-pipeline-dashboard-data.mjs

      - name: Run Daily Monitor with QC
        id: monitor
        continue-on-error: true
        shell: bash
        run: |
          set -o pipefail
          node agent-workflow/tools/run-guanlan-daily-monitor-with-qc.mjs \
            --date="${RUN_DATE}" \
            --pass-score="${{ github.event.inputs.pass_score || '85' }}" \
            --max-cycles=1 \
            --search-limit=200 \
            --search-path-query-limit=5 \
            --gdelt-query-limit=12 \
            --hn-limit=8 \
            --fetch-timeout-ms=20000 \
            --snapshot-timeout-ms=16000 \
            --monitor-timeout-ms=900000 \
            2>&1 | tee "agent-workflow/reports/${RUN_DATE}-github-production-monitor-run.log"

      - name: Confirm Raw / Pool post-dedupe counts and stale state
        id: production-chain-post-monitor
        if: always()
        continue-on-error: true
        shell: bash
        run: |
          set -o pipefail
          node agent-workflow/tools/assert-daily-production-chain.mjs \
            --date="${RUN_DATE}" \
            --stage=post-monitor \
            2>&1 | tee "agent-workflow/reports/${RUN_DATE}-github-production-post-monitor-gate.log"

      - name: Build Data Center V4 factual bundle
        id: data-center-v4
        if: steps.monitor.outcome == 'success' && steps.production-chain-post-monitor.outcome == 'success'
        continue-on-error: true
        shell: bash
        run: |
          set -o pipefail
          node agent-workflow/tools/build-data-center-v4.mjs \
            --date="${RUN_DATE}" \
            2>&1 | tee "agent-workflow/reports/${RUN_DATE}-github-production-data-center-v4.log"

      - name: Run Data Center V4 integrity gate
        id: data-center-v4-gate
        if: steps.data-center-v4.outcome == 'success'
        continue-on-error: true
        shell: bash
        run: |
          set -o pipefail
          node agent-workflow/tools/assert-data-center-v4.mjs \
            --date="${RUN_DATE}" \
            2>&1 | tee "agent-workflow/reports/${RUN_DATE}-github-production-data-center-v4-gate.log"

      - name: Materialize Data Center V4 JSONL tables
        id: data-center-v4-materialize
        if: steps.data-center-v4-gate.outcome == 'success'
        continue-on-error: true
        shell: bash
        run: |
          set -o pipefail
          node agent-workflow/tools/sync-light-data-lake.mjs \
            --v4-only=true \
            --duckdb=skip \
            2>&1 | tee "agent-workflow/reports/${RUN_DATE}-github-production-data-center-v4-materialize.log"
          node 01-SiteV2/site/scripts/build-data-center-v4-frontstage.mjs \
            2>&1 | tee "agent-workflow/reports/${RUN_DATE}-github-production-data-center-v4-frontstage.log"

      - name: Regenerate business-signal Card assets
        id: assets
        if: steps.data-center-v4-materialize.outcome == 'success'
        continue-on-error: true
        shell: bash
        run: |
          set -o pipefail
          node agent-workflow/tools/generate-asset-cards-from-pool.mjs \
            --date="${RUN_DATE}" \
            --from-raw=true \
            2>&1 | tee "agent-workflow/reports/${RUN_DATE}-github-production-assets.log"

      - name: Run Pool-to-Card duplicate gate
        id: pool-to-card-dedupe
        if: steps.assets.outcome == 'success'
        continue-on-error: true
        shell: bash
        run: |
          set -o pipefail
          node agent-workflow/tools/assert-pool-to-card-dedupe.mjs \
            --date="${RUN_DATE}" \
            2>&1 | tee "agent-workflow/reports/${RUN_DATE}-github-production-pool-to-card-dedupe.log"

      - name: Run Signal Card editorial quality gate
        id: card-editorial-gate
        if: steps.pool-to-card-dedupe.outcome == 'success'
        continue-on-error: true
        shell: bash
        run: |
          set -o pipefail
          node agent-workflow/tools/assert-signal-card-editorial-quality.mjs \
            --date="${RUN_DATE}" \
            2>&1 | tee "agent-workflow/reports/${RUN_DATE}-github-production-card-editorial-gate.log"
          node agent-workflow/tools/build-legacy-card-event-mappings.mjs
          node agent-workflow/tools/build-data-center-v4-obsidian-index.mjs

      - name: Legacy page compatibility - record trend candidate decision
        id: trend-decision
        if: steps.card-editorial-gate.outcome == 'success'
        continue-on-error: true
        shell: bash
        run: |
          set -o pipefail
          node agent-workflow/tools/run-trend-candidate-decision.mjs \
            --date="${RUN_DATE}" \
            --write-no-decision=true \
            2>&1 | tee "agent-workflow/reports/${RUN_DATE}-github-production-trend-decision.log"

      - name: Build legacy compatibility data and V4 Industry Reports projection
        id: site-sync
        if: steps.trend-decision.outcome == 'success'
        continue-on-error: true
        shell: bash
        run: |
          set -o pipefail
          node 01-SiteV2/site/scripts/build-v3-data-observation-desk.mjs \
            2>&1 | tee "agent-workflow/reports/${RUN_DATE}-github-production-site-sync.log"
          node 01-SiteV2/site/scripts/build-industry-reports-frontstage.mjs \
            2>&1 | tee "agent-workflow/reports/${RUN_DATE}-github-production-industry-reports-frontstage.log"
          node --test agent-workflow/tools/tests/industry-reports-frontstage.test.mjs

      - name: Run unified Business Signals frontstage gate
        id: business-frontstage-gate
        if: steps.site-sync.outcome == 'success'
        continue-on-error: true
        shell: bash
        run: |
          set -o pipefail
          node agent-workflow/tools/assert-business-signals-frontstage.mjs \
            --date="${RUN_DATE}" \
            --skip-editorial=true \
            2>&1 | tee "agent-workflow/reports/${RUN_DATE}-github-production-business-frontstage-gate.log"

      - name: Build operations data after frontstage gate
        id: operations-data
        if: steps.business-frontstage-gate.outcome == 'success'
        continue-on-error: true
        shell: bash
        run: |
          set -o pipefail
          node 01-SiteV2/site/scripts/sync-pipeline-dashboard-data.mjs \
            2>&1 | tee "agent-workflow/reports/${RUN_DATE}-github-production-operations-data.log"

      - name: Upload full-chain dry-run artifacts
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: wavesight-daily-production-chain-${{ steps.run-date.outputs.date }}
          if-no-files-found: warn
          retention-days: 14
          path: |
            agent-workflow/reports/${{ steps.run-date.outputs.date }}-github-*.md
            agent-workflow/reports/${{ steps.run-date.outputs.date }}-github-*.log
            agent-workflow/reports/${{ steps.run-date.outputs.date }}-guanlan-*.md
            agent-workflow/reports/${{ steps.run-date.outputs.date }}-daily-production-chain-readiness.md
            agent-workflow/reports/${{ steps.run-date.outputs.date }}-downstream-assets-stale.md
            agent-workflow/reports/${{ steps.run-date.outputs.date }}-pool-to-card-dedupe-gate.md
            agent-workflow/reports/${{ steps.run-date.outputs.date }}-business-signals-frontstage-gate.md
            agent-workflow/reports/${{ steps.run-date.outputs.date }}-business-signals-frontstage-gate.json
            agent-workflow/reports/${{ steps.run-date.outputs.date }}-data-center-v4-integrity-gate.md
            agent-workflow/reports/${{ steps.run-date.outputs.date }}-data-center-v4-integrity-gate.json
            agent-workflow/reports/${{ steps.run-date.outputs.date }}-trend-candidate-decision*.md
            agent-workflow/reports/${{ steps.run-date.outputs.date }}-no-trend-candidate-decision.md
            01-SiteV2/content/01-raw/${{ steps.run-date.outputs.date }}-raw-candidates.md
            01-SiteV2/content/01-raw/originals/${{ steps.run-date.outputs.date }}/**
            01-SiteV2/content/02-pool/${{ steps.run-date.outputs.date }}-pool-candidates.md
            01-SiteV2/content/11-databases/data-center-v4/${{ steps.run-date.outputs.date }}/**
            data-lake/tables/source_artifacts.jsonl
            data-lake/tables/raw_documents.jsonl
            data-lake/tables/claims.jsonl
            data-lake/tables/entities.jsonl
            data-lake/tables/entity_mentions.jsonl
            data-lake/tables/canonical_events.jsonl
            data-lake/tables/compatibility_cards.jsonl
            data-lake/tables/event_sources.jsonl
            data-lake/tables/event_claims.jsonl
            data-lake/tables/event_conflicts.jsonl
            data-lake/tables/relationships.jsonl
            data-lake/tables/tag_assertions.jsonl
            data-lake/tables/fde_records.jsonl
            data-lake/tables/hardware_records.jsonl
            data-lake/tables/qa_queue.jsonl
            data-lake/tables/legacy_asset_mappings.jsonl
            01-SiteV2/content/04-business-signals/signals/${{ steps.run-date.outputs.date }}-signals.md
            01-SiteV2/knowledge/01-Signal-Cards/**/${{ steps.run-date.outputs.date }}--signal--*.md
            01-SiteV2/content/06-asset-candidates/trend/${{ steps.run-date.outputs.date }}--trend-candidate--*.md
            01-SiteV2/knowledge/03-Asset-Candidates/trend/${{ steps.run-date.outputs.date }}--trend-candidate--*.md
            01-SiteV2/site/data/v3-data-observation-desk.json
            01-SiteV2/site/data/industry-reports-frontstage.json
            01-SiteV2/site/data/pipeline-dashboard.json
            01-SiteV2/site/data/pipeline-dashboard.js

      - name: Full-chain dry-run result
        if: always()
        shell: bash
        run: |
          node agent-workflow/tools/classify-business-signals-production-state.mjs \
            --monitor="${{ steps.monitor.outcome }}" \
            --evidenceGate="${{ steps.production-chain-post-monitor.outcome }}" \
            --dataCenterBuild="${{ steps.data-center-v4.outcome }}" \
            --dataCenterGate="${{ steps.data-center-v4-gate.outcome }}" \
            --dataCenterMaterialize="${{ steps.data-center-v4-materialize.outcome }}" \
            --cards="${{ steps.assets.outcome }}" \
            --dedupe="${{ steps.pool-to-card-dedupe.outcome }}" \
            --cardEditorial="${{ steps.card-editorial-gate.outcome }}" \
            --trendDecision="${{ steps.trend-decision.outcome }}" \
            --frontstageData="${{ steps.site-sync.outcome }}" \
            --frontstageGate="${{ steps.business-frontstage-gate.outcome }}" \
            --operations="${{ steps.operations-data.outcome }}" \
            --freshness="success" \
            --commit="success" \
            --changed="false"
