name: WaveSight Daily Production Chain Dry Run

on:
  workflow_dispatch:
    inputs:
      date:
        description: "Asia/Shanghai date to run, formatted as YYYY-MM-DD. Leave empty for today."
        required: false
        type: string
      pass_score:
        description: "Daily Monitor diagnostic score reference. Evidence, Card and frontstage gates decide release."
        required: false
        default: "85"
        type: string

permissions:
  contents: read

concurrency:
  group: wavesight-daily-production-chain-dry-run-${{ github.event.inputs.date || github.run_id }}
  cancel-in-progress: false

jobs:
  production-chain:
    name: Full Production Chain Dry Run
    runs-on: ubuntu-latest
    timeout-minutes: 90
    env:
      TZ: Asia/Shanghai
      ANYSEARCH_API_KEY: ${{ secrets.ANYSEARCH_API_KEY }}
      TAVILY_API_KEY: ${{ secrets.TAVILY_API_KEY }}
      EXA_API_KEY: ${{ secrets.EXA_API_KEY }}
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Resolve run date
        id: run-date
        shell: bash
        run: |
          if [ -n "${{ github.event.inputs.date }}" ]; then
            run_date="${{ github.event.inputs.date }}"
          else
            run_date="$(TZ=Asia/Shanghai date +%F)"
          fi

          if ! [[ "$run_date" =~ ^[0-9]{4}-[0-9]{2}-[0-9]{2}$ ]]; then
            echo "Invalid date: $run_date" >&2
            exit 2
          fi

          echo "date=$run_date" >> "$GITHUB_OUTPUT"
          echo "RUN_DATE=$run_date" >> "$GITHUB_ENV"

      - name: Report cloud dependency state
        shell: bash
        run: |
          {
            echo "# GitHub Daily Production Chain Dry Run"
            echo
            echo "- date: ${RUN_DATE}"
            echo "- generated_at: $(date -Is)"
            echo "- anysearch_secret: $([ -n "$ANYSEARCH_API_KEY" ] && echo configured || echo missing)"
            echo "- tavily_secret: $([ -n "$TAVILY_API_KEY" ] && echo configured || echo missing)"
            echo "- exa_secret: $([ -n "$EXA_API_KEY" ] && echo configured || echo missing)"
            echo "- openai_secret: $([ -n "$OPENAI_API_KEY" ] && echo configured || echo missing)"
            echo
            echo "This workflow is a dry run. It uploads artifacts only and never commits, pushes, opens PRs, commits site data, or deploys."
            echo
            echo "Production order:"
            echo "1. Run Daily Monitor with QC."
            echo "2. Confirm final active Raw / Pool post-dedupe counts and historical duplicate count."
            echo "3. Mark same-date downstream assets stale if Raw / Pool changed."
            echo "4. Regenerate qualified business-signal Card assets in the runner workspace only; frontstage publishes the unified Card set."
            echo "5. Run Pool-to-Card duplicate gate."
            echo "6. Run Signal Card editorial quality gate."
            echo "7. Build Business Signals frontstage data and run the source-first/regression gate before operations data."
            echo "8. Sync operations data only after the Business frontstage gate passes, still artifact-only."
          } | tee "agent-workflow/reports/${RUN_DATE}-github-daily-production-chain-dry-run.md"

      - name: Syntax checks
        shell: bash
        run: |
          node --check agent-workflow/tools/run-guanlan-daily-monitor.mjs
          node --check agent-workflow/tools/run-guanlan-daily-monitor-with-qc.mjs
          node --check agent-workflow/tools/assert-daily-production-chain.mjs
          node --check agent-workflow/tools/generate-asset-cards-from-pool.mjs
          node --check agent-workflow/tools/assert-pool-to-card-dedupe.mjs
          node --check agent-workflow/tools/assert-business-signals-frontstage.mjs
          node agent-workflow/tools/assert-business-signals-pipeline-policy.mjs
          node --check agent-workflow/tools/classify-business-signals-production-state.mjs
          node --check 01-SiteV2/site/scripts/build-v3-data-observation-desk.mjs
          node --check 01-SiteV2/site/scripts/sync-pipeline-dashboard-data.mjs

      - name: Run Daily Monitor with QC
        id: monitor
        continue-on-error: true
        shell: bash
        run: |
          set -o pipefail
          node agent-workflow/tools/run-guanlan-daily-monitor-with-qc.mjs \
            --date="${RUN_DATE}" \
            --pass-score="${{ github.event.inputs.pass_score || '85' }}" \
            --max-cycles=1 \
            --search-limit=200 \
            --search-path-query-limit=5 \
            --gdelt-query-limit=12 \
            --hn-limit=8 \
            --fetch-timeout-ms=20000 \
            --snapshot-timeout-ms=16000 \
            --monitor-timeout-ms=900000 \
            2>&1 | tee "agent-workflow/reports/${RUN_DATE}-github-production-monitor-run.log"

      - name: Confirm Raw / Pool post-dedupe counts and stale state
        id: production-chain-post-monitor
        if: always()
        continue-on-error: true
        shell: bash
        run: |
          set -o pipefail
          node agent-workflow/tools/assert-daily-production-chain.mjs \
            --date="${RUN_DATE}" \
            --stage=post-monitor \
            --raw-min=150 \
            --pool-min=75 \
            2>&1 | tee "agent-workflow/reports/${RUN_DATE}-github-production-post-monitor-gate.log"

      - name: Regenerate business-signal Card assets
        id: assets
        if: steps.monitor.outcome == 'success' && steps.production-chain-post-monitor.outcome == 'success'
        continue-on-error: true
        shell: bash
        run: |
          set -o pipefail
          node agent-workflow/tools/generate-asset-cards-from-pool.mjs \
            --date="${RUN_DATE}" \
            --from-raw=true \
            --trend-candidates=false \
            2>&1 | tee "agent-workflow/reports/${RUN_DATE}-github-production-assets.log"

      - name: Run Pool-to-Card duplicate gate
        id: pool-to-card-dedupe
        if: steps.assets.outcome == 'success'
        continue-on-error: true
        shell: bash
        run: |
          set -o pipefail
          node agent-workflow/tools/assert-pool-to-card-dedupe.mjs \
            --date="${RUN_DATE}" \
            2>&1 | tee "agent-workflow/reports/${RUN_DATE}-github-production-pool-to-card-dedupe.log"

      - name: Run Signal Card editorial quality gate
        id: card-editorial-gate
        if: steps.pool-to-card-dedupe.outcome == 'success'
        continue-on-error: true
        shell: bash
        run: |
          set -o pipefail
          node agent-workflow/tools/assert-signal-card-editorial-quality.mjs \
            --date="${RUN_DATE}" \
            2>&1 | tee "agent-workflow/reports/${RUN_DATE}-github-production-card-editorial-gate.log"

      - name: Build Business Signals frontstage data after gates pass
        id: site-sync
        if: steps.card-editorial-gate.outcome == 'success'
        continue-on-error: true
        shell: bash
        run: |
          set -o pipefail
          node 01-SiteV2/site/scripts/build-v3-data-observation-desk.mjs \
            2>&1 | tee "agent-workflow/reports/${RUN_DATE}-github-production-site-sync.log"

      - name: Run unified Business Signals frontstage gate
        id: business-frontstage-gate
        if: steps.site-sync.outcome == 'success'
        continue-on-error: true
        shell: bash
        run: |
          set -o pipefail
          node agent-workflow/tools/assert-business-signals-frontstage.mjs \
            --date="${RUN_DATE}" \
            --skip-editorial=true \
            2>&1 | tee "agent-workflow/reports/${RUN_DATE}-github-production-business-frontstage-gate.log"

      - name: Build operations data after frontstage gate
        id: operations-data
        if: steps.business-frontstage-gate.outcome == 'success'
        continue-on-error: true
        shell: bash
        run: |
          set -o pipefail
          node 01-SiteV2/site/scripts/sync-pipeline-dashboard-data.mjs \
            2>&1 | tee "agent-workflow/reports/${RUN_DATE}-github-production-operations-data.log"

      - name: Upload full-chain dry-run artifacts
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: wavesight-daily-production-chain-${{ steps.run-date.outputs.date }}
          if-no-files-found: warn
          retention-days: 14
          path: |
            agent-workflow/reports/${{ steps.run-date.outputs.date }}-github-*.md
            agent-workflow/reports/${{ steps.run-date.outputs.date }}-github-*.log
            agent-workflow/reports/${{ steps.run-date.outputs.date }}-guanlan-*.md
            agent-workflow/reports/${{ steps.run-date.outputs.date }}-daily-production-chain-readiness.md
            agent-workflow/reports/${{ steps.run-date.outputs.date }}-downstream-assets-stale.md
            agent-workflow/reports/${{ steps.run-date.outputs.date }}-pool-to-card-dedupe-gate.md
            agent-workflow/reports/${{ steps.run-date.outputs.date }}-business-signals-frontstage-gate.md
            agent-workflow/reports/${{ steps.run-date.outputs.date }}-business-signals-frontstage-gate.json
            01-SiteV2/content/01-raw/${{ steps.run-date.outputs.date }}-raw-candidates.md
            01-SiteV2/content/01-raw/originals/${{ steps.run-date.outputs.date }}/**
            01-SiteV2/content/02-pool/${{ steps.run-date.outputs.date }}-pool-candidates.md
            01-SiteV2/content/04-business-signals/signals/${{ steps.run-date.outputs.date }}-signals.md
            01-SiteV2/knowledge/01-Signal-Cards/**/${{ steps.run-date.outputs.date }}--signal--*.md
            01-SiteV2/site/data/v3-data-observation-desk.json
            01-SiteV2/site/data/pipeline-dashboard.json
            01-SiteV2/site/data/pipeline-dashboard.js

      - name: Full-chain dry-run result
        if: always()
        shell: bash
        run: |
          node agent-workflow/tools/classify-business-signals-production-state.mjs \
            --monitor="${{ steps.monitor.outcome }}" \
            --evidenceGate="${{ steps.production-chain-post-monitor.outcome }}" \
            --cards="${{ steps.assets.outcome }}" \
            --dedupe="${{ steps.pool-to-card-dedupe.outcome }}" \
            --cardEditorial="${{ steps.card-editorial-gate.outcome }}" \
            --frontstageData="${{ steps.site-sync.outcome }}" \
            --frontstageGate="${{ steps.business-frontstage-gate.outcome }}" \
            --operations="${{ steps.operations-data.outcome }}" \
            --freshness="success" \
            --commit="success" \
            --changed="false"
