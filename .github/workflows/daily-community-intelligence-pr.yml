name: WaveSight Community Intelligence PR

on:
  schedule:
    # 08:45 / 09:35 Asia/Shanghai. GitHub only verifies and publishes
    # local collector output; Chrome collection stays on the local scheduled task.
    - cron: "45 0 * * *"
    - cron: "35 1 * * *"
  workflow_dispatch:
    inputs:
      date:
        description: "Asia/Shanghai date to publish, formatted as YYYY-MM-DD. Leave empty for today."
        required: false
        type: string

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: wavesight-community-intelligence-publication
  cancel-in-progress: false

jobs:
  community-intelligence-pr:
    name: Community Intelligence PR
    runs-on: ubuntu-latest
    timeout-minutes: 25
    env:
      TZ: Asia/Shanghai

    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Resolve run date
        id: run-date
        shell: bash
        run: |
          if [ -n "${{ github.event.inputs.date }}" ]; then
            run_date="${{ github.event.inputs.date }}"
          else
            run_date="$(TZ=Asia/Shanghai date +%F)"
          fi

          if ! [[ "$run_date" =~ ^[0-9]{4}-[0-9]{2}-[0-9]{2}$ ]]; then
            echo "Invalid date: $run_date" >&2
            exit 2
          fi

          echo "date=$run_date" >> "$GITHUB_OUTPUT"
          echo "RUN_DATE=$run_date" >> "$GITHUB_ENV"

      - name: Check existing community publication
        id: existing-community
        shell: bash
        run: |
          set -euo pipefail
          skip_commit=false
          reason="not_applicable"
          data_file="01-SiteV2/site/data/community-intelligence.json"
          archive_file="01-SiteV2/content/07-community-intelligence/daily/${RUN_DATE} Community Intelligence.md"
          data_date=""
          items=0
          links=0
          errors=0

          if [ -f "$data_file" ]; then
            read -r data_date items links errors < <(node - "$data_file" <<'NODE'
          const fs = require("fs");
          const file = process.argv[2];
          const data = JSON.parse(fs.readFileSync(file, "utf8"));
          const value = data.meta?.generatedAt || data.generatedAt || "";
          const date = value
            ? new Intl.DateTimeFormat("en-CA", {
                timeZone: "Asia/Shanghai",
                year: "numeric",
                month: "2-digit",
                day: "2-digit",
              }).format(new Date(value))
            : "";
          const items = Array.isArray(data.items) ? data.items.length : 0;
          const links = Array.isArray(data.links) ? data.links.length : 0;
          const errors = Array.isArray(data.meta?.errors) ? data.meta.errors.length : 0;
          console.log(`${date || "missing"} ${items} ${links} ${errors}`);
          NODE
            )
          fi

          archive_state="missing"
          if [ -f "$archive_file" ]; then
            archive_state="present"
          fi

          if [ "$data_date" = "$RUN_DATE" ] && [ "$items" -ge 12 ] && [ "$links" -ge 3 ] && [ "$errors" = "0" ] && [ "$archive_state" = "present" ]; then
            skip_commit=true
            reason="same-date community data and Obsidian archive already exist on main"
          fi

          echo "skip_commit=$skip_commit" >> "$GITHUB_OUTPUT"
          echo "reason=$reason" >> "$GITHUB_OUTPUT"
          echo "data_date=$data_date" >> "$GITHUB_OUTPUT"
          echo "items=$items" >> "$GITHUB_OUTPUT"
          echo "links=$links" >> "$GITHUB_OUTPUT"
          echo "errors=$errors" >> "$GITHUB_OUTPUT"
          echo "archive_state=$archive_state" >> "$GITHUB_OUTPUT"
          echo "community_existing_skip_commit=$skip_commit"
          echo "community_existing_reason=$reason"

      - name: Syntax checks
        shell: bash
        run: |
          node --check agent-workflow/tools/assert-community-intelligence-data.mjs
          gh --version

      - name: Run community intelligence gate
        id: community-gate
        continue-on-error: true
        shell: bash
        run: |
          set -o pipefail
          npm run assert:community-intelligence -- --date="${RUN_DATE}" \
            2>&1 | tee "agent-workflow/reports/${RUN_DATE}-github-community-intelligence-gate.log"

      - name: Write community manifest
        if: always()
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p agent-workflow/reports

          data_file="01-SiteV2/site/data/community-intelligence.json"
          daily_file="01-SiteV2/site/data/community-intelligence-daily/${RUN_DATE}.json"
          archive_file="01-SiteV2/content/07-community-intelligence/daily/${RUN_DATE} Community Intelligence.md"

          state_for() {
            local path="$1"
            if [ -e "$path" ]; then
              echo "present"
            else
              echo "missing"
            fi
          }

          cat > "agent-workflow/reports/${RUN_DATE}-community-intelligence-manifest.md" <<EOF
          # ${RUN_DATE} Community Intelligence Manifest

          - generated_at: $(date -Is)
          - workflow_mode: community_intelligence_pr
          - community_gate: ${{ steps.community-gate.outcome }}
          - existing_skip_commit: ${{ steps.existing-community.outputs.skip_commit }}
          - existing_reason: ${{ steps.existing-community.outputs.reason }}
          - existing_data_date: ${{ steps.existing-community.outputs.data_date }}
          - data_file: $(state_for "$data_file")
          - daily_snapshot: $(state_for "$daily_file")
          - obsidian_daily_archive: $(state_for "$archive_file")

          This lane publishes only Community Intelligence data and archive files already produced by the local collector. It does not run the local Chrome collector because that step requires a local browser profile and logged-in session.

          GitHub Pages deploys after this PR updates main.
          EOF

      - name: Upload community artifacts
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: wavesight-community-intelligence-${{ steps.run-date.outputs.date }}
          if-no-files-found: warn
          retention-days: 14
          path: |
            agent-workflow/reports/${{ steps.run-date.outputs.date }}-github-community-intelligence-gate.log
            agent-workflow/reports/${{ steps.run-date.outputs.date }}-community-intelligence-gate.md
            agent-workflow/reports/${{ steps.run-date.outputs.date }}-community-intelligence-manifest.md
            01-SiteV2/site/data/community-intelligence.json
            01-SiteV2/site/data/community-intelligence-daily/index.json
            01-SiteV2/site/data/community-intelligence-daily/${{ steps.run-date.outputs.date }}.json
            01-SiteV2/content/07-community-intelligence/Community Intelligence Index.md
            01-SiteV2/content/07-community-intelligence/README.md
            01-SiteV2/content/07-community-intelligence/daily/${{ steps.run-date.outputs.date }} Community Intelligence.md
            01-SiteV2/content/07-community-intelligence/views/*.md

      - name: Commit community intelligence to automation branch
        id: commit
        if: always() && steps.community-gate.outcome == 'success' && steps.existing-community.outputs.skip_commit != 'true'
        shell: bash
        run: |
          set -euo pipefail
          branch="automation/community-intelligence-${RUN_DATE}"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git checkout -B "$branch"

          stage_if_exists() {
            local path="$1"
            if [ -e "$path" ]; then
              git add -f "$path"
            fi
          }

          stage_find() {
            local dir="$1"
            local pattern="$2"
            if [ -d "$dir" ]; then
              find "$dir" -maxdepth 1 -type f -name "$pattern" -print0 | xargs -0 -r git add -f
            fi
          }

          stage_if_exists "agent-workflow/reports/${RUN_DATE}-community-intelligence-manifest.md"
          stage_if_exists "agent-workflow/reports/${RUN_DATE}-community-intelligence-gate.md"
          stage_if_exists "01-SiteV2/site/data/community-intelligence.json"
          stage_if_exists "01-SiteV2/site/data/community-intelligence-daily/index.json"
          stage_if_exists "01-SiteV2/site/data/community-intelligence-daily/${RUN_DATE}.json"
          stage_if_exists "01-SiteV2/content/07-community-intelligence/Community Intelligence Index.md"
          stage_if_exists "01-SiteV2/content/07-community-intelligence/README.md"
          stage_if_exists "01-SiteV2/content/07-community-intelligence/daily/${RUN_DATE} Community Intelligence.md"
          stage_find "01-SiteV2/content/07-community-intelligence/views" "*.md"

          if git diff --cached --quiet; then
            echo "No community intelligence changes to commit."
            echo "changed=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          git commit -m "Update community intelligence for ${RUN_DATE}"
          git push --force-with-lease origin "$branch"
          echo "branch=$branch" >> "$GITHUB_OUTPUT"
          echo "changed=true" >> "$GITHUB_OUTPUT"

      - name: Open or update PR
        id: pr
        if: always() && steps.commit.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ secrets.GH_PR_TOKEN || github.token }}
        shell: bash
        run: |
          set -euo pipefail
          branch="${{ steps.commit.outputs.branch }}"
          manual_url="https://github.com/${GITHUB_REPOSITORY}/pull/new/${branch}"
          body_file="$(mktemp)"
          cat > "$body_file" <<BODY
          Community Intelligence update for ${RUN_DATE}.

          This PR contains only the independent Community Intelligence lane:
          - validated \`community-intelligence.json\`;
          - included the daily snapshot and Obsidian archive files;
          - passed \`assert-community-intelligence-data.mjs\`;
          - no business-signal Cards, relationship graph data, trend candidates, or first-line viewpoint data.

          GitHub Pages deploys after this PR updates main.
          BODY

          if pr_number="$(gh pr list --state open --head "$branch" --json number --jq '.[0].number // empty' --limit 1)"; [ -n "$pr_number" ]; then
            pr_url="$(gh pr view "$pr_number" --json url --jq .url)"
            gh pr edit "$pr_number" \
              --title "Community Intelligence update ${RUN_DATE}" \
              --body-file "$body_file"
            echo "status=updated" >> "$GITHUB_OUTPUT"
            echo "pr_number=$pr_number" >> "$GITHUB_OUTPUT"
            echo "pr_url=$pr_url" >> "$GITHUB_OUTPUT"
            echo "manual_url=$manual_url" >> "$GITHUB_OUTPUT"
          else
            if pr_url="$(gh pr create \
              --base main \
              --head "$branch" \
              --title "Community Intelligence update ${RUN_DATE}" \
              --body-file "$body_file" 2>pr-create-error.log)"; then
              pr_number="$(gh pr view "$branch" --json number --jq .number)"
              echo "status=created" >> "$GITHUB_OUTPUT"
              echo "pr_number=$pr_number" >> "$GITHUB_OUTPUT"
              echo "pr_url=$pr_url" >> "$GITHUB_OUTPUT"
              echo "manual_url=$manual_url" >> "$GITHUB_OUTPUT"
            else
              cat pr-create-error.log >&2
              if grep -Eqi "not permitted to create.*pull requests|GitHub Actions is not permitted" pr-create-error.log; then
                echo "status=manual_required" >> "$GITHUB_OUTPUT"
                echo "manual_url=$manual_url" >> "$GITHUB_OUTPUT"
                exit 0
              fi
              echo "status=failed" >> "$GITHUB_OUTPUT"
              exit 1
            fi
          fi

      - name: Auto-merge PR after gate passes
        id: auto-merge
        if: always() && steps.pr.outputs.pr_number != '' && steps.community-gate.outcome == 'success'
        env:
          GH_TOKEN: ${{ secrets.GH_PR_TOKEN || github.token }}
        shell: bash
        run: |
          set -euo pipefail
          pr_number="${{ steps.pr.outputs.pr_number }}"
          if gh pr merge "$pr_number" \
            --squash \
            --auto \
            --delete-branch \
            --subject "Update community intelligence for ${RUN_DATE}" \
            --body "Automated Community Intelligence update after data gate passed." \
            2>auto-merge-error.log; then
            echo "status=enabled_or_merged" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          cat auto-merge-error.log >&2
          if grep -Eqi "auto.?merge|Auto merge is not allowed|enablePullRequestAutoMerge" auto-merge-error.log; then
            echo "Repository auto-merge is not available; attempting immediate merge after gates passed."
            gh pr merge "$pr_number" \
              --squash \
              --delete-branch \
              --subject "Update community intelligence for ${RUN_DATE}" \
              --body "Automated Community Intelligence update after data gate passed."
            echo "status=merged" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if grep -Eqi "merge commits are not allowed|base branch requires|Required status check|not permitted|merge method" auto-merge-error.log; then
            echo "status=manual_required" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "status=failed" >> "$GITHUB_OUTPUT"
          exit 1

      - name: Final result
        if: always()
        shell: bash
        run: |
          failed=false

          if [ "${{ steps.community-gate.outcome }}" != "success" ]; then
            echo "::error::Community Intelligence gate failed. Re-run the local collector before publishing."
            failed=true
          fi

          if [ "${{ steps.commit.outcome }}" = "failure" ]; then
            echo "::error::Community Intelligence commit step failed."
            failed=true
          fi

          if [ "${{ steps.pr.outcome }}" = "failure" ]; then
            echo "::error::Community Intelligence PR step failed."
            failed=true
          fi

          if [ "${{ steps.auto-merge.outputs.status }}" = "failed" ]; then
            echo "::error::Community Intelligence auto-merge failed."
            failed=true
          fi

          if [ "${{ steps.pr.outputs.status }}" = "manual_required" ] || [ "${{ steps.auto-merge.outputs.status }}" = "manual_required" ]; then
            echo "::warning::Community Intelligence PR was prepared but needs manual GitHub action."
          fi

          if [ "$failed" = "true" ]; then
            exit 1
          fi
