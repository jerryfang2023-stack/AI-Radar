name: WaveSight Hermes Morning Recovery

on:
  schedule:
    # 10:55 Asia/Shanghai. Runs after the primary production,
    # conditional health dispatch, and Hermes early handoff windows, then records the
    # supervision result, recovery action, and Codex handoff artifacts.
    - cron: "55 2 * * *"
  workflow_dispatch:
    inputs:
      date:
        description: "Asia/Shanghai date to supervise and recover, formatted as YYYY-MM-DD. Leave empty for today."
        required: false
        type: string
      lanes:
        description: "Comma-separated lanes: business_signals,first_line_viewpoints,community_publish. Use auto for failed/manual lanes."
        required: false
        default: "auto"
        type: string
      max_attempts:
        description: "Optional override for same-date failed attempts before manual escalation."
        required: false
        type: string
      dry_run:
        description: "Write Hermes reports without dispatching recovery workflows."
        required: false
        default: false
        type: boolean

permissions:
  actions: write
  contents: read

concurrency:
  group: wavesight-hermes-morning-recovery-${{ github.event.inputs.date || github.run_id }}
  cancel-in-progress: false

jobs:
  hermes-morning-recovery:
    name: Supervise and dispatch recovery
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      TZ: Asia/Shanghai
      GH_TOKEN: ${{ secrets.GH_PR_TOKEN || github.token }}
      RECOVERY_DATE: ${{ github.event.inputs.date || '' }}
      RECOVERY_LANES: ${{ github.event.inputs.lanes || 'auto' }}
      RECOVERY_MAX_ATTEMPTS: ${{ github.event.inputs.max_attempts || '' }}
      RECOVERY_DRY_RUN: ${{ github.event.inputs.dry_run || 'false' }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "22"

      - name: Syntax checks
        run: |
          node --check agent-workflow/tools/write-daily-supervision-report.mjs
          node --check agent-workflow/tools/dispatch-daily-recovery.mjs
          node --check agent-workflow/tools/run-hermes-morning-recovery.mjs

      - name: Run Hermes morning recovery
        shell: bash
        run: |
          set -euo pipefail
          args=("--lanes=${RECOVERY_LANES}")

          if [ -n "$RECOVERY_DATE" ]; then
            args+=("--date=${RECOVERY_DATE}")
          fi

          if [ -n "$RECOVERY_MAX_ATTEMPTS" ]; then
            args+=("--max-attempts=${RECOVERY_MAX_ATTEMPTS}")
          fi

          if [ "$RECOVERY_DRY_RUN" = "true" ]; then
            args+=("--dry-run=true")
          fi

          npm run hermes:morning-recovery -- "${args[@]}"

      - name: Upload Hermes recovery artifacts
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: wavesight-hermes-morning-recovery-${{ github.run_id }}
          if-no-files-found: warn
          retention-days: 14
          path: |
            agent-workflow/reports/*-hermes-morning-recovery.json
            agent-workflow/reports/*-hermes-morning-recovery.md
            agent-workflow/reports/hermes-morning-recovery-latest.json
            agent-workflow/reports/hermes-morning-recovery-latest.md
            agent-workflow/reports/*-daily-supervision-report.json
            agent-workflow/reports/*-daily-supervision-report.md
            agent-workflow/reports/daily-supervision-report-latest.json
            agent-workflow/reports/daily-supervision-report-latest.md
            agent-workflow/reports/*-daily-recovery-watchdog.json
            agent-workflow/reports/*-daily-recovery-watchdog.md
            agent-workflow/inbox/hermes-to-codex/*.md
