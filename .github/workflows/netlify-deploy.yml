name: Deploy public site to Netlify

on:
  push:
    branches:
      - main
    paths:
      - "01-SiteV2/site/public-daily-brief/**"
      - "01-SiteV2/site/scripts/export-public-daily-brief.mjs"
      - "package.json"
      - "package-lock.json"
      - "netlify.toml"
      - ".github/workflows/netlify-deploy.yml"
  workflow_dispatch:
    inputs:
      public_brief_date:
        description: "Optional date to generate before deploy, for example 2026-05-24"
        required: false
        type: string

concurrency:
  group: netlify-production
  cancel-in-progress: true

jobs:
  deploy:
    name: Deploy production site
    runs-on: ubuntu-latest
    permissions:
      contents: read

    env:
      NETLIFY_SITE_ID: 7ab8a5d2-477b-439d-ad4b-57f449ebad9e

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install dependencies
        run: npm ci

      - name: Generate public Daily Brief
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.public_brief_date != '' }}
        run: npm run export:public-daily-brief -- --date=${{ inputs.public_brief_date }}

      - name: Verify public directory
        run: test -d 01-SiteV2/site/public-daily-brief

      - name: Deploy to Netlify
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
        run: |
          if [ -z "$NETLIFY_AUTH_TOKEN" ]; then
            echo "Missing NETLIFY_AUTH_TOKEN repository secret."
            echo "Create it in GitHub: Settings -> Secrets and variables -> Actions -> New repository secret."
            exit 1
          fi
          npx netlify-cli deploy \
            --prod \
            --dir=01-SiteV2/site/public-daily-brief \
            --site="$NETLIFY_SITE_ID" \
            --auth="$NETLIFY_AUTH_TOKEN" \
            --message="GitHub Actions deploy $GITHUB_SHA"
