name: WaveSight Hermes Three-Lane Early Handoff

on:
  schedule:
    # 09:30 / 09:45 / 09:55 Asia/Shanghai. Hermes checks the three lanes
    # after their remaining primary windows: Community publish at 09:30,
    # Business Signals at 09:45, and First-Line Viewpoints at 09:55.
    - cron: "30 1 * * *"
    - cron: "45 1 * * *"
    - cron: "55 1 * * *"
  workflow_dispatch:
    inputs:
      date:
        description: "Asia/Shanghai date to supervise, formatted as YYYY-MM-DD. Leave empty for today."
        required: false
        type: string
      dry_run:
        description: "Write reports without dispatching lane workflows."
        required: false
        default: false
        type: boolean

permissions:
  actions: write
  contents: read

concurrency:
  group: wavesight-hermes-three-lane-early-handoff-${{ github.event.inputs.date || github.run_id }}
  cancel-in-progress: false

jobs:
  hermes-three-lane-early-handoff:
    name: Check three lanes and dispatch
    runs-on: ubuntu-latest
    timeout-minutes: 12
    env:
      TZ: Asia/Shanghai
      GH_TOKEN: ${{ secrets.GH_PR_TOKEN || github.token }}
      HANDOFF_DATE: ${{ github.event.inputs.date || '' }}
      HANDOFF_DRY_RUN: ${{ github.event.inputs.dry_run || 'false' }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "22"

      - name: Syntax check three-lane early handoff
        run: node --check agent-workflow/tools/run-hermes-three-lane-early-handoff.mjs

      - name: Run Hermes three-lane early handoff
        shell: bash
        run: |
          set -euo pipefail
          args=()

          if [ -n "$HANDOFF_DATE" ]; then
            args+=("--date=${HANDOFF_DATE}")
          fi

          if [ "$HANDOFF_DRY_RUN" = "true" ]; then
            args+=("--dry-run=true")
          fi

          npm run hermes:early-handoff -- "${args[@]}"

      - name: Upload three-lane early handoff artifacts
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: wavesight-hermes-three-lane-early-handoff-${{ github.run_id }}
          if-no-files-found: warn
          retention-days: 14
          path: |
            agent-workflow/reports/*-hermes-three-lane-early-handoff.json
            agent-workflow/reports/*-hermes-three-lane-early-handoff.md
            agent-workflow/reports/hermes-three-lane-early-handoff-latest.json
            agent-workflow/reports/hermes-three-lane-early-handoff-latest.md
            agent-workflow/inbox/hermes-to-codex/*-early-handoff.md
