name: WaveSight Business Source Raw

on:
  workflow_dispatch:
    inputs:
      date:
        description: "Asia/Shanghai date to run, formatted as YYYY-MM-DD. Leave empty for today."
        required: false
        type: string
      source:
        description: "Source lane to collect."
        required: false
        default: "all"
        type: choice
        options:
          - all
          - aihot
          - keyword
          - gdelt
          - rss
      aggregate_dry_run:
        description: "After source collection, dry-run the unified aggregator from source artifacts."
        required: false
        default: true
        type: boolean

permissions:
  contents: read

concurrency:
  group: wavesight-business-source-raw-${{ github.event.inputs.date || github.run_id }}
  cancel-in-progress: false

jobs:
  source-raw:
    name: Business Source Raw Artifacts
    runs-on: ubuntu-latest
    timeout-minutes: 45
    env:
      TZ: Asia/Shanghai
      ANYSEARCH_API_KEY: ${{ secrets.ANYSEARCH_API_KEY }}
      TAVILY_API_KEY: ${{ secrets.TAVILY_API_KEY }}
      TAVILY_DISABLED: "true"
      EXA_API_KEY: ${{ secrets.EXA_API_KEY }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Resolve run date
        id: run-date
        shell: bash
        run: |
          if [ -n "${{ github.event.inputs.date }}" ]; then
            run_date="${{ github.event.inputs.date }}"
          else
            run_date="$(TZ=Asia/Shanghai date +%F)"
          fi

          if ! [[ "$run_date" =~ ^[0-9]{4}-[0-9]{2}-[0-9]{2}$ ]]; then
            echo "Invalid date: $run_date" >&2
            exit 2
          fi

          echo "date=$run_date" >> "$GITHUB_OUTPUT"
          echo "RUN_DATE=$run_date" >> "$GITHUB_ENV"

      - name: Syntax check
        run: node --check agent-workflow/tools/run-guanlan-daily-monitor.mjs

      - name: Collect independent source raw artifacts
        shell: bash
        run: |
          set -euo pipefail
          requested="${{ github.event.inputs.source || 'all' }}"
          if [ "$requested" = "all" ]; then
            sources=(aihot keyword gdelt rss)
          else
            sources=("$requested")
          fi

          failed=0
          for source in "${sources[@]}"; do
            echo "Collecting source: $source"
            if ! node agent-workflow/tools/run-guanlan-daily-monitor.mjs \
              --date="${RUN_DATE}" \
              --source-only="$source" \
              --search-limit=120 \
              --search-path-query-limit=3 \
              --gdelt-query-limit=8 \
              --hn-limit=0 \
              --fetch-timeout-ms=20000; then
              echo "Source collection failed: $source" >&2
              failed=1
            fi
          done

          exit "$failed"

      - name: Dry-run unified source artifact aggregator
        if: ${{ github.event.inputs.aggregate_dry_run != 'false' }}
        shell: bash
        run: |
          set -o pipefail
          node agent-workflow/tools/run-guanlan-daily-monitor.mjs \
            --date="${RUN_DATE}" \
            --use-source-artifacts=true \
            --source-artifact-dir="agent-workflow/reports/source-runs/${RUN_DATE}" \
            --dry-run=true \
            2>&1 | tee "agent-workflow/reports/source-runs/${RUN_DATE}/aggregate-dry-run.json"

      - name: Upload source raw artifacts
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: wavesight-business-source-raw-${{ steps.run-date.outputs.date }}
          if-no-files-found: warn
          retention-days: 14
          path: agent-workflow/reports/source-runs/${{ steps.run-date.outputs.date }}/**
