name: WaveSight Periodic Reports PR

on:
  schedule:
    - cron: "30 2 * * 1"   # Monday 10:30 Asia/Shanghai: weekly report
    - cron: "0 10 * * 0"   # Sunday 18:00 Asia/Shanghai: weekly health
    - cron: "0 6 * * 1-5" # 14:00 Asia/Shanghai: monthly first-weekday guard
  workflow_dispatch:
    inputs:
      phase:
        description: "weekly-report, weekly-health, or monthly"
        required: true
        default: weekly-report
        type: choice
        options: [weekly-report, weekly-health, monthly]
      date:
        description: "Asia/Shanghai anchor date (YYYY-MM-DD); empty means today"
        required: false
        type: string
      force:
        description: "Bypass the monthly first-business-day guard"
        required: false
        default: false
        type: boolean

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: wavesight-periodic-${{ github.event.inputs.phase || github.event.schedule }}-${{ github.event.inputs.date || github.ref_name }}
  cancel-in-progress: false

jobs:
  periodic-report:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    env:
      TZ: Asia/Shanghai
      DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
      DEEPSEEK_FLASH_MODEL: deepseek-v4-flash
      DEEPSEEK_PRO_MODEL: deepseek-v4-pro
      GH_TOKEN: ${{ secrets.GH_PR_TOKEN || github.token }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: npm

      - run: npm ci

      - name: Resolve phase and date
        shell: bash
        run: |
          set -euo pipefail
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            phase="${{ github.event.inputs.phase }}"
            run_date="${{ github.event.inputs.date }}"
            force="${{ github.event.inputs.force }}"
          else
            case "${{ github.event.schedule }}" in
              "30 2 * * 1") phase="weekly-report" ;;
              "0 10 * * 0") phase="weekly-health" ;;
              "0 6 * * 1-5") phase="monthly" ;;
              *) echo "Unsupported schedule" >&2; exit 2 ;;
            esac
            run_date=""
            force="false"
          fi
          [ -n "$run_date" ] || run_date="$(TZ=Asia/Shanghai date +%F)"
          [[ "$run_date" =~ ^[0-9]{4}-[0-9]{2}-[0-9]{2}$ ]] || { echo "Invalid date: $run_date" >&2; exit 2; }
          echo "PHASE=$phase" >> "$GITHUB_ENV"
          echo "RUN_DATE=$run_date" >> "$GITHUB_ENV"
          echo "FORCE=$force" >> "$GITHUB_ENV"

      - name: Require DeepSeek for report phases
        if: env.PHASE != 'weekly-health'
        shell: bash
        run: test -n "$DEEPSEEK_API_KEY"

      - name: Generate, gate, and render
        shell: bash
        run: |
          set -euo pipefail
          args=("--phase=$PHASE" "--date=$RUN_DATE")
          if [ "$PHASE" != "weekly-health" ]; then args+=("--worker=true"); fi
          if [ "$FORCE" = "true" ]; then args+=("--force=true"); fi
          node agent-workflow/tools/run-periodic-automation-controller.mjs "${args[@]}"

      - name: Commit generated outputs
        id: commit
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add agent-workflow/reports 01-SiteV2/content/08-report 01-SiteV2/site/intelligence-map.html 01-SiteV2/site/weekly-ai-business-change-radar*.html 01-SiteV2/site/monthly-business-structure-*.html 01-SiteV2/site/data/industry-reports-frontstage.json agent-workflow/inbox/hermes-to-codex || true
          if git diff --cached --quiet; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          branch="automation/periodic-${PHASE}-${RUN_DATE}"
          git checkout -B "$branch"
          git commit -m "Generate ${PHASE} outputs for ${RUN_DATE}"
          git push --force-with-lease origin "$branch"
          echo "changed=true" >> "$GITHUB_OUTPUT"
          echo "branch=$branch" >> "$GITHUB_OUTPUT"

      - name: Open and merge PR
        if: steps.commit.outputs.changed == 'true'
        shell: bash
        run: |
          set -euo pipefail
          branch="${{ steps.commit.outputs.branch }}"
          pr_number="$(gh pr list --base main --head "$branch" --state open --json number --jq '.[0].number // empty')"
          if [ -z "$pr_number" ]; then
            gh pr create --base main --head "$branch" --title "Periodic ${PHASE} ${RUN_DATE}" --body "DeepSeek-generated draft passed the content gate; pages were rendered deterministically. V4 facts were not modified."
            pr_number="$(gh pr list --base main --head "$branch" --state open --json number --jq '.[0].number')"
          fi
          if ! gh pr merge "$pr_number" --squash --auto --delete-branch; then
            gh pr merge "$pr_number" --squash --delete-branch
          fi
