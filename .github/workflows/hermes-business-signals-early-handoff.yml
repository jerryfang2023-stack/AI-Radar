name: WaveSight Hermes Business Signals Early Handoff

on:
  # Manual compatibility entry only. Scheduled early handoff is now owned by
  # hermes-three-lane-early-handoff.yml, with Business Signals takeover at
  # 09:45 / 09:55, to avoid duplicate Business dispatches.
  workflow_dispatch:
    inputs:
      date:
        description: "Asia/Shanghai date to supervise, formatted as YYYY-MM-DD. Leave empty for today."
        required: false
        type: string
      dry_run:
        description: "Write reports without dispatching the Business Signals workflow."
        required: false
        default: false
        type: boolean

permissions:
  actions: write
  contents: read

concurrency:
  group: wavesight-hermes-business-signals-early-handoff-${{ github.event.inputs.date || github.run_id }}
  cancel-in-progress: false

jobs:
  hermes-business-signals-early-handoff:
    name: Check primary windows and dispatch
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      TZ: Asia/Shanghai
      GH_TOKEN: ${{ secrets.GH_PR_TOKEN || github.token }}
      HANDOFF_DATE: ${{ github.event.inputs.date || '' }}
      HANDOFF_DRY_RUN: ${{ github.event.inputs.dry_run || 'false' }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "22"

      - name: Syntax check early handoff
        run: node --check agent-workflow/tools/run-hermes-business-signals-early-handoff.mjs

      - name: Run Hermes Business Signals early handoff
        shell: bash
        run: |
          set -euo pipefail
          args=()

          if [ -n "$HANDOFF_DATE" ]; then
            args+=("--date=${HANDOFF_DATE}")
          fi

          if [ "$HANDOFF_DRY_RUN" = "true" ]; then
            args+=("--dry-run=true")
          fi

          npm run hermes:business-early-handoff -- "${args[@]}"

      - name: Upload early handoff artifacts
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: wavesight-hermes-business-signals-early-handoff-${{ github.run_id }}
          if-no-files-found: warn
          retention-days: 14
          path: |
            agent-workflow/reports/*-hermes-business-signals-early-handoff.json
            agent-workflow/reports/*-hermes-business-signals-early-handoff.md
            agent-workflow/reports/hermes-business-signals-early-handoff-latest.json
            agent-workflow/reports/hermes-business-signals-early-handoff-latest.md
            agent-workflow/inbox/hermes-to-codex/*business_signals-early-handoff.md
