name: WaveSight Daily Monitor PR

on:
  workflow_dispatch:
    inputs:
      date:
        description: "Asia/Shanghai date to run, formatted as YYYY-MM-DD. Leave empty for today."
        required: false
        type: string
      pass_score:
        description: "Script pre-gate pass score."
        required: false
        default: "80"
        type: string
  schedule:
    # 09:30 Asia/Shanghai.
    - cron: "30 1 * * *"

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: wavesight-daily-monitor-pr-${{ github.event.inputs.date || github.run_id }}
  cancel-in-progress: false

jobs:
  monitor:
    name: Generate Raw / Pool PR
    runs-on: ubuntu-latest
    timeout-minutes: 60
    env:
      TZ: Asia/Shanghai
      ANYSEARCH_API_KEY: ${{ secrets.ANYSEARCH_API_KEY }}
      TAVILY_API_KEY: ${{ secrets.TAVILY_API_KEY }}
      EXA_API_KEY: ${{ secrets.EXA_API_KEY }}
      GH_TOKEN: ${{ github.token }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Resolve run date
        id: run-date
        shell: bash
        run: |
          if [ -n "${{ github.event.inputs.date }}" ]; then
            run_date="${{ github.event.inputs.date }}"
          else
            run_date="$(TZ=Asia/Shanghai date +%F)"
          fi

          if ! [[ "$run_date" =~ ^[0-9]{4}-[0-9]{2}-[0-9]{2}$ ]]; then
            echo "Invalid date: $run_date" >&2
            exit 2
          fi

          echo "date=$run_date" >> "$GITHUB_OUTPUT"
          echo "RUN_DATE=$run_date" >> "$GITHUB_ENV"

      - name: Report cloud dependency state
        shell: bash
        run: |
          mkdir -p agent-workflow/reports
          {
            echo "# GitHub Daily Monitor PR Run"
            echo
            echo "- date: ${RUN_DATE}"
            echo "- generated_at: $(date -Is)"
            echo "- anysearch_secret: $([ -n "$ANYSEARCH_API_KEY" ] && echo configured || echo missing)"
            echo "- tavily_secret: $([ -n "$TAVILY_API_KEY" ] && echo configured || echo missing)"
            echo "- exa_secret: $([ -n "$EXA_API_KEY" ] && echo configured || echo missing)"
            echo "- follow_builders_local_skill: $([ -f "$HOME/.skill-store/follow-builders/scripts/prepare-digest.js" ] && echo present || echo missing)"
            echo
            echo "This workflow opens a pull request only after monitor and readiness gates pass. It never commits directly to main and never deploys."
          } | tee "agent-workflow/reports/${RUN_DATE}-github-daily-monitor-pr.md"

      - name: Syntax checks
        shell: bash
        run: |
          node --check agent-workflow/tools/run-guanlan-daily-monitor.mjs
          node --check agent-workflow/tools/run-guanlan-daily-monitor-with-qc.mjs
          node --check agent-workflow/tools/guanlan-monitor-quality-gate.mjs
          node --check agent-workflow/tools/assert-guanlan-automation-readiness.mjs

      - name: Run daily monitor with pre-gate
        id: monitor
        continue-on-error: true
        shell: bash
        run: |
          set -o pipefail
          node agent-workflow/tools/run-guanlan-daily-monitor-with-qc.mjs \
            --date="${RUN_DATE}" \
            --pass-score="${{ github.event.inputs.pass_score || '80' }}" \
            --max-cycles=3 \
            --search-limit=70 \
            --search-path-query-limit=2 \
            --gdelt-query-limit=8 \
            --hn-limit=8 \
            --fetch-timeout-ms=20000 \
            --snapshot-timeout-ms=16000 \
            --monitor-timeout-ms=840000 \
            2>&1 | tee "agent-workflow/reports/${RUN_DATE}-github-monitor-run.log"

      - name: Check monitor readiness
        id: readiness
        continue-on-error: true
        shell: bash
        run: |
          set -o pipefail
          node agent-workflow/tools/assert-guanlan-automation-readiness.mjs \
            --command=monitor \
            --date="${RUN_DATE}" \
            2>&1 | tee "agent-workflow/reports/${RUN_DATE}-github-monitor-readiness.log"

      - name: Upload monitor artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: wavesight-daily-monitor-${{ steps.run-date.outputs.date }}
          if-no-files-found: warn
          retention-days: 14
          path: |
            agent-workflow/reports/${{ steps.run-date.outputs.date }}-github-*.md
            agent-workflow/reports/${{ steps.run-date.outputs.date }}-github-*.log
            agent-workflow/reports/${{ steps.run-date.outputs.date }}-guanlan-*.md
            agent-workflow/reports/${{ steps.run-date.outputs.date }}-daily-monitor-readiness-blocked.md
            01-SiteV2/content/01-raw/${{ steps.run-date.outputs.date }}-raw-candidates.md
            01-SiteV2/content/01-raw/originals/${{ steps.run-date.outputs.date }}/**
            01-SiteV2/content/02-pool/${{ steps.run-date.outputs.date }}-pool-candidates.md
            01-SiteV2/content/05-frontier-opinions/${{ steps.run-date.outputs.date }}-opinion-candidates.md
            01-SiteV2/knowledge/02-Opinion-Cards/${{ steps.run-date.outputs.date }}--frontier-opinion*.md

      - name: Stop if gates failed
        if: steps.monitor.outcome != 'success' || steps.readiness.outcome != 'success'
        shell: bash
        run: |
          echo "Daily monitor did not pass all gates. Artifacts were uploaded, but no PR will be opened." >&2
          exit 1

      - name: Open pull request with generated monitor outputs
        shell: bash
        run: |
          set -euo pipefail

          branch="automation/daily-monitor-${RUN_DATE}-${GITHUB_RUN_ID}"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git checkout -B "$branch"

          paths=(
            "agent-workflow/reports/${RUN_DATE}-github-daily-monitor-pr.md"
            "agent-workflow/reports/${RUN_DATE}-guanlan-daily-monitor-log.md"
            "agent-workflow/reports/${RUN_DATE}-guanlan-daily-monitor-qc.md"
            "agent-workflow/reports/${RUN_DATE}-guanlan-daily-monitor-quality-loop.md"
            "agent-workflow/reports/${RUN_DATE}-guanlan-monitor-quality-gate.md"
            "01-SiteV2/content/01-raw/${RUN_DATE}-raw-candidates.md"
            "01-SiteV2/content/01-raw/originals/${RUN_DATE}"
            "01-SiteV2/content/02-pool/${RUN_DATE}-pool-candidates.md"
            "01-SiteV2/content/05-frontier-opinions/${RUN_DATE}-opinion-candidates.md"
          )

          for path in "${paths[@]}"; do
            if [ -e "$path" ]; then
              git add -- "$path"
            fi
          done

          shopt -s nullglob
          opinion_cards=( "01-SiteV2/knowledge/02-Opinion-Cards/${RUN_DATE}"--frontier-opinion*.md )
          if [ "${#opinion_cards[@]}" -gt 0 ]; then
            git add -- "${opinion_cards[@]}"
          fi

          if git diff --cached --quiet; then
            echo "No repository changes to commit."
            exit 0
          fi

          git commit -m "Add daily monitor outputs for ${RUN_DATE}"
          git push --set-upstream origin "$branch"

          cat > pr-body.md <<EOF
          ## Daily monitor output

          Date: ${RUN_DATE}

          This PR was opened by GitHub Actions after the monitor pre-gate and readiness gate passed.

          Included:
          - Raw candidates
          - Raw originals snapshot folder
          - Pool candidates
          - Frontier opinion candidates
          - Monitor and quality-gate reports

          Not included:
          - Daily observation article
          - Published site data
          - Netlify deployment
          - Direct commit to main

          Review the generated files before merging.
          EOF

          gh pr create \
            --repo "${GITHUB_REPOSITORY}" \
            --base main \
            --head "$branch" \
            --title "Daily monitor outputs ${RUN_DATE}" \
            --body-file pr-body.md
