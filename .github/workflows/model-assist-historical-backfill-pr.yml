name: WaveSight Model Assist Historical Backfill PR

on:
  workflow_dispatch:
    inputs:
      from:
        description: "First V4 data date"
        required: false
        default: "2026-05-17"
        type: string
      to:
        description: "Last V4 data date; empty means latest"
        required: false
        type: string
      concurrency:
        description: "Concurrent DeepSeek requests"
        required: false
        default: "6"
        type: string

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: wavesight-model-assist-historical-backfill
  cancel-in-progress: false

jobs:
  backfill:
    runs-on: ubuntu-latest
    timeout-minutes: 300
    env:
      TZ: Asia/Shanghai
      DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
      DEEPSEEK_FLASH_MODEL: deepseek-v4-flash
      DEEPSEEK_PRO_MODEL: deepseek-v4-pro
      GH_TOKEN: ${{ secrets.GH_PR_TOKEN || github.token }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: npm

      - run: npm ci

      - name: Resolve range
        shell: bash
        run: |
          set -euo pipefail
          test -n "$DEEPSEEK_API_KEY"
          from="${{ github.event.inputs.from }}"
          to="${{ github.event.inputs.to }}"
          [ -n "$to" ] || to="$(find 01-SiteV2/content/11-databases/data-center-v4 -mindepth 1 -maxdepth 1 -type d -printf '%f\n' | grep -E '^[0-9]{4}-[0-9]{2}-[0-9]{2}$' | sort | tail -1)"
          echo "FROM_DATE=$from" >> "$GITHUB_ENV"
          echo "TO_DATE=$to" >> "$GITHUB_ENV"

      - name: Scan every Raw and generate eligible candidates
        shell: bash
        run: |
          set -euo pipefail
          node agent-workflow/tools/backfill-source-title-translations.mjs --write=true --concurrency="${{ github.event.inputs.concurrency }}"
          node agent-workflow/tools/generate-data-center-model-assist.mjs \
            --from="$FROM_DATE" --to="$TO_DATE" --write=true \
            --concurrency="${{ github.event.inputs.concurrency }}"
          node agent-workflow/tools/assert-data-center-model-assist.mjs

      - name: Rebuild and gate every affected V4 batch
        shell: bash
        run: |
          set -euo pipefail
          while IFS= read -r day; do
            node agent-workflow/tools/build-data-center-v4.mjs --date="$day"
            node agent-workflow/tools/assert-data-center-v4.mjs --date="$day"
          done < <(find 01-SiteV2/content/11-databases/data-center-v4 -mindepth 1 -maxdepth 1 -type d -printf '%f\n' | grep -E '^[0-9]{4}-[0-9]{2}-[0-9]{2}$' | awk -v from="$FROM_DATE" -v to="$TO_DATE" '$0 >= from && $0 <= to' | sort)

      - name: Materialize accepted historical candidates
        shell: bash
        run: |
          set -euo pipefail
          node agent-workflow/tools/sync-light-data-lake.mjs --v4-only=true --duckdb=skip
          node 01-SiteV2/site/scripts/build-data-center-v4-frontstage.mjs
          node agent-workflow/tools/materialize-entity-history-v1.mjs
          node agent-workflow/tools/assert-entity-history-v1.mjs

      - name: Commit historical outputs
        id: commit
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add 01-SiteV2/content/11-databases/model-assist-v1 01-SiteV2/content/11-databases/data-center-v4 01-SiteV2/content/11-databases/source-title-translations.json 01-SiteV2/content/01-raw/originals 01-SiteV2/knowledge/01-Signal-Cards 01-SiteV2/site/data/data-center-v4 01-SiteV2/site/data/data-center-v4-frontstage.json agent-workflow/reports/source-title-translation-backfill-write.json
          git diff --cached --quiet && { echo "changed=false" >> "$GITHUB_OUTPUT"; exit 0; }
          branch="automation/model-assist-backfill-${FROM_DATE}-${TO_DATE}"
          git checkout -B "$branch"
          git commit -m "Backfill evidence-bounded model candidates ${FROM_DATE} to ${TO_DATE}"
          git push --force-with-lease origin "$branch"
          echo "changed=true" >> "$GITHUB_OUTPUT"
          echo "branch=$branch" >> "$GITHUB_OUTPUT"

      - name: Open and merge data PR
        if: steps.commit.outputs.changed == 'true'
        shell: bash
        run: |
          set -euo pipefail
          branch="${{ steps.commit.outputs.branch }}"
          gh pr create --base main --head "$branch" --title "Model-assist historical backfill ${FROM_DATE} to ${TO_DATE}" --body "Scanned every V4 Raw batch in range. Exact-span Claim/FDE/hardware candidates passed deterministic gates; entity and QA candidates remain review-only."
          pr="$(gh pr list --base main --head "$branch" --state open --json number --jq '.[0].number')"
          if ! gh pr merge "$pr" --squash --auto --delete-branch; then gh pr merge "$pr" --squash --delete-branch; fi
