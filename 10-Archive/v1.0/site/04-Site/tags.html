<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>标签体系｜观澜AI｜WaveSight AI</title>
    <link rel="stylesheet" href="./css/styles.css" />
    <link rel="icon" href="./assets/logo.svg" type="image/svg+xml" />
  </head>
  <body data-page="tags" data-protected="true">
    <header class="topbar">
      <a class="brand" href="./index.html" aria-label="观澜AI WaveSight AI">
        <img class="brand-logo" src="./assets/logo.svg" alt="" />
        <span><strong>观澜AI｜WaveSight AI</strong><small>观AI之澜，识商业之势</small></span>
      </a>
      <nav class="nav" aria-label="主导航">
        <a href="./index.html" class="nav-link">首页</a>
        <a href="./daily.html" class="nav-link">Daily Brief</a>
        <a href="./signals.html" class="nav-link">Signals</a>
        <a href="./the-point.html" class="nav-link">The Point</a>
        <a href="./opportunities.html" class="nav-link">Opportunities</a>
        <a href="./trends.html" class="nav-link">Trends</a>
      </nav>
      <div class="toolbar"></div>
    </header>

    <main>
      <section class="page-title">
        <p class="eyebrow">Tag System</p>
        <h1>用标签串起判断线索</h1>
      </section>
      <section class="section protected-content tag-layout">
        <aside class="tag-sidebar">
          <div class="section-head compact">
            <div><p class="eyebrow">Cross Index</p><h2>标签索引</h2></div>
          </div>
          <label class="field"><span>标签类型</span><select id="tagTypeFilter">
            <option value="">全部标签</option>
            <option value="track">赛道</option>
            <option value="industry">行业</option>
            <option value="function">职能</option>
            <option value="scenario">场景</option>
            <option value="capability">能力</option>
            <option value="stage">阶段</option>
            <option value="geo">地区</option>
            <option value="signal">信号类型</option>
            <option value="action">行动判断</option>
            <option value="score">优先级层级</option>
            <option value="topic">主题</option>
            <option value="product">代表来源</option>
            <option value="priority">行动优先级</option>
          </select></label>
          <label class="field"><span>搜索标签</span><input id="tagSearch" type="search" placeholder="赛道、行业、职能、场景、能力" /></label>
          <div id="tagCloud" class="tag-cloud"></div>
        </aside>
        <article id="tagResults" class="tag-results"></article>
      </section>
    </main>

    <script src="./data/radar-data.js"></script>
    <script src="./js/app.js"></script>
  </body>
</html>
