<svg xmlns="http://www.w3.org/2000/svg" width="160" height="160" viewBox="0 0 160 160" role="img" aria-labelledby="title desc">
  <title id="title">观澜AI WaveSight AI logo</title>
  <desc id="desc">A premium wave and radar sight mark for WaveSight AI.</desc>
  <defs>
    <linearGradient id="markBg" x1="20" y1="12" x2="140" y2="150" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#15231f"/>
      <stop offset=".58" stop-color="#213933"/>
      <stop offset="1" stop-color="#10241f"/>
    </linearGradient>
    <linearGradient id="waveStroke" x1="26" y1="94" x2="132" y2="56" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#8fc7aa"/>
      <stop offset=".52" stop-color="#0f8b78"/>
      <stop offset="1" stop-color="#c76a38"/>
    </linearGradient>
    <filter id="glow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <rect width="160" height="160" rx="30" fill="url(#markBg)"/>
  <circle cx="80" cy="80" r="54" fill="none" stroke="#fffdfa" stroke-opacity=".18" stroke-width="2"/>
  <circle cx="80" cy="80" r="36" fill="none" stroke="#fffdfa" stroke-opacity=".22" stroke-width="2"/>
  <circle cx="80" cy="80" r="18" fill="none" stroke="#fffdfa" stroke-opacity=".28" stroke-width="2"/>
  <path d="M80 26v108M26 80h108" stroke="#fffdfa" stroke-opacity=".12" stroke-width="1.4"/>
  <path d="M28 94C43 75 57 75 72 94s30 19 45 0 23-19 35 0" fill="none" stroke="url(#waveStroke)" stroke-width="8" stroke-linecap="round"/>
  <path d="M34 106C48 92 61 92 75 106s28 14 42 0 22-14 33 0" fill="none" stroke="#fffdfa" stroke-opacity=".34" stroke-width="3" stroke-linecap="round"/>
  <path d="M80 80 119 50" stroke="#8fc7aa" stroke-width="5" stroke-linecap="round" filter="url(#glow)"/>
  <circle cx="80" cy="80" r="8" fill="#fffdfa"/>
  <circle cx="119" cy="50" r="8" fill="#c76a38" stroke="#fffdfa" stroke-width="3"/>
  <circle cx="80" cy="80" r="64" fill="none" stroke="#c76a38" stroke-opacity=".32" stroke-width="2" stroke-dasharray="2 10"/>
</svg>
