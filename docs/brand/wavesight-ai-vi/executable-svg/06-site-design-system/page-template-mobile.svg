<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 360" role="img" aria-label="Page Template Mobile 移动页面模板">
  <title>Page Template Mobile 移动页面模板</title>
  <defs>
    <linearGradient id="paperShade" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#FFFFFF"/>
      <stop offset="1" stop-color="#F7F4EF"/>
    </linearGradient>
    <marker id="arrow" markerWidth="8" markerHeight="8" refX="6.4" refY="4" orient="auto">
      <path d="M1 1 L7 4 L1 7" fill="none" stroke="#0D355C" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    
  </defs>
  <style>
  :root {
    --gl-ink: #071827;
    --gl-deep: #0B1D2A;
    --gl-blue: #0D355C;
    --gl-wave: #1F5D8C;
    --gl-gray: #6F7F8F;
    --gl-mountain: #A7ADB4;
    --gl-border: #E5E8EC;
    --gl-bg: #F7F4EF;
    --gl-paper: #FFFFFF;
    --gl-gold: #C8A766;
  }
  * { box-sizing: border-box; }
  text { font-family: "Noto Sans SC", "Source Han Sans SC", "PingFang SC", "Microsoft YaHei", Arial, sans-serif; fill: var(--gl-ink); letter-spacing: 0; }
  .serif { font-family: "Noto Serif SC", "Source Han Serif SC", "Songti SC", serif; }
  .mono { font-family: "Inter", "IBM Plex Sans", "Avenir", Arial, sans-serif; letter-spacing: .12em; }
  .label { fill: var(--gl-gray); font-size: 12px; }
  .title { fill: var(--gl-ink); font-size: 22px; font-weight: 700; }
  .subtitle { fill: var(--gl-gray); font-size: 11px; }
  .caption { fill: var(--gl-gray); font-size: 10px; }
  .fine { stroke: var(--gl-border); stroke-width: 1; }
  .gold { stroke: var(--gl-gold); }
  .blue { stroke: var(--gl-blue); }
  .wave { stroke: var(--gl-wave); }
  .card { fill: rgba(255,255,255,.86); stroke: var(--gl-border); stroke-width: 1; }
  .soft { filter: drop-shadow(0 10px 24px rgba(7,24,39,.06)); }
  .no-fill { fill: none; stroke-linecap: round; stroke-linejoin: round; }
</style>
  <rect width="240" height="360" fill="url(#paperShade)"/>
  <rect x="38" y="24" width="164" height="312" rx="18" class="card"/>
      <g transform="translate(58 42) scale(.18)">
  <g transform="translate(0 0) scale(1)" class="no-fill">
    <path d="M6 22 C28 8 70 8 92 22" stroke="#C8A766" stroke-width="2"/>
    <path d="M0 40 C20 29 39 31 56 39 C76 49 98 45 118 32" stroke="#071827" stroke-width="4"/>
    <path d="M3 51 C24 41 40 43 58 50 C80 59 99 55 117 45" stroke="#1F5D8C" stroke-width="3"/>
    <path d="M8 61 C28 54 43 55 60 60 C80 67 96 64 111 56" stroke="#A7ADB4" stroke-width="2"/>
  </g>
</g><circle cx="178" cy="58" r="8" fill="none" stroke="#0D355C"/>
      <rect x="56" y="78" width="128" height="96" rx="8" fill="#DCE5EC"/>
      <path d="M56 150 C82 120 108 128 132 138 C154 148 170 128 184 104 V174 H56 Z" fill="#A7ADB4" opacity=".44"/>
      <text x="68" y="118" class="serif" font-size="20" fill="#FFFFFF">观AI之澜</text><text x="68" y="144" class="serif" font-size="20" fill="#FFFFFF">识商业之势</text>
      <rect x="56" y="194" width="128" height="42" rx="6" fill="#FFFFFF" stroke="#E5E8EC"/><rect x="56" y="248" width="128" height="42" rx="6" fill="#FFFFFF" stroke="#E5E8EC"/>
</svg>
