<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 220" role="img" aria-label="Data Card Set 数据卡片组">
  <title>Data Card Set 数据卡片组</title>
  <defs>
    <linearGradient id="paperShade" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#FFFFFF"/>
      <stop offset="1" stop-color="#F7F4EF"/>
    </linearGradient>
    <marker id="arrow" markerWidth="8" markerHeight="8" refX="6.4" refY="4" orient="auto">
      <path d="M1 1 L7 4 L1 7" fill="none" stroke="#0D355C" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    
  </defs>
  <style>
  :root {
    --gl-ink: #071827;
    --gl-deep: #0B1D2A;
    --gl-blue: #0D355C;
    --gl-wave: #1F5D8C;
    --gl-gray: #6F7F8F;
    --gl-mountain: #A7ADB4;
    --gl-border: #E5E8EC;
    --gl-bg: #F7F4EF;
    --gl-paper: #FFFFFF;
    --gl-gold: #C8A766;
  }
  * { box-sizing: border-box; }
  text { font-family: "Noto Sans SC", "Source Han Sans SC", "PingFang SC", "Microsoft YaHei", Arial, sans-serif; fill: var(--gl-ink); letter-spacing: 0; }
  .serif { font-family: "Noto Serif SC", "Source Han Serif SC", "Songti SC", serif; }
  .mono { font-family: "Inter", "IBM Plex Sans", "Avenir", Arial, sans-serif; letter-spacing: .12em; }
  .label { fill: var(--gl-gray); font-size: 12px; }
  .title { fill: var(--gl-ink); font-size: 22px; font-weight: 700; }
  .subtitle { fill: var(--gl-gray); font-size: 11px; }
  .caption { fill: var(--gl-gray); font-size: 10px; }
  .fine { stroke: var(--gl-border); stroke-width: 1; }
  .gold { stroke: var(--gl-gold); }
  .blue { stroke: var(--gl-blue); }
  .wave { stroke: var(--gl-wave); }
  .card { fill: rgba(255,255,255,.86); stroke: var(--gl-border); stroke-width: 1; }
  .soft { filter: drop-shadow(0 10px 24px rgba(7,24,39,.06)); }
  .no-fill { fill: none; stroke-linecap: round; stroke-linejoin: round; }
</style>
  <rect width="360" height="220" fill="url(#paperShade)"/>
  <g transform="translate(30 46)"><rect width="70" height="112" rx="8" class="card"/><text x="12" y="24" class="caption">社零</text><text x="12" y="58" class="serif" font-size="22" fill="#0D355C">+5.4%</text><polyline points="12,90 24,84 36,88 48,76 60,70" fill="none" stroke="#0D355C" stroke-width="1.5"/></g><g transform="translate(112 46)"><rect width="70" height="112" rx="8" class="card"/><text x="12" y="24" class="caption">固定资产</text><text x="12" y="58" class="serif" font-size="22" fill="#0D355C">+3.7%</text><polyline points="12,90 24,84 36,88 48,76 60,70" fill="none" stroke="#0D355C" stroke-width="1.5"/></g><g transform="translate(194 46)"><rect width="70" height="112" rx="8" class="card"/><text x="12" y="24" class="caption">出口</text><text x="12" y="58" class="serif" font-size="22" fill="#0D355C">+8.9%</text><polyline points="12,90 24,84 36,88 48,76 60,70" fill="none" stroke="#0D355C" stroke-width="1.5"/></g><g transform="translate(276 46)"><rect width="70" height="112" rx="8" class="card"/><text x="12" y="24" class="caption">PMI</text><text x="12" y="58" class="serif" font-size="22" fill="#0D355C">50.6</text><polyline points="12,90 24,84 36,88 48,76 60,70" fill="none" stroke="#0D355C" stroke-width="1.5"/></g>
</svg>
